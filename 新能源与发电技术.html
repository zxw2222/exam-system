<script>
var qa = [
  {q:"【名词解释】光伏效应", a:"半导体PN结在吸收能量大于禁带宽度Eg的光子后，产生电子-空穴对，在内建电场作用下分离形成光生电动势的现象。这是太阳能电池发电的物理基础。"},
  {q:"【名词解释】叶尖速比", a:"λ=ΩR/v，即风轮叶尖线速度与来流风速之比，是决定风能利用系数Cp的关键参数。每个风机都有最优λ值（通常6~8）。"},
  {q:"【名词解释】贝茨极限", a:"风力机理论最大风能利用系数为16/27≈0.593，即最多只能捕获风中59.3%的动能。1919年德国物理学家贝茨证明。"},
  {q:"【名词解释】双馈感应发电机DFIG", a:"定子直接接网、转子通过背靠背变流器接入电网的变速恒频风力发电机，变流器仅处理20%-30%额定功率，成本低。"},
  {q:"【名词解释】孤岛效应", a:"电网断电后分布式电源继续向局部负载供电形成自给运行状态的现象，存在安全隐患。危害：威胁检修人员安全。"},
  {q:"【名词解释】低电压穿越LVRT", a:"当电网电压骤降时，风力发电机保持不脱网运行并向电网提供无功支撑的能力。中国标准：电压跌至20%时至少持续625ms不脱网。"},
  {q:"【名词解释】最大功率点跟踪MPPT", a:"通过调整光伏阵列工作点使其始终工作在P-V曲线峰值点的控制技术，可提升系统效率20%-30%。常用算法：扰动观察法、增量电导法。"},
  {q:"【名词解释】热斑效应", a:"光伏组件中某电池片被遮挡时由发电变为耗能状态，导致局部温度急剧升高（可达150°C）的现象。防护：旁路二极管、定期红外巡检。"},
  {q:"【名词解释】填充因子FF", a:"FF=Pmax/(Voc×Isc)，反映电池输出特性接近理想程度的指标。商用优质电池FF可达0.80-0.85。"},
  {q:"【简答】新能源发电系统中常用的储能技术各有哪些特点？", a:"1.锂电池：响应快、效率高、安装灵活，缺点：寿命有限\n2.抽水蓄能：容量大、寿命长，缺点：受地理限制\n3.飞轮：响应极快，缺点：能量密度低\n4.超级电容：功率密度高，缺点：能量密度低\n5.氢储能：能量密度高，缺点：转换效率低"},
  {q:"【简答】微电网从并网模式切换到孤岛模式的控制过程", a:"①检测阶段：监测电网异常\n②解列操作：<100ms断开PCC开关\n③模式切换：储能由PQ控制转V/f控制\n④稳定运行：储能作为主电源"},
  {q:"【简答】新能源发电波动性对电网有哪些影响？", a:"1.频率稳定性问题\n2.电压稳定性问题\n3.调峰压力增大（鸭子曲线）\n4.备用容量需求增加\n5.电能质量下降\n6.系统惯量降低\n7.保护配合复杂"},
  {q:"【简答】说明光伏系统从光能到并网用电的完整流程", a:"太阳光→光伏组件(DC)→汇流箱→配电柜→逆变器(DC→AC)→升压变压器→并网点→电网→用户负载"},
  {q:"【简答】风力发电机最大功率捕获的控制逻辑", a:"核心：使风能利用系数Cp(λ,β)保持最大值\n控制：风速检测→计算最优转速→转速跟踪→桨距角控制\n主要方法：查表法、爬山法、叶尖速比法"},
  {q:"【简答】双馈感应发电机的运行原理", a:"定子直接接入电网（50Hz），转子通过变流器接入。\n亚同步：转子从电网吸收能量\n超同步：转子向电网回馈能量\n优势：变流器仅处理转差功率（20%-30%）"},
  {q:"【简答】光伏并网逆变器的主要拓扑结构", a:"1.集中式：~98%效率，大型电站\n2.组串式：~97-98%，分布式屋顶\n3.微型：~95-96%，户用\n4.集散式：~98.5%，大型电站"},
  {q:"【简答】常用的MPPT算法及优缺点", a:"1.扰动观察法：简单但MPP附近振荡\n2.增量电导法：振荡小但计算量大\n3.恒定电压法：最简单但精度低\n工程常用：改进型变步长P&O"},
  {q:"【简答】水平轴与垂直轴风力机对比", a:"HAWT：效率高、需偏航、主流(>95%)\nVAWT：效率较低、无需偏航、维护方便\n结论：大型风电全部采用水平轴"},
  {q:"【简答】分布式发电系统安装运维质量影响因素", a:"①选址设计：精确资源测量\n②设备选型：认证产品、容配比匹配\n③安装施工：抗风等级、接地电阻≤4Ω\n④调试并网：防孤岛测试\n⑤运维管理：定期清洁、红外巡检"},
  {q:"【论述】新能源并网对电网的挑战及应对措施", a:"挑战：随机波动、弱惯性、调峰困难、电能质量下降、保护配合复杂\n应对：提高预测、配置储能、VSG技术、需求侧响应、辅助服务市场"},
  {q:"【论述】新能源发电技术的发展趋势", a:"技术：N型电池、储能融合、数字化、钙钛矿、氢能耦合\n应用：分布式增长、海上风电规模化、V2G\n政策：双碳目标驱动"},
  {q:"【论述】新能源发电系统的设计选型考虑因素", a:"资源条件、负荷特性、场地条件、电网接入、经济性、可靠性、环境适应性、政策因素\n流程：资源评估→负荷分析→容量配置→设备选型→电气设计→经济性测算"},
  {q:"【论述】太阳能电池工作原理及主要类型", a:"原理：光吸收→电荷分离→电荷收集\n单晶硅：效率20-26%，寿命长\n多晶硅：效率18-22%，性价比高\n薄膜：弱光性好、可柔性\n钙钛矿：效率>25%，未来潜力大"},
  {q:"【论述】风力发电机组组成及功能", a:"1.叶片：捕获风能\n2.轮毂：连接叶片，内含变桨机构\n3.齿轮箱：低速升至高速（直驱无齿轮箱）\n4.发电机：机械能转电能\n5.变流器：变速恒频并网\n6.偏航系统：对风\n7.塔筒：支撑机舱"},
  {q:"【判断】贝茨极限约为0.593，即风力机最多只能利用风中59.3%的动能", a:"正确。1919年贝茨证明，实际风机Cp约0.45~0.50。"},
  {q:"【判断】光伏组件在弱光条件下完全不能发电", a:"错误。散射光下仍可发电，只是输出功率降低。"},
  {q:"【判断】双馈风力发电机中，变流器的容量只需要额定功率的20%-30%", a:"正确。变流器只处理转差功率，这是DFIG的主要成本优势。"},
  {q:"【判断】垂直轴风力机是目前大型并网风电的主流机型", a:"错误。目前95%以上的大型并网风机采用水平轴机型。"},
  {q:"【判断】储能系统在电网中只能发挥削峰填谷这一种功能", a:"错误。还有调频、备用、电能质量改善、黑启动等功能。"},
  {q:"【判断】新能源大规模并网会增大电力系统的总惯量", a:"错误。恰恰相反，系统总惯量减小，频率抗扰动能力减弱。"}
];

var idx = 0;

function render() {
  document.getElementById("cur").textContent = idx + 1;
  document.getElementById("q").textContent = qa[idx].q;
  document.getElementById("answer").textContent = qa[idx].a;
  document.getElementById("answer").className = "answer";
  document.getElementById("opts").innerHTML = "";
}

function showAnswer() {
  document.getElementById("answer").className = "answer show";
}

function next() {
  if (idx < qa.length - 1) { idx++; render(); }
}

function prev() {
  if (idx > 0) { idx--; render(); }
}

render();
</script>
