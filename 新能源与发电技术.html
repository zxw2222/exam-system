<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新能源与发电技术 - 答题复习</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f5f5;
  color: #333;
  line-height: 1.8;
}
.header {
  background: #fff;
  border-bottom: 1px solid #e0e0e0;
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header h1 { font-size: 17px; font-weight: 600; color: #111; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
.container { max-width: 720px; margin: 0 auto; padding: 16px; }
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.toolbar button {
  padding: 6px 14px;
  border: 1px solid #d0d0d0;
  border-radius: 6px;
  background: #fff;
  font-size: 13px;
  color: #555;
  cursor: pointer;
}
.toolbar button.active { background: #111; color: #fff; border-color: #111; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.stat { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px; text-align: center; }
.stat-num { font-size: 20px; font-weight: 700; }
.stat .green { color: #16a34a; }
.stat .red { color: #dc2626; }
.stat .blue { color: #2563eb; }
.stat-label { font-size: 11px; color: #888; margin-top: 2px; }
.progress { height: 3px; background: #e0e0e0; border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
.progress-fill { height: 100%; background: #111; transition: width 0.3s; }
.card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
.tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; margin-bottom: 10px; }
.tag-blue { background: #e8f0fe; color: #1a56db; }
.tag-green { background: #e6f9ee; color: #16a34a; }
.tag-orange { background: #fff3e0; color: #d97706; }
.q-num { font-size: 12px; color: #aaa; margin-bottom: 8px; }
.q-text { font-size: 15px; font-weight: 500; color: #111; margin-bottom: 16px; line-height: 1.7; }
.opt { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: border-color 0.15s; }
.opt:hover { border-color: #999; }
.opt input[type="radio"] { margin-top: 4px; flex-shrink: 0; }
.opt label { cursor: pointer; flex: 1; }
.fill-area { width: 100%; border: 1px solid #d0d0d0; border-radius: 8px; padding: 12px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 80px; }
.fill-area:focus { outline: none; border-color: #999; }
.judge-btns { display: flex; gap: 10px; margin-top: 10px; }
.judge-btns button { flex: 1; padding: 10px; border: 1px solid #d0d0d0; border-radius: 8px; font-size: 14px; cursor: pointer; background: #fff; }
.judge-btns button:first-child { color: #16a34a; border-color: #16a34a; }
.judge-btns button:last-child { color: #dc2626; border-color: #dc2626; }
.exp { background: #fafafa; border: 1px solid #e8e8e8; border-radius: 8px; padding: 14px; margin-top: 14px; font-size: 13px; line-height: 1.8; color: #444; white-space: pre-wrap; }
.exp-title { font-weight: 600; font-size: 12px; color: #2563eb; margin-bottom: 6px; }
.nav { display: flex; justify-content: space-between; margin-bottom: 40px; }
.nav button { padding: 8px 18px; border: 1px solid #d0d0d0; border-radius: 8px; background: #fff; font-size: 13px; cursor: pointer; color: #333; }
.nav button:disabled { opacity: 0.3; cursor: default; }
.nav button.primary { background: #111; color: #fff; border-color: #111; }
.search-box { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px; margin-bottom: 16px; display: none; }
.search-box input { width: 100%; border: none; font-size: 14px; outline: none; font-family: inherit; }
.search-results { max-height: 180px; overflow-y: auto; margin-top: 8px; }
.search-item { padding: 8px 10px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
.search-item:hover { background: #f5f5f5; }
</style>
</head>
<body>

<div class="header">
  <h1>新能源与发电技术 - 期末复习</h1>
  <p>共 <span id="total-q">0</span> 题</p>
</div>

<div class="container">
  <div class="toolbar">
    <button id="b-answer" class="active" onclick="setMode('answer')">答题模式</button>
    <button id="b-review" onclick="setMode('review')">背题模式</button>
    <button id="b-random" onclick="setMode('random')">随机出题</button>
    <button id="b-wrong" onclick="setMode('wrong')">错题本</button>
    <button onclick="toggleSearch()">搜索题目</button>
  </div>

  <div id="search-box" class="search-box">
    <input type="text" placeholder="输入关键词搜索..." oninput="doSearch(this.value)">
    <div id="search-results" class="search-results"></div>
  </div>

  <div class="stats">
    <div class="stat"><div id="st-correct" class="stat-num" style="color:#16a34a">0</div><div class="stat-label">正确</div></div>
    <div class="stat"><div id="st-wrong" class="stat-num" style="color:#dc2626">0</div><div class="stat-label">错误</div></div>
    <div class="stat"><div id="st-total" class="stat-num">0</div><div class="stat-label">已答</div></div>
    <div class="stat"><div id="st-acc" class="stat-num" style="color:#2563eb">0%</div><div class="stat-label">正确率</div></div>
  </div>

  <div class="progress"><div id="prog" class="progress-fill" style="width:0%"></div></div>

  <div id="card" class="card">
    <div id="q-tag" class="tag tag-blue">简答题</div>
    <div id="q-num" class="q-num"></div>
    <div id="q-text" class="q-text"></div>
    <div id="opts"></div>
    <div id="fill-area" style="display:none;">
      <textarea id="fill-input" class="fill-area" placeholder="输入答案..."></textarea>
      <button onclick="submitFill()" style="margin-top:10px;padding:8px 20px;border:1px solid #111;border-radius:6px;background:#111;color:#fff;font-size:13px;cursor:pointer;">提交</button>
    </div>
    <div id="judge-area" class="judge-btns" style="display:none;">
      <button onclick="submitJudge(true)">正确</button>
      <button onclick="submitJudge(false)">错误</button>
    </div>
    <div id="exp" class="exp" style="display:none;">
      <div class="exp-title">参考答案</div>
      <div id="exp-text"></div>
    </div>
  </div>

  <div class="nav">
    <button id="prev-btn" onclick="prevQ()">上一题</button>
    <button id="next-btn" class="primary" onclick="nextQ()">下一题</button>
  </div>
</div>

<script>
var questions = [
  {type:"single",q:"【名词解释】光伏效应",opts:["半导体PN结吸收光子后产生电子-空穴对，在内建电场作用下分离形成光生电动势","光能直接转换为热能","光子在金属表面激发自由电子","半导体材料吸收光后电阻率下降"],ans:0,exp:"光伏效应是太阳能电池发电的物理基础"},
  {type:"single",q:"【名词解释】叶尖速比",opts:["风轮叶尖线速度与来流风速之比，是决定风能利用系数Cp的关键参数","风机切入风速与切出风速之比","叶片尖端厚度与根部厚度之比","发电机转速与电网频率之比"],ans:0,exp:"每个风机都有最优λ值（通常6~8），MPPT控制本质就是维持最优λ运行"},
  {type:"single",q:"【名词解释】贝茨极限",opts:["风力机理论最大风能利用系数为16/27≈0.593，即最多只能捕获风中59.3%的动能","风力发电机最大转速限制","叶片材料强度极限","齿轮箱传动效率上限"],ans:0,exp:"1919年德国物理学家贝茨证明，现代大型风机Cp实际可达0.45~0.50"},
  {type:"single",q:"【名词解释】双馈感应发电机DFIG",opts:["定子直接接网、转子通过变流器接入电网，变流器仅处理20%-30%额定功率","双定子绕组的特殊电机","双转子结构的感应电机","同时连接两个电网的发电机"],ans:0,exp:"DFIG主要优势：变流器容量小、成本低，可实现亚同步/超同步运行"},
  {type:"single",q:"【名词解释】孤岛效应",opts:["电网断电后分布式电源继续向局部负载供电形成自给运行状态，存在安全隐患","海岛独立供电现象","电网中孤立节点失电现象","微电网脱离主网后的运行状态"],ans:0,exp:"危害：威胁检修人员安全。检测方法分被动式和主动式"},
  {type:"single",q:"【名词解释】低电压穿越LVRT",opts:["当电网电压骤降时，风机保持不脱网运行并向电网提供无功支撑","低压线路持续供电能力","电网故障后快速恢复供电的能力","变压器低压侧穿越故障的能力"],ans:0,exp:"中国标准：电压跌至20%时风机至少持续625ms不脱网"},
  {type:"single",q:"【名词解释】最大功率点跟踪MPPT",opts:["调整光伏阵列工作点使其始终工作在P-V曲线峰值点，可提升系统效率20%-30%","自动寻找太阳最强照射位置的技术","追踪电网峰值负荷的方法","监测电池最大充电电流的技术"],ans:0,exp:"常用算法：扰动观察法、增量电导法、恒定电压法"},
  {type:"single",q:"【名词解释】热斑效应",opts:["光伏组件中某电池片被遮挡时由发电变为耗能状态，导致局部温度急剧升高","太阳能电池板整体过热现象","逆变器过热保护触发现象","组件表面热点分布不均现象"],ans:0,exp:"防护：旁路二极管、定期红外巡检、避免固定遮挡"},
  {type:"single",q:"【名词解释】填充因子FF",opts:["FF=Pmax/(Voc×Isc)，反映电池输出特性接近理想程度的指标","电池板面积与光照面积之比","实际效率与理论效率的比值","最大输出功率与额定功率之比"],ans:0,exp:"商用优质电池FF可达0.80-0.85，受串联电阻和并联电阻影响"},
  {type:"fill",q:"【简答】新能源发电系统中常用的储能技术各有哪些特点？请列举至少5种",ans:["锂电池","抽水蓄能","压缩空气","飞轮","超级电容"],exp:"1.锂电池：响应快、效率高、安装灵活，缺点：寿命有限\n2.抽水蓄能：容量大、寿命长，缺点：受地理限制\n3.压缩空气：容量大，缺点：效率较低\n4.飞轮：响应极快，缺点：能量密度低\n5.超级电容：功率密度高，缺点：能量密度低"},
  {type:"fill",q:"【简答】微电网从并网模式切换到孤岛模式的控制过程",ans:["检测阶段","解列操作","模式切换","V/f控制"],exp:"①检测阶段：监测电网异常\n②解列操作：快速断开PCC开关（<100ms）\n③模式切换：储能由PQ控制转V/f控制\n④稳定运行：储能作为主电源"},
  {type:"fill",q:"【简答】新能源发电波动性对电网有哪些影响？至少列出6条",ans:["频率稳定性","电压稳定性","调峰压力","备用容量","电能质量","系统惯量"],exp:"1.频率稳定性问题\n2.电压稳定性问题\n3.调峰压力增大（鸭子曲线）\n4.备用容量需求增加\n5.电能质量下降\n6.系统惯量降低\n7.保护配合复杂\n8.辅助服务需求激增"},
  {type:"fill",q:"【简答】说明光伏系统从光能到并网用电的完整流程",ans:["光电转换","汇集","MPPT","逆变","升压","并网"],exp:"太阳光→光伏组件→汇流箱→配电柜→逆变器(DC→AC)→升压变压器→并网点→电网→用户负载"},
  {type:"fill",q:"【简答】风力发电机最大功率捕获的控制逻辑是什么？",ans:["Cp最优化","最优转速计算","查表法","爬山法"],exp:"核心：使风能利用系数Cp(λ,β)保持最大值\n控制过程：风速检测→计算最优转速→转速跟踪→桨距角控制"},
  {type:"fill",q:"【简答】光伏并网逆变器的主要拓扑结构及特点",ans:["集中式","组串式","微型","集散式"],exp:"集中式：~98%效率，大型电站\n组串式：~97-98%，分布式屋顶\n微型：~95-96%，户用\n集散式：~98.5%，大型电站"},
  {type:"fill",q:"【简答】水平轴与垂直轴风力机对比",ans:["HAWT效率高","VAWT无需偏航"],exp:"HAWT：效率高、需偏航、主流(>95%)\nVAWT：效率较低、无需偏航、维护方便\n结论：大型风电全部采用水平轴"},
  {type:"fill",q:"【简答】分布式发电系统安装运维质量影响因素",ans:["资源评估","设备选型","安装施工","调试并网","运维管理"],exp:"①选址设计：精确资源测量\n②设备选型：认证产品、容配比匹配\n③安装施工：抗风等级、接地电阻≤4Ω\n④调试并网：防孤岛测试\n⑤运维管理：定期清洁、红外巡检"},
  {type:"fill",q:"【论述】新能源并网对电网的挑战及应对措施",ans:["随机性","弱惯性","调峰困难","电能质量","保护配合"],exp:"挑战：随机波动、弱惯性、调峰困难、电能质量下降、保护配合复杂\n应对：提高预测、配置储能、VSG技术、需求侧响应、辅助服务市场"},
  {type:"fill",q:"【论述】新能源发电技术的发展趋势",ans:["高效化","储能融合","数字化","海上风电","氢能"],exp:"技术：N型电池、储能融合、数字化、钙钛矿、氢能耦合\n应用：分布式增长、海上风电规模化、V2G\n政策：双碳目标驱动"},
  {type:"judge",q:"贝茨极限约为0.593，即风力机最多只能利用风中59.3%的动能",ans:true,exp:"正确。1919年贝茨证明，实际风机Cp约0.45~0.50"},
  {type:"judge",q:"光伏组件在弱光条件下（阴天、清晨）完全不能发电",ans:false,exp:"错误。散射光下仍可发电，只是输出功率降低"},
  {type:"judge",q:"双馈风力发电机中，变流器的容量只需要额定功率的20%-30%",ans:true,exp:"正确。变流器只处理转差功率，这是DFIG的主要成本优势"},
  {type:"judge",q:"垂直轴风力机是目前大型并网风电的主流机型",ans:false,exp:"错误。目前95%以上的大型并网风机采用水平轴机型"},
  {type:"judge",q:"储能系统在电网中只能发挥削峰填谷这一种功能",ans:false,exp:"错误。还有调频、备用、电能质量改善、黑启动等功能"},
  {type:"judge",q:"新能源大规模并网会增大电力系统的总惯量",ans:false,exp:"错误。恰恰相反，系统总惯量减小，频率抗扰动能力减弱"}
];

var mode = "answer";
var idx = 0;
var correct = 0;
var wrong = 0;
var total = 0;
var wrongIds = [];
var answered = {};
var order = [];

function init() {
  order = [];
  for (var i = 0; i < questions.length; i++) order.push(i);
  document.getElementById("total-q").textContent = questions.length;
  render();
}

function setMode(m) {
  mode = m;
  var btns = document.querySelectorAll(".toolbar button");
  for (var i = 0; i < btns.length; i++) btns[i].className = "";
  document.getElementById("b-" + m).className = "active";
  if (m === "random") {
    order = shuffle(order.slice());
    idx = 0;
  } else if (m === "wrong") {
    if (wrongIds.length === 0) { alert("暂无错题！"); return; }
    order = wrongIds.slice();
    idx = 0;
  } else {
    order = [];
    for (var i = 0; i < questions.length; i++) order.push(i);
    idx = 0;
  }
  render();
}

function toggleSearch() {
  var box = document.getElementById("search-box");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

function doSearch(kw) {
  var div = document.getElementById("search-results");
  if (!kw.trim()) { div.innerHTML = ""; return; }
  var html = "";
  for (var i = 0; i < questions.length; i++) {
    if (questions[i].q.indexOf(kw) !== -1 || questions[i].exp.indexOf(kw) !== -1) {
      html += '<div class="search-item" onclick="goQ(' + i + ')">#' + (i+1) + ' ' + questions[i].q.substring(0, 30) + '...</div>';
    }
  }
  div.innerHTML = html || '<div class="search-item">未找到</div>';
}

function goQ(i) {
  for (var j = 0; j < order.length; j++) {
    if (order[j] === i) { idx = j; break; }
  }
  render();
  document.getElementById("search-box").style.display = "none";
}

function render() {
  var q = questions[order[idx]];
  var typeMap = {single:"选择题",fill:"简答题",judge:"判断题"};
  var typeClass = {single:"tag-blue",fill:"tag-green",judge:"tag-orange"};
  document.getElementById("q-tag").className = "tag " + typeClass[q.type];
  document.getElementById("q-tag").textContent = typeMap[q.type];
  document.getElementById("q-num").textContent = "第 " + (idx+1) + " / " + order.length + " 题";
  document.getElementById("q-text").textContent = q.q;
  document.getElementById("opts").innerHTML = "";
  document.getElementById("opts").style.display = "none";
  document.getElementById("fill-area").style.display = "none";
  document.getElementById("judge-area").style.display = "none";
  document.getElementById("exp").style.display = "none";

  if (q.type === "single") {
    var optsDiv = document.getElementById("opts");
    optsDiv.style.display = "block";
    for (var i = 0; i < q.opts.length; i++) {
      (function(n) {
        var div = document.createElement("div");
        div.className = "opt";
        var letter = String.fromCharCode(65 + n);
        div.innerHTML = '<input type="radio" name="opt" id="o' + n + '" style="margin-top:4px;flex-shrink:0;"><label for="o' + n + '" style="cursor:pointer;flex:1;">' + letter + '. ' + q.opts[n] + '</label>';
        div.onclick = function() { selectOpt(n); };
        optsDiv.appendChild(div);
      })(i);
    }
  } else if (q.type === "fill") {
    document.getElementById("fill-area").style.display = "block";
    document.getElementById("fill-input").value = "";
    if (mode === "review") showExp();
  } else if (q.type === "judge") {
    document.getElementById("judge-area").style.display = "flex";
    if (mode === "review") showExp();
  }
  updateNav();
  updateProg();
}

function selectOpt(i) {
  if (answered[order[idx]]) return;
  answered[order[idx]] = true;
  total++;
  if (i === questions[order[idx]].ans) {
    correct++;
  } else {
    wrong++;
    wrongIds.push(order[idx]);
  }
  showExp();
  updateStats();
}

function submitFill() {
  if (answered[order[idx]]) return;
  answered[order[idx]] = true;
  total++;
  var val = document.getElementById("fill-input").value.trim().toLowerCase();
  var q = questions[order[idx]];
  var ok = false;
  if (typeof q.ans === "object") {
    for (var i = 0; i < q.ans.length; i++) {
      if (val.indexOf(q.ans[i].toLowerCase()) !== -1) { ok = true; break; }
    }
  } else {
    ok = val === q.ans.toLowerCase() || q.ans.toLowerCase().indexOf(val) !== -1;
  }
  if (ok || mode === "review") {
    if (!(mode === "review")) correct++;
  } else {
    wrong++;
    wrongIds.push(order[idx]);
  }
  showExp();
  updateStats();
}

function submitJudge(v) {
  if (answered[order[idx]]) return;
  answered[order[idx]] = true;
  total++;
  if (v === questions[order[idx]].ans) {
    correct++;
  } else {
    wrong++;
    wrongIds.push(order[idx]);
  }
  showExp();
  updateStats();
}

function showExp() {
  var q = questions[order[idx]];
  document.getElementById("exp").style.display = "block";
  document.getElementById("exp-text").textContent = q.exp;
}

function prevQ() { if (idx > 0) { idx--; render(); } }
function nextQ() { if (idx < order.length - 1) { idx++; render(); } }

function updateNav() {
  document.getElementById("prev-btn").disabled = (idx <= 0);
  document.getElementById("next-btn").disabled = (idx >= order.length - 1);
}
function updateProg() {
  document.getElementById("prog").style.width = ((idx+1)/order.length*100) + "%";
}
function updateStats() {
  document.getElementById("st-correct").textContent = correct;
  document.getElementById("st-wrong").textContent = wrong;
  document.getElementById("st-total").textContent = total;
  document.getElementById("st-acc").textContent = total > 0 ? Math.round(correct/total*100) + "%" : "0%";
}
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

init();
</script>
