<script>
const DEEPSEEK_KEY = 'sk-81d53acb8f62446098143011ebfcc7df';
const DEEPSEEK_URL = 'https://api.deepseek.com/v1/chat/completions';

const FLAG_MAP = {
    'Qatar':'🇶🇦','Switzerland':'🇨🇭','Brazil':'🇧🇷','Morocco':'🇲🇦',
    'Haiti':'🇭🇹','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Australia':'🇦🇺','Turkey':'🇹🇷',

    'Bosnia and Herzegovina':'🇧🇦','USA':'🇺🇸','Paraguay':'🇵🇾',
    'France':'🇫🇷','Argentina':'🇦🇷','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿',
    'Germany':'🇩🇪','Spain':'🇪🇸','Portugal':'🇵🇹','Netherlands':'🇳🇱',
    'Italy':'🇮🇹','Belgium':'🇧🇪','Japan':'🇯🇵'
};

const FIFA_RANK = {
    'Argentina':1,'France':2,'Belgium':3,'England':4,'Brazil':5,
    'Netherlands':6,'Portugal':7,'Spain':8,'Italy':9,'Croatia':10,
    'Germany':11,'USA':13,'Switzerland':14,'Morocco':15,'Mexico':16,
    'Colombia':17,'Japan':18,'Uruguay':19,'Senegal':20,
    'Australia':25,'Canada':30,'Turkey':28,'Scotland':35,
    'Qatar':50,'Haiti':60
};

let slip = [];
let chatHist = [
    {role:'assistant',content:'你好！有什么关于世界杯的问题，尽管问我吧！⚽'}
];

// ==================== 蔡徐坤聊天 ====================
function escapeHtml(t) {
    var d=document.createElement('div');
    d.textContent=t;
    return d.innerHTML;
}

function appendMsg(who, txt) {
    var box = document.getElementById('aiTopMsgs');
    var d = document.createElement('div');
    d.className = 'ai-msg ' + who;
    if (who === 'user') {
        d.innerHTML = '<div class="avatar user">👤</div><div class="bubble">' + escapeHtml(txt) + '</div>';
    } else {
        d.innerHTML = '<div class="avatar bot">🤖</div><div><div class="name-tag">蔡徐坤</div><div class="bubble">' + escapeHtml(txt).replace(/\n/g,'<br>') + '</div></div>';
    }
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
}

function showTyping() {
    var box = document.getElementById('aiTopMsgs');
    var d = document.createElement('div');
    var id = 'tping-' + Date.now();
    d.id = id;
    d.className = 'ai-msg bot';
    d.innerHTML = '<div class="avatar bot">🤖</div><div><div class="name-tag">蔡徐坤</div><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
    return id;
}

function rmTyping(id) { var el=document.getElementById(id); if(el) el.remove(); }

async function sendMsg() {
    var input = document.getElementById('aiInput');
    var txt = input.value.trim();
    if (!txt) return;
    input.value = '';
    
    appendMsg('user', txt);
    chatHist.push({role:'user', content:txt});
    var tid = showTyping();
    
    try {
        var res = await fetch(DEEPSEEK_URL, {
            method:'POST',
            headers:{'Authorization':'Bearer '+DEEPSEEK_KEY,'Content-Type':'application/json'},
            body:JSON.stringify({
                model:'deepseek-chat',
                messages:[
                    {role:'system',content:'你是蔡徐坤，一个专业足球AI助手。用中文回答，语气友好专业，可以适当加入足球emoji。回答简洁明了，不超过100字。'},
                    ...chatHist.slice(-10)
                ],
                temperature:0.7,
                max_tokens:300
            })
        });
        rmTyping(tid);
        if (!res.ok) throw new Error('API '+res.status);
        var data = await res.json();
        var reply = data.choices[0].message.content;
        appendMsg('bot', reply);
        chatHist.push({role:'assistant', content:reply});
    } catch(e) {
        rmTyping(tid);
        appendMsg('bot','抱歉，我暂时没法回答你，可能是网络问题，稍后再试试吧😅');
        console.log('Chat error:',e);
    }
}

// ==================== AI预测 ====================
async function predictDS(home, away, homeRank, awayRank) {
    var prompt = '你是一个专业足球分析师。分析以下2026世界杯比赛：\n\n主队：'+home+'（FIFA排名第'+homeRank+'）\n客队：'+away+'（FIFA排名第'+awayRank+'）\n\n请分析并返回严格JSON格式（不要任何其他文字）：\n{\n  "homeGoals": 预测主队进球数（0-5整数）,\n  "awayGoals": 预测客队进球数（0-5整数）,\n  "homeWinPercent": 主胜概率（0-100整数）,\n  "drawPercent": 平局概率（0-100整数）,\n  "awayWinPercent": 客胜概率（0-100整数）,\n  "confidence": 自信程度（60-99）,\n  "analysis": "一句话中文分析原因（不超过30字）"\n}';
    try {
        var res = await fetch(DEEPSEEK_URL, {
            method:'POST',
            headers:{'Authorization':'Bearer '+DEEPSEEK_KEY,'Content-Type':'application/json'},
            body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],temperature:0.3,max_tokens:300})
        });
        if (!res.ok) throw new Error('DS '+res.status);
        var data = await res.json();
        var json = JSON.parse(data.choices[0].message.content.match(/\{[\s\S]*\}/)[0]);
        return {score:json.homeGoals+'-'+json.awayGoals,homeWin:json.homeWinPercent,draw:json.drawPercent,awayWin:json.awayWinPercent,confidence:json.confidence,analysis:json.analysis};
    } catch(e) { return null; }
}

function predictLocal(home, away, hr, ar) {
    var hs = 100-(hr||50), as = 100-(ar||50), t = hs+as;
    var hw = Math.round((hs/t)*65+15), aw = Math.round((as/t)*65+10), d = 100-hw-aw;
    var hg = Math.round(hs/20), ag = Math.round(as/22);
    if (Math.abs(hs-as)<15&&d>20) hg=ag;
    hg=Math.max(0,Math.min(5,hg)); ag=Math.max(0,Math.min(5,ag));
    var c = 60+Math.round(Math.random()*25);
    var r; if(hw>aw+15) r=home+'排名领先'+(hr-ar)+'位'; else if(aw>hw+10) r=away+'国际排名更高'; else r='实力均衡';
    return {score:hg+'-'+ag,homeWin:hw,draw:d,awayWin:aw,confidence:c,analysis:r};
}

function makeRec(home, away, p) {
    var r,t,s;
    if (p.homeWin>p.awayWin+15) { r=home+'胜';t='win';s=Math.min(5,Math.round(p.homeWin/15)); }
    else if (p.awayWin>p.homeWin+10) { r=away+'胜';t='lose';s=Math.min(5,Math.round(p.awayWin/15)); }
    else { r='平局';t='draw';s=3; }
    return {rec:r,recType:t,stars:s,reason:(p.analysis||'')+(t==='win'?'，主胜':t==='lose'?'，客胜':'，防平')};
}

function getFlag(n) { return FLAG_MAP[n]||'⚽'; }

    var lp = document.getElementById('live-panel');
    lp.innerHTML = '<div class="loading"><div class="spinner"></div>DeepSeek AI 分析中...</div>';
    var local = {
        upcoming:[
            {home:'卡塔尔',away:'瑞士',homeEn:'Qatar',awayEn:'Switzerland',homeRank:50,awayRank:14,group:'B',time:'6/14 03:00',loc:'旧金山'},
            {home:'巴西',away:'摩洛哥',homeEn:'Brazil',awayEn:'Morocco',homeRank:5,awayRank:15,group:'C',time:'6/14 06:00',loc:'纽约'},
            {home:'海地',away:'苏格兰',homeEn:'Haiti',awayEn:'Scotland',homeRank:60,awayRank:35,group:'C',time:'6/14 09:00',loc:'纽约'},
            {home:'澳大利亚',away:'土耳其',homeEn:'Australia',awayEn:'Turkey',homeRank:25,awayRank:28,group:'D',time:'6/14 09:00',loc:'洛杉矶'}
        ],
        finished:[
            {home:'墨西哥',away:'南非',homeFlag:'🇲🇽',awayFlag:'🇿🇦',score:'2-0',group:'A'},
            {home:'韩国',away:'捷克',homeFlag:'🇰🇷',awayFlag:'🇨🇿',score:'2-1',group:'A'},
            {home:'加拿大',away:'波黑',homeFlag:'🇨🇦',awayFlag:'🇧🇦',score:'1-1',group:'B'},
            {home:'美国',away:'巴拉圭',homeFlag:'🇺🇸',awayFlag:'🇵🇾',score:'4-1',group:'D'}
        ],
        schedule:[
            {home:'捷克',away:'南非',homeFlag:'🇨🇿',awayFlag:'🇿🇦',time:'6/19 03:00',group:'A'},
            {home:'墨西哥',away:'韩国',homeFlag:'🇲🇽',awayFlag:'🇰🇷',time:'6/19 06:00',group:'A'},
            {home:'瑞士',away:'波黑',homeFlag:'🇨🇭',awayFlag:'🇧🇦',time:'6/19 09:00',group:'B'},
            {home:'加拿大',away:'卡塔尔',homeFlag:'🇨🇦',awayFlag:'🇶🇦',time:'6/19 12:00',group:'B'}
        ]
    };
    var lh = '', ac = 0;
    for (var m of local.upcoming) {
        var p = await predictDS(m.homeEn||m.home, m.awayEn||m.away, m.homeRank, m.awayRank);
        var fp, ds;
        if (p) { fp=p; ds=true; ac++; }
        else { fp=predictLocal(m.home,m.away,m.homeRank,m.awayRank); ds=false; }
        var rec = makeRec(m.home, m.away, fp);
        var ho=(2.5+Math.random()).toFixed(2), ddo=(3.0+Math.random()).toFixed(2), ao=(2.5+Math.random()*2).toFixed(2);
        lh += '<div class="match-card"><div class="match-info"><span>'+(m.group||'')+' · '+(m.loc||'')+'</span><span>'+m.time+'</span></div><div class="match-main"><div class="teams"><div class="team"><div class="flag">'+(m.homeFlag||getFlag(m.homeEn||m.home))+'</div><div class="name">'+m.home+'</div><div class="rank">FIFA #'+m.homeRank+'</div></div><div class="vs-time"><div class="vs">VS</div><div class="time">'+(m.time||'').split(' ')[1]||''+'</div></div><div class="team"><div class="flag">'+(m.awayFlag||getFlag(m.awayEn||m.away))+'</div><div class="name">'+m.away+'</div><div class="rank">FIFA #'+m.awayRank+'</div></div></div>';
        lh += '<div class="prediction"><div class="pred-label">🤖 DeepSeek AI 预测</div><div class="pred-score">'+fp.score+'</div><div class="confidence">置信度 '+fp.confidence+'%</div><div class="ai-analysis">💡 '+(fp.analysis||'')+'</div></div>';
        lh += '<div class="prob-row"><div class="prob-box win"><div class="l">主胜</div><div class="v">'+fp.homeWin+'%</div><div class="bar"><div class="bar-fill" style="width:'+fp.homeWin+'%"></div></div></div><div class="prob-box draw"><div class="l">平局</div><div class="v">'+fp.draw+'%</div><div class="bar"><div class="bar-fill" style="width:'+fp.draw+'%"></div></div></div><div class="prob-box lose"><div class="l">客胜</div><div class="v">'+fp.awayWin+'%</div><div class="bar"><div class="bar-fill" style="width:'+fp.awayWin+'%"></div></div></div></div>';
        lh += '<div class="recommend"><span class="rec-tag">推荐'+(rec.recType==='win'?'主胜':rec.recType==='lose'?'客胜':'平')+'</span><span class="stars">'+'⭐'.repeat(rec.stars)+'</span><span class="rec-desc">'+rec.reason+'</span></div>';
        lh += '<div class="odds-section"><div class="odds-title">竞彩赔率</div><div class="odds-grid"><div class="odds-btn '+(rec.recType==='win'?'selected':'')+'" onclick="addToSlip(\''+m.home+'胜\','+ho+')"><span class="lb">主胜</span><span class="val">'+ho+'</span></div><div class="odds-btn '+(rec.recType==='draw'?'selected':'')+'" onclick="addToSlip(\'平局\','+ddo+')"><span class="lb">平局</span><span class="val">'+ddo+'</span></div><div class="odds-btn '+(rec.recType==='lose'?'selected':'')+'" onclick="addToSlip(\''+m.away+'胜\','+ao+')"><span class="lb">客胜</span><span class="val">'+ao+'</span></div></div></div></div></div>';
    }
    if (ac>0) {
        document.getElementById('aiStatusBadge').textContent = '🟢 DeepSeek AI 已连接 | ' + ac + '/' + local.upcoming.length + '场AI预测';
    }
    lp.innerHTML = lh || '<div style="text-align:center;color:#666;padding:40px;">暂无今日预测</div>';
    var fh='', sh='';
    local.finished.forEach(function(f){
        fh+='<div class="finished-card"><div class="flag">'+f.homeFlag+'</div><div class="team-name">'+f.home+'</div><div class="finished-score">'+f.score+'</div><div class="team-name">'+f.away+'</div><div class="flag">'+f.awayFlag+'</div></div>';
    });
    local.schedule.forEach(function(s){
        sh+='<div class="finished-card"><div class="flag">'+s.homeFlag+'</div><div class="team-name">'+s.home+' vs '+s.away+'</div><div style="color:#00d4aa;font-size:12px;">'+s.time+'</div></div>';
    });
    document.getElementById('finished-panel').innerHTML = fh||'<div style="text-align:center;color:#666;padding:40px;">暂无已完赛</div>';
    document.getElementById('schedule-panel').innerHTML = sh||'<div style="text-align:center;color:#666;padding:40px;">暂无赛程</div>';
}

// ==================== Tab / 投注单 ====================
function switchTab(id, el) {
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
    document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
    el.classList.add('active');
    document.getElementById(id+'-panel').classList.add('active');
}

function addToSlip(pick, odds) {
    var e = slip.find(function(s){return s.pick===pick;});
    if(e) e.odds=parseFloat(odds);
    else slip.push({pick:pick,odds:parseFloat(odds)});
    updateSlip();
}
function removeFromSlip(i){slip.splice(i,1);updateSlip();}
function clearSlip(){slip=[];updateSlip();}
function updateSlip(){
    var el=document.getElementById('betSlip');
    if(slip.length===0){el.classList.remove('show');return;}
    el.classList.add('show');
    document.getElementById('slipCount').textContent=slip.length;
    var t=1, h='';
    slip.forEach(function(s,i){t*=s.odds;h+='<div class="slip-item"><span>'+s.pick+'</span><span>'+s.odds.toFixed(2)+' <span class="del" onclick="removeFromSlip('+i+')">✕</span></span></div>';});
    document.getElementById('slipItems').innerHTML=h;
    document.getElementById('totalOdds').textContent=t.toFixed(2)+'倍';
}

loadPredictions();
</script>
