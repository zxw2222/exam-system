// ========== AI预测 ==========
function predictMatch(home, away, homeRank, awayRank) {
    const homeStr = 100 - (homeRank || 50);
    const awayStr = 100 - (awayRank || 50);
    const total = homeStr + awayStr;
    
    let homeWin = Math.round((homeStr / total) * 65 + 15);
    let awayWin = Math.round((awayStr / total) * 65 + 10);
    let draw = 100 - homeWin - awayWin;
    
    let homeGoals = Math.round(homeStr / 20);
    let awayGoals = Math.round(awayStr / 22);
    
    if (Math.abs(homeStr - awayStr) < 15 && draw > 20) {
        homeGoals = awayGoals;
    }
    homeGoals = Math.max(0, Math.min(5, homeGoals));
    awayGoals = Math.max(0, Math.min(5, awayGoals));
    
    const confidence = 60 + Math.round(Math.random() * 25);
    
    let rec, recType, stars, reason;
    if (homeWin > awayWin + 15) {
        rec = home + '胜'; recType = 'win';
        stars = Math.min(5, Math.round(homeWin / 15));
        reason = home + '实力占优（FIFA第' + homeRank + ' vs 第' + awayRank + '）';
    } else if (awayWin > homeWin + 10) {
        rec = away + '胜'; recType = 'lose';
        stars = Math.min(5, Math.round(awayWin / 15));
        reason = away + '排名更靠前（FIFA第' + awayRank + '），客场仍有优势';
    } else {
        rec = '平局'; recType = 'draw';
        stars = 3;
        reason = '两队实力接近（排名差' + Math.abs(homeRank - awayRank) + '位）';
    }
    
    const homeOdds = (2.5 + Math.random()).toFixed(2);
    const drawOdds = (3.0 + Math.random()).toFixed(2);
    const awayOdds = (2.5 + Math.random() * 2).toFixed(2);
    
    return {
        score: homeGoals + '-' + awayGoals,
        homeWin, draw, awayWin,
        confidence, rec, recType, stars, reason,
        homeOdds, drawOdds, awayOdds
    };
}

                    <div class="l">客胜</div>
                    <div class="v">${p.awayWin}%</div>
                    <div class="bar"><div class="bar-fill" style="width:${p.awayWin}%"></div></div>
                </div>
            </div>
            
            <div class="recommend">
                <span class="rec-tag">推荐${p.recType === 'win' ? '主胜' : p.recType === 'lose' ? '客胜' : '平'}</span>
                <span class="stars">${'⭐'.repeat(p.stars)}</span>
                <span class="rec-desc">${p.reason}</span>
            </div>
            
            <div class="odds-section">
                <div class="odds-title">竞彩赔率</div>
                <div class="odds-grid">
                    <div class="odds-btn ${p.recType === 'win' ? 'selected' : ''}" onclick="addToSlip('${m.home}胜', ${p.homeOdds})">
                        <span class="lb">主胜</span>
                        <span class="val">${p.homeOdds}</span>
                    </div>
                    <div class="odds-btn ${p.recType === 'draw' ? 'selected' : ''}" onclick="addToSlip('平局', ${p.drawOdds})">
                        <span class="lb">平局</span>
                        <span class="val">${p.drawOdds}</span>
                    </div>
                    <div class="odds-btn ${p.recType === 'lose' ? 'selected' : ''}" onclick="addToSlip('${m.away}胜', ${p.awayOdds})">
                        <span class="lb">客胜</span>
                        <span class="val">${p.awayOdds}</span>
                    </div>
                </div>
            </div>
            
            <div class="data-source">📊 ${dataSource}</div>
        </div>
    </div>
    `;
}

function renderFinishedCard(f) {
    return `
    <div class="finished-card">
        <div class="flag">${f.homeFlag || getFlag(f.home)}</div>
        <div class="team-name">${f.home}</div>
        <div class="finished-score">${f.score}</div>
        <div class="team-name">${f.away}</div>
        <div class="flag">${f.awayFlag || getFlag(f.away)}</div>
    </div>
    `;
}

// ========== 主加载逻辑 ==========
async function loadPredictions() {
    const livePanel = document.getElementById('live-panel');
    livePanel.innerHTML = '<div class="loading"><div class="spinner"></div>加载数据中...</div>';
    
    const apiMatches = await fetchLiveMatches();
    const local = getLocalMatches();
    
    let liveHtml = '';
    let finishedHtml = '';
    let scheduleHtml = '';
    
    if (apiMatches && apiMatches.length > 0) {
        // 有真实API数据
        document.getElementById('apiStatus').className = 'api-status live';
        document.getElementById('apiStatus').textContent = '🟢 Football-Data API 已连接';
        
        apiMatches.forEach(match => {
            const home = match.homeTeam.name;
            const away = match.awayTeam.name;
            const homeRank = getRank(home);
            const awayRank = getRank(away);
            const status = match.status;
            
            if (status === 'FINISHED') {
                const score = match.score.fullTime.home + '-' + match.score.fullTime.away;
                finishedHtml += renderFinishedCard({
                    home, away,
                    homeFlag: getFlag(home),
                    awayFlag: getFlag(away),
                    score
                });
            } else if (status === 'IN_PLAY' || status === 'PAUSED') {
                // 进行中的比赛
                const p = predictMatch(home, away, homeRank, awayRank);
                const m = {
                    home, away,
                    homeFlag: getFlag(home),
                    awayFlag: getFlag(away),
                    homeRank, awayRank,
                    group: match.competition?.name || '',
                    time: '进行中',
                    loc: match.venue || ''
                };
                liveHtml += renderLiveCard(m, p, 'Football-Data API 实时数据');
            } else {
                // 未开始
                const p = predictMatch(home, away, homeRank, awayRank);
                const utcDate = new Date(match.utcDate);
                const localTime = utcDate.toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                const m = {
                    home, away,
                    homeFlag: getFlag(home),
                    awayFlag: getFlag(away),
                    homeRank, awayRank,
                    group: match.competition?.name || '',
                    time: localTime,
                    loc: match.venue || ''
                };
                liveHtml += renderLiveCard(m, p, 'Football-Data API 实时数据');
            }
        });
    } else {
        // API无数据，使用本地
        document.getElementById('apiStatus').className = 'api-status local';
        document.getElementById('apiStatus').textContent = '🟡 本地预测模式';
        
        local.upcoming.forEach(m => {
            const p = predictMatch(m.home, m.away, m.homeRank, m.awayRank);
            liveHtml += renderLiveCard(m, p, 'FIFA排名 + 本地算法');
        });
        
        local.finished.forEach(f => {
            finishedHtml += renderFinishedCard(f);
        });
        
        local.schedule.forEach(s => {
            scheduleHtml += `
            <div class="finished-card">
                <div class="flag">${s.homeFlag}</div>
                <div class="team-name">${s.home} vs ${s.away}</div>
                <div style="color:#00d4aa;font-size:12px;">${s.time}</div>
            </div>
            `;
        });
    }
    
    livePanel.innerHTML = liveHtml || '<div style="text-align:center;color:#666;padding:40px;">暂无今日预测</div>';
    document.getElementById('finished-panel').innerHTML = finishedHtml || '<div style="text-align:center;color:#666;padding:40px;">暂无已完赛</div>';
    document.getElementById('schedule-panel').innerHTML = scheduleHtml || '<div style="text-align:center;color:#666;padding:40px;">暂无赛程</div>';
}

// ========== Tab / 投注单 ==========
function switchTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(id + '-panel').classList.add('active');
}

function addToSlip(pick, odds) {
    const existing = slip.find(s => s.pick === pick);
    if (existing) { existing.odds = parseFloat(odds); }
    else { slip.push({ pick, odds: parseFloat(odds) }); }
    updateSlip();
}

function removeFromSlip(i) { slip.splice(i, 1); updateSlip(); }
function clearSlip() { slip = []; updateSlip(); }

function updateSlip() {
    const el = document.getElementById('betSlip');
    if (slip.length === 0) { el.classList.remove('show'); return; }
    el.classList.add('show');
    document.getElementById('slipCount').textContent = slip.length;
    let total = 1;
    let html = '';
    slip.forEach((s, i) => {
        total *= s.odds;
        html += `<div class="slip-item"><span>${s.pick}</span><span>${s.odds.toFixed(2)} <span class="del" onclick="removeFromSlip(${i})">✕</span></span></div>`;
    });
    document.getElementById('slipItems').innerHTML = html;
    document.getElementById('totalOdds').textContent = total.toFixed(2) + '倍';
}

function updateTime() {
    const now = new Date();
    const t = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    document.getElementById('updateTime').textContent = t + ' 更新';
}

// ========== 初始化 ==========
loadPredictions();
updateTime();
setInterval(() => { loadPredictions(); updateTime(); }, 300000);
</script>
