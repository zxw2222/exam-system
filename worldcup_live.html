<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026世界杯 - AI实时预测</title>
<style>
* { margin:0; padding:0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    background: #0f1923;
    color: #fff;
    min-height: 100vh;
    padding-bottom: 120px;
}

.header {
    background: linear-gradient(135deg, #1a3a4a, #0d2233);
    padding: 14px 20px;
    text-align: center;
    border-bottom: 2px solid #00d4aa;
}
.header h1 { font-size: 18px; font-weight: 700; }
.header h1 span { color: #00d4aa; }
.header .subtitle { font-size: 12px; color: #888; margin-top: 4px; }

.container { padding: 12px 16px; max-width: 480px; margin: 0 auto; }

/* 蔡徐坤AI助手 */
.ai-section {
    background: linear-gradient(135deg, rgba(76,130,255,0.12), rgba(0,212,170,0.08));
    border: 2px solid rgba(76,130,255,0.3);
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 14px;
}
.ai-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
}
.ai-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: url('https://zxw2222.github.io/exam-system/cxk.jpg') center/cover no-repeat;
    border: 2px solid #4c82ff;
    flex-shrink: 0;
}
.ai-info { flex: 1; }
.ai-name { font-size: 15px; font-weight: 700; }
.ai-sub { font-size: 11px; color: #888; }

.ai-messages {
    max-height: 160px;
    overflow-y: auto;
    margin-bottom: 10px;
    padding: 8px;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
}
.ai-msg {
    margin-bottom: 8px;
    display: flex;
    gap: 8px;
}
.ai-msg.user { flex-direction: row-reverse; }
.ai-msg .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
}
.ai-msg .avatar.bot {
    background: url('https://zxw2222.github.io/exam-system/cxk.jpg') center/cover no-repeat;
}
.ai-msg .avatar.user { background: #2a3a4a; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.ai-msg .bubble {
    max-width: 240px;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.4;
}
.ai-msg.bot .bubble {
    background: #1a2a3a;
    border-bottom-left-radius: 4px;
}
.ai-msg.user .bubble {
    background: #4c82ff;
    border-bottom-right-radius: 4px;
}

.ai-input {
    display: flex;
    gap: 8px;
}
.ai-input input {
    flex: 1;
    padding: 10px 14px;
    background: #0f1923;
    border: 1px solid #2a3a4a;
    border-radius: 20px;
    color: #fff;
    font-size: 14px;
    outline: none;
}
.ai-input input:focus { border-color: #4c82ff; }
.ai-input button {
    padding: 10px 16px;
    background: linear-gradient(135deg, #4c82ff, #00d4aa);
    border: none;
    border-radius: 20px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
}

/* Tab切换 */
.tabs {
    display: flex;
    background: #1a2a3a;
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
}
.tab {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-size: 13px;
    color: #888;
    cursor: pointer;
    border: none;
    background: transparent;
}
.tab.active {
    background: #00d4aa;
    color: #000;
    font-weight: 600;
}

.panel { display: none; }
.panel.active { display: block; }

/* 比赛卡片 */
.match-card {
    background: #1a2a3a;
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
    border: 1px solid #2a3a4a;
}
.match-header {
    background: rgba(0,212,170,0.1);
    padding: 8px 14px;
    font-size: 12px;
    color: #00d4aa;
    display: flex;
    justify-content: space-between;
}
.match-body { padding: 14px; }

.teams {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
}
.team { text-align: center; flex: 1; }
.team .flag { font-size: 36px; }
.team .name { font-size: 14px; font-weight: 600; margin-top: 4px; }
.team .info { font-size: 11px; color: #666; margin-top: 2px; }
.vs-center {
    text-align: center;
    min-width: 70px;
}
.vs-center .vs { font-size: 16px; color: #00d4aa; font-weight: 700; }
.vs-center .time { font-size: 11px; color: #888; margin-top: 4px; }

/* AI预测 */
.prediction {
    background: linear-gradient(135deg, rgba(76,130,255,0.15), rgba(0,212,170,0.1));
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    margin-bottom: 12px;
    border: 1px solid rgba(76,130,255,0.2);
}
.pred-label { font-size: 12px; color: #4c82ff; }
.pred-score { font-size: 32px; font-weight: 900; color: #4c82ff; margin: 6px 0; }
.confidence { font-size: 11px; color: #888; }

/* 概率 */
.probs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}
.prob {
    flex: 1;
    text-align: center;
    padding: 10px 4px;
    background: #0f1923;
    border-radius: 8px;
}
.prob .label { font-size: 10px; color: #888; margin-bottom: 4px; }
.prob .value { font-size: 16px; font-weight: 700; }
.prob.win .value { color: #ff6b6b; }
.prob.draw .value { color: #ffd93d; }
.prob.lose .value { color: #6bcb77; }

/* 推荐 */
.recommend {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: rgba(255,215,0,0.1);
    border-radius: 8px;
    margin-bottom: 12px;
}
.rec-tag {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    background: #ffd700;
    color: #000;
}
.rec-text { font-size: 12px; color: #aaa; flex: 1; }

/* 赔率 */
.odds-title { font-size: 11px; color: #666; margin-bottom: 8px; }
.odds-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
}
.odds-btn {
    padding: 12px 4px;
    background: #0f1923;
    border: 1px solid #2a3a4a;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    color: #fff;
}
.odds-btn .label { font-size: 10px; color: #888; display: block; margin-bottom: 4px; }
.odds-btn .value { font-size: 14px; font-weight: 600; }
.odds-btn.selected { 
    border-color: #ffd700; 
    background: rgba(255,215,0,0.1);
}
.odds-btn.selected .value { color: #ffd700; }

/* 已完赛 */
.finished-card {
    background: #1a2a3a;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid #2a4a2a;
}
.finished-card .flag { font-size: 28px; }
.finished-card .team-name { font-size: 13px; }
.finished-score {
    flex: 1;
    text-align: center;
    font-size: 24px;
    font-weight: 900;
    color: #6bcb77;
}

/* 赛程 */
.schedule-card {
    background: #1a2a3a;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
}
.schedule-card .date { 
    min-width: 60px; 
    text-align: center;
    font-size: 12px;
    color: #888;
}
.schedule-card .date .day { font-size: 16px; font-weight: 700; color: #fff; }
.schedule-teams {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}
.schedule-teams .flag { font-size: 24px; }
.schedule-teams .name { font-size: 13px; }
.schedule-teams .vs { color: #666; font-size: 12px; }

/* 投注单 */
.bet-slip {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #1a3a4a;
    border-top: 2px solid #ffd700;
    padding: 12px 16px;
    z-index: 100;
    display: none;
}
.bet-slip.show { display: block; }
.bet-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}
.bet-title { font-size: 14px; font-weight: 700; color: #ffd700; }
.bet-count { 
    background: #ffd700; 
    color: #000; 
    padding: 2px 10px; 
    border-radius: 10px; 
    font-size: 12px;
    font-weight: 700;
}
.bet-items { max-height: 100px; overflow-y: auto; margin-bottom: 10px; }
.bet-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #2a3a4a;
    font-size: 12px;
}
.bet-item .del { color: #ff6b6b; cursor: pointer; margin-left: 8px; }
.bet-total {
    display: flex;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid #2a3a4a;
    font-size: 14px;
    font-weight: 700;
}
.bet-total .odds { color: #ffd700; }
.bet-clear {
    width: 100%;
    padding: 10px;
    background: rgba(255,107,107,0.2);
    border: 1px solid #ff6b6b;
    color: #ff6b6b;
    border-radius: 8px;
    margin-top: 10px;
    font-size: 13px;
    cursor: pointer;
}

.loading {
    text-align: center;
    padding: 40px;
    color: #888;
}
</style>
</head>
<body>
<div class="header">
    <h1>🏆 <span>2026世界杯</span> - AI实时预测</h1>
    <div class="subtitle">美国·加拿大·墨西哥 | 6月11日-7月19日</div>
</div>

<div class="container">
    <!-- 蔡徐坤AI助手 -->
    <div class="ai-section">
        <div class="ai-header">
            <div class="ai-avatar"></div>
            <div class="ai-info">
                <div class="ai-name">🐔 蔡徐坤 AI助手</div>
                <div class="ai-sub">专业足球预测 · 实时数据分析</div>
            </div>
        </div>
        <div class="ai-messages" id="aiMessages">
            <div class="ai-msg bot">
                <div class="avatar bot"></div>
                <div class="bubble">你好！我是蔡徐坤，专业足球AI助手。可以问我2026世界杯的任何问题~ 🏀⚽</div>
            </div>
        </div>
        <div class="ai-input">
            <input type="text" id="aiInput" placeholder="输入问题，如：加拿大vs波黑谁赢？" onkeypress="if(event.key==='Enter')sendAI()">
            <button onclick="sendAI()">发送</button>
        </div>
    </div>

    <!-- Tab切换 -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab(0)">今日预测</button>
        <button class="tab" onclick="switchTab(1)">已完赛</button>
        <button class="tab" onclick="switchTab(2)">赛程</button>
    </div>

    <!-- 今日预测 -->
    <div class="panel active" id="panel0">
        <div id="todayMatches"></div>
    </div>

    <!-- 已完赛 -->
    <div class="panel" id="panel1">
        <div id="finishedMatches"></div>
    </div>

    <!-- 赛程 -->
    <div class="panel" id="panel2">
        <div id="scheduleMatches"></div>
    </div>
</div>

<!-- 投注单 -->
<div class="bet-slip" id="betSlip">
    <div class="bet-header">
        <span class="bet-title">📝 投注单</span>
        <span class="bet-count" id="betCount">0</span>
    </div>
    <div class="bet-items" id="betItems"></div>
    <div class="bet-total">
        <span>预计赔率</span>
        <span class="odds" id="totalOdds">1.00</span>
    </div>
    <button class="bet-clear" onclick="clearBets()">清空投注单</button>
</div>

<script>
const API_KEY = 'sk-81d53acb8f62446098143011ebfcc7df';
const API_URL = 'https://api.deepseek.com/v1/chat/completions';

let bets = [];

// 真实的2026世界杯比赛数据（6月13日）
const matches = [
    {
        id: 1,
        home: { name: '加拿大', flag: '🇨🇦', fifaRank: 43 },
        away: { name: '波黑', flag: '🇧🇦', fifaRank: 64 },
        time: '06-13 03:00',
        group: 'B组小组赛',
        venue: '多伦多BMO球场',
        prediction: { score: '2:1', confidence: 68, homeWin: 52, draw: 28, awayWin: 20 },
        recommend: { type: '主胜', stars: '⭐⭐⭐', desc: '东道主优势，加拿大主场作战' },
        odds: { home: 1.95, draw: 3.30, away: 4.00, over: 1.85, under: 1.95 }
    },
    {
        id: 2,
        home: { name: '美国', flag: '🇺🇸', fifaRank: 17 },
        away: { name: '巴拉圭', flag: '🇵🇾', fifaRank: 40 },
        time: '06-13 09:00',
        group: 'D组小组赛',
        venue: '洛杉矶玫瑰碗体育场',
        prediction: { score: '2:0', confidence: 75, homeWin: 62, draw: 25, awayWin: 13 },
        recommend: { type: '主胜', stars: '⭐⭐⭐⭐', desc: '美国实力占优，年轻球员状态出色' },
        odds: { home: 1.70, draw: 3.50, away: 5.20, over: 1.80, under: 2.00 }
    }
];

// 已完赛结果（揭幕战）
const finished = [
    { 
        home: '墨西哥', homeFlag: '🇲🇽', homeScore: 2, 
        away: '加拿大', awayFlag: '🇨🇦', awayScore: 0, 
        desc: '揭幕战 | A组', time: '06-11 20:00' 
    }
];

// 未来赛程
const schedule = [
    { date: '06-14', time: '03:00', home: '巴西', homeFlag: '🇧🇷', away: '摩洛哥', awayFlag: '🇲🇦', group: 'C组' },
    { date: '06-14', time: '09:00', home: '阿根廷', homeFlag: '🇦🇷', away: '德国', awayFlag: '🇩🇪', group: 'C组' },
    { date: '06-15', time: '03:00', home: '法国', homeFlag: '🇫🇷', away: '英格兰', awayFlag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿', group: 'F组' }
];

function switchTab(index) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
    document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === index));
}

function renderToday() {
    const html = matches.map(m => `
        <div class="match-card">
            <div class="match-header">
                <span>${m.group}</span>
                <span>${m.time} | ${m.venue}</span>
            </div>
            <div class="match-body">
                <div class="teams">
                    <div class="team">
                        <div class="flag">${m.home.flag}</div>
                        <div class="name">${m.home.name}</div>
                        <div class="info">FIFA #${m.home.fifaRank}</div>
                    </div>
                    <div class="vs-center">
                        <div class="vs">VS</div>
                        <div class="time">${m.time.split(' ')[1]}</div>
                    </div>
                    <div class="team">
                        <div class="flag">${m.away.flag}</div>
                        <div class="name">${m.away.name}</div>
                        <div class="info">FIFA #${m.away.fifaRank}</div>
                    </div>
                </div>
                <div class="prediction">
                    <div class="pred-label">🤖 AI预测比分</div>
                    <div class="pred-score">${m.prediction.score}</div>
                    <div class="confidence">置信度: ${m.prediction.confidence}%</div>
                </div>
                <div class="probs">
                    <div class="prob win">
                        <div class="label">主胜</div>
                        <div class="value">${m.prediction.homeWin}%</div>
                    </div>
                    <div class="prob draw">
                        <div class="label">平局</div>
                        <div class="value">${m.prediction.draw}%</div>
                    </div>
                    <div class="prob lose">
                        <div class="label">客胜</div>
                        <div class="value">${m.prediction.awayWin}%</div>
                    </div>
                </div>
                <div class="recommend">
                    <span class="rec-tag">${m.recommend.type}</span>
                    <span class="rec-text">${m.recommend.stars} ${m.recommend.desc}</span>
                </div>
                <div class="odds-title">💰 赔率投注</div>
                <div class="odds-grid">
                    <button class="odds-btn ${isSelected(m.id, '主胜')}" onclick="addBet(${m.id}, '${m.home.name} vs ${m.away.name}', '主胜', ${m.odds.home})">
                        <span class="label">主胜</span>
                        <span class="value">${m.odds.home}</span>
                    </button>
                    <button class="odds-btn ${isSelected(m.id, '平局')}" onclick="addBet(${m.id}, '${m.home.name} vs ${m.away.name}', '平局', ${m.odds.draw})">
                        <span class="label">平局</span>
                        <span class="value">${m.odds.draw}</span>
                    </button>
                    <button class="odds-btn ${isSelected(m.id, '客胜')}" onclick="addBet(${m.id}, '${m.home.name} vs ${m.away.name}', '客胜', ${m.odds.away})">
                        <span class="label">客胜</span>
                        <span class="value">${m.odds.away}</span>
                    </button>
                    <button class="odds-btn ${isSelected(m.id, '大球')}" onclick="addBet(${m.id}, '${m.home.name} vs ${m.away.name}', '大球2.5', ${m.odds.over})">
                        <span class="label">大球2.5</span>
                        <span class="value">${m.odds.over}</span>
                    </button>
                    <button class="odds-btn ${isSelected(m.id, '小球')}" onclick="addBet(${m.id}, '${m.home.name} vs ${m.away.name}', '小球2.5', ${m.odds.under})">
                        <span class="label">小球2.5</span>
                        <span class="value">${m.odds.under}</span>
                    </button>
                </div>
            </div>
        </div>
    `).join('');
    document.getElementById('todayMatches').innerHTML = html;
}

function isSelected(matchId, type) {
    return bets.some(b => b.matchId === matchId && b.type === type) ? 'selected' : '';
}

function renderFinished() {
    const html = finished.map(f => `
        <div class="finished-card">
            <div class="flag">${f.homeFlag}</div>
            <div class="team-name">${f.home}</div>
            <div class="finished-score">${f.homeScore} : ${f.awayScore}</div>
            <div class="team-name">${f.away}</div>
            <div class="flag">${f.awayFlag}</div>
        </div>
        <div style="text-align:center; font-size:11px; color:#666; margin-top:-8px; margin-bottom:12px;">${f.desc} | ${f.time}</div>
    `).join('');
    document.getElementById('finishedMatches').innerHTML = html;
}

function renderSchedule() {
    const html = schedule.map(s => `
        <div class="schedule-card">
            <div class="date">
                <div>${s.date}</div>
                <div class="day">${s.time}</div>
            </div>
            <div class="schedule-teams">
                <span class="flag">${s.homeFlag}</span>
                <span class="name">${s.home}</span>
                <span class="vs">VS</span>
                <span class="name">${s.away}</span>
                <span class="flag">${s.awayFlag}</span>
            </div>
            <div style="font-size:11px; color:#666; margin-left:8px;">${s.group}</div>
        </div>
    `).join('');
    document.getElementById('scheduleMatches').innerHTML = html;
}

function addBet(matchId, match, type, odds) {
    const idx = bets.findIndex(b => b.matchId === matchId);
    if (idx >= 0) bets.splice(idx, 1);
    bets.push({ matchId, match, type, odds });
    updateBetSlip();
    renderToday();
}

function removeBet(matchId) {
    bets = bets.filter(b => b.matchId !== matchId);
    updateBetSlip();
    renderToday();
}

function clearBets() {
    bets = [];
    updateBetSlip();
    renderToday();
}

function updateBetSlip() {
    const slip = document.getElementById('betSlip');
    if (bets.length === 0) {
        slip.classList.remove('show');
        return;
    }
    slip.classList.add('show');
    document.getElementById('betCount').textContent = bets.length;
    document.getElementById('betItems').innerHTML = bets.map(b => `
        <div class="bet-item">
            <span>${b.match} - ${b.type} @ ${b.odds}</span>
            <span class="del" onclick="removeBet(${b.matchId})">✕</span>
        </div>
    `).join('');
    const total = bets.reduce((a, b) => a * b.odds, 1).toFixed(2);
    document.getElementById('totalOdds').textContent = total;
}

// AI对话
async function sendAI() {
    const input = document.getElementById('aiInput');
    const msg = input.value.trim();
    if (!msg) return;
    
    addAIMsg('user', '👤', msg);
    input.value = '';
    
    const typing = document.createElement('div');
    typing.className = 'ai-msg bot';
    typing.innerHTML = '<div class="avatar bot"></div><div class="bubble">输入中...</div>';
    document.getElementById('aiMessages').appendChild(typing);
    
    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
                model: 'deepseek-chat',
                messages: [
                    { role: 'system', content: '你是蔡徐坤，一个专业的足球AI助手。专注于2026世界杯的比赛分析、预测和解答。用幽默风趣的语气回答，偶尔可以玩一些篮球梗。回答要简洁，控制在100字以内。' },
                    { role: 'user', content: msg }
                ]
            })
        });
        const data = await res.json();
        typing.remove();
        addAIMsg('bot', '', data.choices[0].message.content);
    } catch(e) {
        typing.remove();
        addAIMsg('bot', '', '哎呀，网络有点问题，待会再试试吧~ 🏀');
    }
}

function addAIMsg(role, avatar, text) {
    const div = document.createElement('div');
    div.className = `ai-msg ${role}`;
    div.innerHTML = role === 'bot' 
        ? `<div class="avatar bot"></div><div class="bubble">${text}</div>`
        : `<div class="avatar user">${avatar}</div><div class="bubble">${text}</div>`;
    const container = document.getElementById('aiMessages');
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

// 初始化
renderToday();
renderFinished();
renderSchedule();
</script>
</body>
</html>
