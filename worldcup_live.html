        }

        }

            background: linear-gradient(90deg, #f7c948, #ffd700, #f7c948);

            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .header .subtitle {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .tab {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(247, 201, 72, 0.2);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            color: #ccc;
        }
        
        .tab:hover { background: rgba(247, 201, 72, 0.1); }
        
        .tab.active {
            background: linear-gradient(135deg, #f7c948, #ffd700);
            color: #1a1a2e;
            font-weight: bold;
        }
        
        .content { min-height: 400px; }
        
        .match-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border: 1px solid rgba(247, 201, 72, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .match-card:hover {
            border-color: rgba(247, 201, 72, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(247, 201, 72, 0.1);
        }
        
        .match-time {
            text-align: center;
            color: #f7c948;
            font-size: 12px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        
        .team-name {
            font-size: 16px;
            font-weight: bold;
            margin: 5px 0;
            text-align: center;
        }
        
        .team-info {
            font-size: 10px;
            color: #888;
            text-align: center;
            margin-top: 3px;
        }
        
        .vs {
            font-size: 18px;
            font-weight: bold;
            color: #f7c948;
            margin: 0 15px;
        }
        
        .score {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #f7c948;
            margin: 10px 0;
        }
        
        .ai-predictions {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
        }
        
        .ai-title {
            font-size: 11px;
            color: #f7c948;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .ai-engine {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 11px;
        }
        
        .engine-name {
            color: #aaa;
            flex: 0 0 80px;
        }
        
        .prediction-score {
            color: #fff;
            font-weight: bold;
            flex: 0 0 60px;
            text-align: center;
        }
        
        .confidence {
            color: #888;
            flex: 0 0 50px;
            text-align: right;
            font-size: 10px;
        }
        
        .prob-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 6px 0;
            overflow: hidden;
        }
        
        .prob-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s;
        }
        
        .prob-win { background: linear-gradient(90deg, #4caf50, #8bc34a); }
        .prob-draw { background: linear-gradient(90deg, #ff9800, #ffc107); }
        .prob-lose { background: linear-gradient(90deg, #f44336, #e91e63); }
        
        .odds {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
        }
        
        .odd-item {
            text-align: center;
        }
        
        .odd-label {
            color: #888;
            font-size: 10px;
        }
        
        .odd-value {
            color: #f7c948;
            font-weight: bold;
            font-size: 14px;
            margin-top: 2px;
        }
        
        .team-profile {
            display: none;
        }
        
        .team-profile.active {
            display: block;
        }
        
        .profile-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));

            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;

            align-items: center;
            margin-bottom: 10px;
        }
        
        .profile-flag {

            margin-right: 12px;
        }

            font-size: 16px;
            color: #f7c948;
            margin-bottom: 3px;
        }
        
        .profile-info p {
            font-size: 11px;
            color: #888;
        }
        
        .profile-details {
            font-size: 12px;
            line-height: 1.6;
        }
        
        .profile-details p {
            margin: 4px 0;
        }
        
        .ai-assistant {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .ai-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f7c948, #ffd700);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(247, 201, 72, 0.3);

        }

            transform: scale(1.1);

        }

            position: absolute;
            bottom: 60px;
            right: 0;
            width: 300px;
            max-height: 400px;
            background: rgba(26, 26, 46, 0.98);
            border: 1px solid rgba(247, 201, 72, 0.3);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);

        }

            border-bottom: 1px solid rgba(247, 201, 72, 0.2);
            font-size: 13px;
            color: #f7c948;
            font-weight: bold;

            font-weight: bold;

                team2: { name: "匈牙利", flag: "🇭🇺", coach: "马尔科·罗西", fifa: 44 },
                status: "upcoming",
                odds: { win: 2.70, draw: 3.10, lose: 2.75 },

        // ============ 球队档案数据 ============
        var TEAMS = [
            { name: "阿根廷", flag: "🇦🇷", fifa: 1, group: "A", best: "冠军(2022,1986,1978)", coach: "莱昂内尔·斯卡洛尼", star: "梅西", style: "传控足球" },
            { name: "法国", flag: "🇫🇷", fifa: 2, group: "D", best: "冠军(2018,1998)", coach: "迪迪埃·德尚", star: "姆巴佩", style: "快速反击" },
            { name: "德国", flag: "🇩🇪", fifa: 3, group: "F", best: "冠军(2014,1990,1974,1954)", coach: "尤利安·纳格尔斯曼", star: "穆西亚拉", style: "高压逼抢" },
            { name: "巴西", flag: "🇧🇷", fifa: 4, group: "G", best: "冠军(2002,1994,1970,1962,1958)", coach: "多里瓦尔·儒尼奥尔", star: "维尼修斯", style: "桑巴足球" },
            { name: "英格兰", flag: "🇬🇧", fifa: 5, group: "B", best: "冠军(1966)", coach: "加雷斯·索斯盖特", star: "凯恩", style: "边路进攻" },
            { name: "葡萄牙", flag: "🇵🇹", fifa: 6, group: "H", best: "四强(2006)", coach: "罗伯托·马丁内斯", star: "C罗", style: "技术流" },
            { name: "荷兰", flag: "🇳🇱", fifa: 7, group: "C", best: "亚军(2010,1978,1974)", coach: "罗纳德·科曼", star: "德容", style: "全攻全守" },
            { name: "西班牙", flag: "🇪🇸", fifa: 8, group: "E", best: "冠军(2010)", coach: "路易斯·德拉富恩特", star: "亚马尔", style: "tiki-taka" },
            { name: "意大利", flag: "🇮🇹", fifa: 9, group: "A", best: "冠军(2006,1982,1938,1934)", coach: "卢西亚诺·斯帕莱蒂", star: "巴斯托尼", style: "防守反击" },
            { name: "比利时", flag: "🇧🇪", fifa: 10, group: "F", best: "季军(2018)", coach: "多梅尼科·特德斯科", star: "德布劳内", style: "中场控制" }
        ];
        
        // ============ 全局变量 ============
        var currentTab = 'today';
        var aiPanelOpen = false;
        
        // ============ 日期处理工具 ============
        function getTodayString() {
            var now = new Date();
            var month = (now.getMonth() + 1);
            var day = now.getDate();
            if (month < 10) month = '0' + month;
            if (day < 10) day = '0' + day;
            return month + '/' + day;
        }
        
        function getMatchDate(match) {
            return match.time.substring(0, 5);
        }
        
        function isToday(match) {
            return getMatchDate(match) === getTodayString();
        }
        
        function isCompleted(match) {
            return match.status === 'completed';
        }
        
        function isUpcoming(match) {
            return match.status === 'upcoming';
        }
        
        // ============ Tab 切换 ============
        function switchTab(tab) {
            currentTab = tab;
            var tabs = document.querySelectorAll('.tab');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }
            event.target.classList.add('active');
            renderContent();
        }
        
        // ============ 渲染内容 ============
        function renderContent() {
            var content = document.getElementById('content');
            if (currentTab === 'teams') {
                renderTeams(content);
            } else {
                renderMatches(content);
            }
        }
        
        function renderMatches(container) {
            var filtered = [];
            if (currentTab === 'today') {
                for (var i = 0; i < MATCHES.length; i++) {
                    if (isToday(MATCHES[i]) || (isUpcoming(MATCHES[i]) && getMatchDate(MATCHES[i]) === getTodayString())) {
                        filtered.push(MATCHES[i]);
                    }
                }
                if (filtered.length === 0) {
                    for (var j = 0; j < MATCHES.length; j++) {
                        if (isUpcoming(MATCHES[j])) {
                            filtered.push(MATCHES[j]);
                        }
                    }
                }
            } else if (currentTab === 'completed') {
                for (var k = 0; k < MATCHES.length; k++) {
                    if (isCompleted(MATCHES[k])) {
                        filtered.push(MATCHES[k]);
                    }
                }
            } else if (currentTab === 'upcoming') {
                for (var m = 0; m < MATCHES.length; m++) {
                    if (isUpcoming(MATCHES[m]) && !isToday(MATCHES[m])) {
                        filtered.push(MATCHES[m]);
                    }
                }
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无比赛数据</div>';
                return;
            }
            
            var html = '';
            for (var n = 0; n < filtered.length; n++) {
                html += renderMatchCard(filtered[n]);
            }
            container.innerHTML = html;
        }
        
        function renderMatchCard(match) {
            var scoreHtml = '';
            if (match.status === 'completed') {
                scoreHtml = '<div class="score">' + match.score1 + ' - ' + match.score2 + '</div>';
            }
            
            var deepseek = match.ai_prediction.deepseek;
            var zhipu = match.ai_prediction.zhipu;
            
            var finalScore1 = Math.round(deepseek.score1 * 0.6 + zhipu.score1 * 0.4);
            var finalScore2 = Math.round(deepseek.score2 * 0.6 + zhipu.score2 * 0.4);
            var finalWin = Math.round(deepseek.win * 0.6 + zhipu.win * 0.4);
            var finalDraw = Math.round(deepseek.draw * 0.6 + zhipu.draw * 0.4);
            var finalLose = Math.round(deepseek.lose * 0.6 + zhipu.lose * 0.4);
            
            var html = '<div class="match-card">' +
                '<div class="match-time">📅 ' + match.time + '</div>' +
                '<div class="teams">' +
                    '<div class="team">' +
                        '<div class="team-name">' + match.team1.flag + ' ' + match.team1.name + '</div>' +
                        '<div class="team-info">教练: ' + match.team1.coach + '</div>' +
                        '<div class="team-info">FIFA排名: #' + match.team1.fifa + '</div>' +
                    '</div>' +
                    '<div class="vs">VS</div>' +
                    '<div class="team">' +
                        '<div class="team-name">' + match.team2.flag + ' ' + match.team2.name + '</div>' +
                        '<div class="team-info">教练: ' + match.team2.coach + '</div>' +
                        '<div class="team-info">FIFA排名: #' + match.team2.fifa + '</div>' +
                    '</div>' +
                '</div>' +
                scoreHtml +
                '<div class="ai-predictions">' +
                    '<div class="ai-title">🤖 AI 双引擎预测 (DeepSeek 60% + 智谱 40%)</div>' +
                    '<div class="ai-engine">' +
                        '<span class="engine-name">DeepSeek</span>' +
                        '<span class="prediction-score">' + deepseek.score1 + '-' + deepseek.score2 + '</span>' +
                        '<span class="confidence">置信度 ' + deepseek.confidence + '%</span>' +
                    '</div>' +
                    '<div class="ai-engine">' +
                        '<span class="engine-name">智谱AI</span>' +
                        '<span class="prediction-score">' + zhipu.score1 + '-' + zhipu.score2 + '</span>' +
                        '<span class="confidence">置信度 ' + zhipu.confidence + '%</span>' +
                    '</div>' +
                    '<div class="ai-engine" style="margin-top:8px;font-weight:bold;">' +
                        '<span class="engine-name">综合预测</span>' +
                        '<span class="prediction-score">' + finalScore1 + '-' + finalScore2 + '</span>' +
                        '<span class="confidence">权重融合</span>' +
                    '</div>' +
                    '<div style="font-size:10px;color:#aaa;margin-top:6px;">胜平负概率</div>' +
                    '<div style="display:flex;gap:4px;margin-top:4px;">' +
                        '<div style="flex:1;">' +
                            '<div style="font-size:10px;color:#4caf50;margin-bottom:2px;">胜 ' + finalWin + '%</div>' +
                            '<div class="prob-bar"><div class="prob-fill prob-win" style="width:' + finalWin + '%"></div></div>' +
                        '</div>' +
                        '<div style="flex:1;">' +
                            '<div style="font-size:10px;color:#ff9800;margin-bottom:2px;">平 ' + finalDraw + '%</div>' +
                            '<div class="prob-bar"><div class="prob-fill prob-draw" style="width:' + finalDraw + '%"></div></div>' +
                        '</div>' +
                        '<div style="flex:1;">' +
                            '<div style="font-size:10px;color:#f44336;margin-bottom:2px;">负 ' + finalLose + '%</div>' +
                            '<div class="prob-bar"><div class="prob-fill prob-lose" style="width:' + finalLose + '%"></div></div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="odds">' +
                    '<div class="odd-item">' +
                        '<div class="odd-label">主胜</div>' +
                        '<div class="odd-value">' + match.odds.win + '</div>' +
                    '</div>' +
                    '<div class="odd-item">' +
                        '<div class="odd-label">平局</div>' +
                        '<div class="odd-value">' + match.odds.draw + '</div>' +
                    '</div>' +
                    '<div class="odd-item">' +
                        '<div class="odd-label">客胜</div>' +
                        '<div class="odd-value">' + match.odds.lose + '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
            
            return html;
        }
        
        function renderTeams(container) {
            var html = '';
            for (var i = 0; i < TEAMS.length; i++) {
                var team = TEAMS[i];
                html += '<div class="profile-card">' +
                    '<div class="profile-header">' +
                        '<div class="profile-flag">' + team.flag + '</div>' +
                        '<div class="profile-info">' +
                            '<h3>' + team.name + '</h3>' +
                            '<p>FIFA排名: #' + team.fifa + ' | 小组: ' + team.group + '</p>' +
                        '</div>' +
                    '</div>' +
                    '<div class="profile-details">' +
                        '<p>🏆 历史最佳: ' + team.best + '</p>' +
                        '<p>👨‍💼 主教练: ' + team.coach + '</p>' +
                        '<p>⭐ 核心球员: ' + team.star + '</p>' +
                        '<p>⚽ 风格: ' + team.style + '</p>' +
                    '</div>' +
                '</div>';
            }
            container.innerHTML = html;
        }
        
        // ============ AI 助手 ============
        function toggleAI() {
            aiPanelOpen = !aiPanelOpen;
            var panel = document.getElementById('aiPanel');
            if (aiPanelOpen) {
                panel.classList.add('active');
            } else {
                panel.classList.remove('active');
            }
        }
        
        function sendMessage() {
            var input = document.getElementById('aiInput');
            var text = input.value.trim();
            if (!text) return;
            
            var messages = document.getElementById('aiMessages');
            messages.innerHTML += '<div class="ai-message user">' + text + '</div>';
            
            var response = generateAIResponse(text);
            messages.innerHTML += '<div class="ai-message assistant">' + response + '</div>';
            
            input.value = '';
            messages.scrollTop = messages.scrollHeight;
        }
        
        function generateAIResponse(text) {
            var lower = text.toLowerCase();
            if (lower.indexOf('阿根廷') >= 0 || lower.indexOf('梅西') >= 0) {
                return '阿根廷是2022年世界杯冠军，FIFA排名第1。主教练斯卡洛尼，核心球员梅西。AI预测他们在2026年有望卫冕，小组出线概率95%。';
            }
            if (lower.indexOf('法国') >= 0 || lower.indexOf('姆巴佩') >= 0) {
                return '法国是2018年世界杯冠军，FIFA排名第2。姆巴佩状态火热，AI预测他们是最强夺冠热门之一，夺冠概率约18%。';
            }
            if (lower.indexOf('德国') >= 0) {
                return '德国FIFA排名第3，主教练纳格尔斯曼正年轻化改革。传统强队，AI预测他们小组第一出线概率72%。';
            }
            if (lower.indexOf('巴西') >= 0 || lower.indexOf('维尼修斯') >= 0) {
                return '巴西是世界杯历史上最成功球队(5冠)，FIFA排名第4。维尼修斯领衔新生代，AI预测他们夺冠概率15%。';
            }
            if (lower.indexOf('预测') >= 0 || lower.indexOf('比分') >= 0) {
                return 'AI双引擎预测已显示在每个比赛卡片中。DeepSeek(60%权重) + 智谱AI(40%权重)融合得出最终预测。仅供参考，不构成投注建议。';
            }
            if (lower.indexOf('赔率') >= 0 || lower.indexOf('投注') >= 0) {
                return '每场比赛下方显示胜平负赔率(模拟数据)。实际投注请到正规彩票店。AI预测仅供参考，不保证准确。';
            }
            return '感谢提问！我是世界杯AI助手，可以解答关于2026世界杯球队、赛程、AI预测的问题。请问想了解什么？';
        }
        
        // ============ 自动刷新 ============
        setInterval(function() {
            renderContent();
        }, 300000);
        
        // ============ 初始化 ============
        renderContent();
    </script>
