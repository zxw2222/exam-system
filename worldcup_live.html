.header-right{display:flex;gap:12px;}
.header-btn{background:rgba(255,255,255,0.08);border:none;color:#8b949e;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;}

.tab{flex:1;text-align:center;padding:12px 4px;font-size:13px;color:#8b949e;cursor:pointer;position:relative;transition:all 0.3s;border:none;background:transparent;white-space:nowrap;}
.tab.active{color:#f7c948;font-weight:600;}
.tab.active::after{content:'';position:absolute;bottom:0;left:20%;width:60%;height:3px;background:linear-gradient(90deg,#f7c948,#f0a500);border-radius:3px 3px 0 0;}
.tab:active{opacity:0.7;}

/* Content area */
.content{padding:12px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* Match card */
.match-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid rgba(88,166,255,0.08);box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.match-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.match-group{font-size:11px;color:#58a6ff;background:rgba(88,166,255,0.1);padding:3px 10px;border-radius:20px;font-weight:600;}
.match-status{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;}
.match-status.live{background:rgba(255,71,87,0.15);color:#ff4757;animation:pulse 1.5s infinite;}
.match-status.finished{background:rgba(88,166,255,0.15);color:#58a6ff;}
.match-status.upcoming{background:rgba(247,201,72,0.12);color:#f7c948;}

.team-info{display:flex;align-items:center;gap:8px;flex:1;}
.team-info.right{flex-direction:row-reverse;text-align:right;}
.flag{font-size:32px;line-height:1;}
.team-details{}
.team-name{font-size:15px;font-weight:700;color:#fff;}
.team-meta{font-size:11px;color:#8b949e;margin-top:2px;}
.vs-col{text-align:center;padding:0 12px;min-width:60px;}
.vs-text{font-size:22px;font-weight:900;color:#f7c948;letter-spacing:2px;}
.match-time{font-size:12px;color:#8b949e;margin-top:4px;}
.score-display{font-size:28px;font-weight:900;color:#fff;letter-spacing:2px;}
.score-display.live-score{color:#ff4757;}

.info-tag{font-size:10px;padding:4px 8px;border-radius:6px;background:rgba(255,255,255,0.05);color:#8b949e;white-space:nowrap;}

/* Odds area */
.odds-row{display:flex;gap:6px;margin-top:10px;}
.odds-item{flex:1;text-align:center;padding:8px 4px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);}
.odds-label{font-size:10px;color:#8b949e;margin-bottom:2px;}
.odds-value{font-size:16px;font-weight:700;color:#fff;}
.odds-value.highlight{color:#f7c948;}

.ai-confidence-fill{height:100%;background:linear-gradient(90deg,#4fc3f7,#f7c948);border-radius:4px;}

function initDate() {
  var d = new Date();

  var m = (d.getMonth() + 1);
  var day = d.getDate();
  if (m < 10) { m = '0' + m; }
  if (day < 10) { day = '0' + day; }
  NOW_DATE = '' + y + '-' + m + '-' + day;
}

  if (hasScore) { return 'finished'; }
  if (dateFull === NOW_DATE) { return 'live'; }

// ===== Tab Switching =====
function switchTab(tab) {
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.remove('active');
    if (tabs[i].getAttribute('data-tab') === tab) {
      tabs[i].classList.add('active');
    }
  }
  var panels = document.querySelectorAll('.tab-panel');
  for (var j = 0; j < panels.length; j++) {
    panels[j].classList.remove('active');
  }
  document.getElementById('panel-' + tab).classList.add('active');
}

// ===== Render matches =====
function renderCardHTML(m) {
  var statusClass = m.status;
  var statusText = '';
  var scoreHTML = '';
  if (m.status === 'live') {
    statusText = '● 进行中';
    scoreHTML = '<div class="score-display live-score">' + m.homeScore + ':' + m.awayScore + '</div>';
    if (m.homeScore === undefined || m.homeScore === null) {
      scoreHTML = '<div class="vs-text">VS</div><div class="match-time">' + formatTime(m.time) + '</div>';
    }
  } else if (m.status === 'finished') {
    statusText = '✅ 已完赛';
    scoreHTML = '<div class="score-display">' + m.homeScore + ':' + m.awayScore + '</div>';
  } else {
    statusText = '⏳ 未开赛';
    scoreHTML = '<div class="vs-text">VS</div><div class="match-time">' + formatTime(m.time) + '</div>';
  }

  var oddsHTML = '';
  if (m.odds) {
    oddsHTML = '<div class="odds-row">'
      + '<div class="odds-item"><div class="odds-label">主胜</div><div class="odds-value' + (m.odds.h < 2.0 ? ' highlight' : '') + '">' + m.odds.h.toFixed(2) + '</div></div>'
      + '<div class="odds-item"><div class="odds-label">平局</div><div class="odds-value">' + m.odds.d.toFixed(2) + '</div></div>'
      + '<div class="odds-item"><div class="odds-label">客胜</div><div class="odds-value' + (m.odds.a < 2.0 ? ' highlight' : '') + '">' + m.odds.a.toFixed(2) + '</div></div>'
      + '</div>';
  }

  // Recent form simulation
  var homeForm = getForm(m.home, m.status);
  var awayForm = getForm(m.away, m.status);

  var predHTML = '';
  if (m.pred) {
    var p = m.pred;
    predHTML = '<div class="ai-prediction">'
      + '<div class="ai-header">'
      + '<div class="ai-badge">'
      + '<span class="ai-icon deepseek">D</span>'
      + '<span class="ai-icon zhipu">Z</span>'
      + '<span class="ai-label">DeepSeek + 智谱AI</span>'
      + '</div>'
      + '<span class="ai-badge-text">双引擎预测</span>'
      + '</div>'
      + '<div class="ai-predict">'
      + '<div><span class="ai-score">' + m.homeFlag + ' ' + p.score + ' ' + m.awayFlag + '</span></div>'
      + '<div style="display:flex;align-items:center;gap:6px;"><span class="ai-confidence">' + p.conf + '%</span><div class="ai-confidence-bar"><div class="ai-confidence-fill" style="width:' + p.conf + '%;"></div></div></div>'
      + '</div>'
      + '<div class="prob-container">'
      + '<div class="prob-bars">'
      + '<div class="prob-bar home" style="width:' + p.probH + '%;">' + p.probH + '%</div>'
      + '<div class="prob-bar draw" style="width:' + p.probD + '%;">' + p.probD + '%</div>'
      + '<div class="prob-bar away" style="width:' + p.probA + '%;">' + p.probA + '%</div>'
      + '</div>'
      + '</div>'
      + '<div class="ai-analysis">💡 ' + p.analysis + '</div>'
      + '</div>';
  }

  var infoTags = '<span class="info-tag">📊 FIFA: ' + m.homeRank + ' vs ' + m.awayRank + '</span>'
    + '<span class="info-tag">👨‍🏫 ' + m.homeCoach + ' vs ' + m.awayCoach + '</span>'
    + '<span class="info-tag">🏟️ ' + homeForm + ' vs ' + awayForm + '</span>';

  return '<div class="match-card" id="match-' + m.id + '">'
    + '<div class="match-header">'
    + '<span class="match-group">📋 ' + m.group + '组</span>'
    + '<span class="match-status ' + statusClass + '">' + statusText + '</span>'
    + '</div>'
    + '<div class="team-row">'
    + '<div class="team-info">'
    + '<span class="flag">' + m.homeFlag + '</span>'
    + '<div class="team-details">'
    + '<div class="team-name">' + m.home + '</div>'
    + '<div class="team-meta">FIFA #' + m.homeRank + '</div>'
    + '</div>'
    + '</div>'
    + '<div class="vs-col">'
    + scoreHTML
    + '</div>'
    + '<div class="team-info right">'
    + '<span class="flag">' + m.awayFlag + '</span>'
    + '<div class="team-details">'
    + '<div class="team-name">' + m.away + '</div>'
    + '<div class="team-meta">FIFA #' + m.awayRank + '</div>'
    + '</div>'
    + '</div>'
    + '</div>'
    + '<div class="match-bottom">' + infoTags + '</div>'
    + oddsHTML
    + predHTML
    + '</div>';
}

function getForm(team, status) {
  if (status === 'finished') {
    var forms = ['🔥 连胜', '✅ 不败', '📈 状态佳', '⚡ 起伏', '📉 低迷'];
    var idx = Math.floor(Math.random() * forms.length);
    return forms[idx];
  }
  return '📊 待观察';
}

function formatTime(t) {
  return t.replace('/', '月') + '日';
}

function renderToday() {
  var html = '';
  var todayStr = NOW_DATE; // '2026-06-14'
  var todayMMDD = todayStr.substring(5); // '06-14'
  var count = 0;
  for (var i = 0; i < MATCHES.length; i++) {
    var m = MATCHES[i];
    var matchDate = m.time; // 'MM/DD HH:MM'
    var matchMMDD = matchDate.substring(0, 5); // 'MM/DD'
    // Convert both to comparable format
    var matchKey = matchMMDD.replace('/', '-');
    if (matchKey === todayMMDD) {
      html += renderCardHTML(m);
      count++;
    }
  }
  if (count === 0) {
    html = '<div style="text-align:center;padding:40px 20px;color:#8b949e;"><div style="font-size:48px;margin-bottom:12px;">📅</div><div style="font-size:16px;">今天没有比赛</div><div style="font-size:13px;margin-top:6px;">请查看其他赛程</div></div>';
  }
  document.getElementById('todayMatches').innerHTML = html;
}

function renderUpcoming() {
  var html = '';
  var count = 0;
  for (var i = 0; i < MATCHES.length; i++) {
    var m = MATCHES[i];
    if (m.status === 'upcoming' || m.status === 'live') {
      if (m.status === 'live') { continue; }
      html += renderCardHTML(m);

function renderTeams() {
  var teamNames = Object.keys(TEAMS);
  // Sort by group
  var groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  var html = '';
  for (var g = 0; g < groups.length; g++) {
    var grp = groups[g];
    html += '<div style="grid-column:1/-1;font-size:14px;font-weight:700;color:#f7c948;padding:8px 4px 4px;">' + grp + '组</div>';
    for (var t = 0; t < teamNames.length; t++) {
      var name = teamNames[t];
      var info = TEAMS[name];
      if (info.group === grp) {
        html += '<div class="team-archive-card">'
          + '<div class="flag">' + info.flag + '</div>'
          + '<div class="team-name">' + name + '</div>'
          + '<div class="team-meta">FIFA #' + info.rank + '</div>'
          + '<div class="team-meta">教练: ' + info.coach + '</div>'
          + '</div>';
      }
    }
  }
  document.getElementById('teamGrid').innerHTML = html;
}

// ===== AI Assistant Chat =====
function toggleChat() {
  var panel = document.getElementById('chatPanel');
  if (panel.classList.contains('show')) {
    panel.classList.remove('show');
  } else {
    panel.classList.add('show');
  }
}

function sendChat() {
  var input = document.getElementById('chatInput');
  var text = input.value.trim();
  if (!text) { return; }
  var msgs = document.getElementById('chatMessages');
  msgs.innerHTML += '<div class="chat-msg user"><span class="chat-msg-label">🧑 你</span><br>' + escapeHTML(text) + '</div>';
  input.value = '';

  // AI response
  setTimeout(function() {
    var resp = generateAIResponse(text);
    msgs.innerHTML += '<div class="chat-msg bot"><span class="chat-msg-label">🤖 AI分析师</span><br>' + resp + '</div>';
    msgs.scrollTop = msgs.scrollHeight;
  }, 500);

  msgs.scrollTop = msgs.scrollHeight;
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function generateAIResponse(q) {
  // Simple AI response based on match data
  q = q.toLowerCase();
  var foundMatch = null;
  for (var i = 0; i < MATCHES.length; i++) {
    var m = MATCHES[i];
    if (q.indexOf(m.home.toLowerCase()) >= 0 || q.indexOf(m.away.toLowerCase()) >= 0) {
      foundMatch = m;
      break;
    }
  }
  if (foundMatch) {
    var p = foundMatch.pred;
    return '关于 ' + foundMatch.home + ' vs ' + foundMatch.away + '：<br>'
      + '📊 双引擎预测比分：' + p.score + '<br>'
      + '🎯 置信度：' + p.conf + '%<br>'
      + '📈 胜率：主队' + p.probH + '% / 平' + p.probD + '% / 客队' + p.probA + '%<br>'
      + '💡 分析：' + p.analysis;
  }
  var suggestions = ['你可以问：阿根廷 vs 巴西的预测', '墨西哥 vs 瑞士谁赢？', '今天有哪些比赛？'];
  var idx = Math.floor(Math.random() * suggestions.length);
  return '我理解你的问题。当前我掌握所有48支球队和全部小组赛数据。' + suggestions[idx];
}

// ===== Auto refresh =====
var refreshInterval = null;
var refreshEnabled = true;

function toggleRefresh() {
  refreshEnabled = !refreshEnabled;
  var btn = document.getElementById('refreshBtn');
  if (refreshEnabled) {
    btn.style.opacity = '1';
    startAutoRefresh();
  } else {
    btn.style.opacity = '0.4';
    if (refreshInterval) {
      clearInterval(refreshInterval);
      refreshInterval = null;
    }
  }
}

function startAutoRefresh() {
  if (refreshInterval) { clearInterval(refreshInterval); }
  refreshInterval = setInterval(function() {
    refreshAll();
  }, 300000); // 5 min
}

function refreshAll() {
  renderToday();
  renderFinished();
  renderUpcoming();
  updateTimestamp();
}

function updateTimestamp() {
  var el = document.getElementById('todayRefresh');
  if (el) {
    var now = new Date();
    var h = now.getHours();
    var min = now.getMinutes();
    if (h < 10) { h = '0' + h; }
    if (min < 10) { min = '0' + min; }
    el.innerHTML = '🔄 最后更新 ' + h + ':' + min + ' · 每5分钟自动刷新';
  }
}

// ===== Init =====
function init() {
  initDate();
  initMatches();
  renderToday();
  renderFinished();
  renderUpcoming();
  renderTeams();
  updateTimestamp();
  startAutoRefresh();
}

// Make sure DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() { init(); });
} else {
  init();
}
</script>
