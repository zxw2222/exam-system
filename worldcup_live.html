<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2026世界杯竞彩·实时比分预测</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #0d1117; 
    color: #e6edf3; 
    line-height: 1.6;
    font-size: 14px;
}

/* Header */
.header {
    background: linear-gradient(135deg, #1a0a00 0%, #2d1800 50%, #1a0a00 100%);
    border-bottom: 2px solid #f0b429;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.header h1 { 
    font-size: 17px; 
    font-weight: 900; 
    color: #f0b429;
    letter-spacing: 1px;
}
.refresh-btn {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    background: rgba(240,180,41,0.15);
    color: #f0b429;
    border: 1px solid rgba(240,180,41,0.3);
}

/* Status bar */
.status-bar {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 8px 16px;
    font-size: 12px;
    color: #8b949e;
    display: flex;
    justify-content: space-between;
}
.live-dot {
    width: 8px;
    height: 8px;
    background: #ff6b6b;
    border-radius: 50%;
    display: inline-block;
    animation: pulse 1.5s infinite;
    margin-right: 6px;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Disclaimer */
.disclaimer {
    text-align: center;
    padding: 8px;
    background: rgba(218,54,51,0.08);
    color: #da3633;
    font-size: 11px;
    border-bottom: 1px solid #30363d;
}

/* Tabs */
.tabs {
    display: flex;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    overflow-x: auto;
}
.tab {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-size: 13px;
    color: #8b949e;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
}
.tab.active {
    color: #f0b429;
    border-bottom-color: #f0b429;
    background: rgba(240,180,41,0.08);
}

/* Panels */
.panel { display: none; padding: 12px; }
.panel.active { display: block; }

/* Match Card */
.match-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
}
.match-header {
    background: rgba(240,180,41,0.08);
    padding: 10px 14px;
    border-bottom: 1px solid #30363d;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #8b949e;
}
.match-header .group { color: #f0b429; font-weight: 600; }

.match-body { padding: 16px; }

/* Score Section */
.score-section {
    text-align: center;
    margin-bottom: 16px;
}
.teams-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
}
.team-box {
    text-align: center;
    min-width: 80px;
}
.team-box .flag { font-size: 32px; display: block; margin-bottom: 4px; }
.team-box .name { font-size: 15px; font-weight: 700; display: block; }
.team-box .rank { font-size: 11px; color: #8b949e; }

.vs-box {
    text-align: center;
    min-width: 60px;
}
.vs-box .vs { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
.vs-box .score { font-size: 28px; font-weight: 900; color: #f0b429; }

/* Prediction Box */
.pred-box {
    background: rgba(46,160,67,0.1);
    border: 1px solid rgba(46,160,67,0.3);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 16px;
    text-align: center;
}
.pred-box .label { font-size: 11px; color: #2ea043; font-weight: 600; }
.pred-box .score { font-size: 24px; font-weight: 900; color: #2ea043; margin-top: 4px; }

/* Probability Bar */
.prob-section { margin-bottom: 16px; }
.prob-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #8b949e;
    margin-bottom: 6px;
}
.prob-bar {
    display: flex;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
}
.prob-w { background: #da3633; }
.prob-d { background: #f0b429; }
.prob-l { background: #2ea043; }

/* Handicap */
.handicap {
    text-align: center;
    font-size: 13px;
    color: #8b949e;
    margin-bottom: 16px;
    padding: 8px;
    background: rgba(255,255,255,0.03);
    border-radius: 6px;
}

/* Odds Section */
.odds-section { margin-bottom: 16px; }
.odds-title {
    font-size: 12px;
    color: #8b949e;
    text-align: center;
    margin-bottom: 8px;
    font-weight: 600;
}
.odds-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
}
.odds-btn {
    padding: 10px 4px;
    border-radius: 8px;
    text-align: center;
    border: 1px solid #30363d;
    background: #1c2333;
    cursor: pointer;
}
.odds-btn .label { font-size: 11px; color: #8b949e; display: block; margin-bottom: 2px; }
.odds-btn .value { font-size: 15px; font-weight: 700; color: #e6edf3; }
.odds-btn.selected { border-color: #f0b429; background: rgba(240,180,41,0.15); }
.odds-btn.selected .value { color: #f0b429; }
.odds-btn.hot { border-color: #da3633; }
.odds-btn.hot .value { color: #da3633; }

/* Recommendation */
.rec-box {
    background: rgba(240,180,41,0.08);
    border: 1px solid rgba(240,180,41,0.2);
    border-radius: 8px;
    padding: 12px;
}
.rec-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}
.rec-tag {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
}
.rec-tag.win { background: rgba(218,54,51,0.15); color: #da3633; }
.rec-tag.lose { background: rgba(46,160,67,0.15); color: #2ea043; }
.rec-tag.draw { background: rgba(240,180,41,0.15); color: #f0b429; }
.stars { color: #f0b429; font-size: 14px; }
.rec-desc { font-size: 13px; color: #8b949e; line-height: 1.6; }

/* Finished Matches */
.finished-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
}
.finished-teams {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}
.finished-team { text-align: center; flex: 1; }
.finished-team .flag { font-size: 28px; }
.finished-team .name { font-size: 14px; font-weight: 600; display: block; margin-top: 4px; }
.finished-score {
    font-size: 24px;
    font-weight: 900;
    color: #2ea043;
    min-width: 80px;
    text-align: center;
}
.finished-info {
    text-align: center;
    font-size: 12px;
    color: #8b949e;
}

/* Upcoming List */
.upcoming-item {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
}
.upcoming-time {
    color: #f0b429;
    font-size: 13px;
    font-weight: 600;
    min-width: 70px;
}
.upcoming-teams {
    flex: 1;
    font-size: 14px;
}
.upcoming-group {
    color: #8b949e;
    font-size: 12px;
}

/* Champion List */
.champ-item {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
}
.champ-rank {
    min-width: 24px;
    font-size: 14px;
    font-weight: 700;
}
.champ-flag { font-size: 24px; }
.champ-name {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
}
.champ-odds {
    color: #f0b429;
    font-size: 18px;
    font-weight: 900;
}

/* Bet Slip */
.bet-slip {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #1c2333;
    border-top: 2px solid #f0b429;
    padding: 12px 16px;
    z-index: 100;
    display: none;
    max-height: 50vh;
    overflow-y: auto;
}
.bet-slip.show { display: block; }
.bet-title {
    font-size: 14px;
    font-weight: 700;
    color: #f0b429;
    margin-bottom: 10px;
}
.bet-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #30363d;
    font-size: 13px;
}
.bet-item .remove {
    color: #da3633;
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
}
.bet-total {
    display: flex;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #30363d;
    font-size: 14px;
    font-weight: 700;
}
.bet-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    background: linear-gradient(90deg, #f0b429, #e09100);
    color: #0d1117;
    margin-top: 12px;
}

footer {
    text-align: center;
    padding: 20px;
    color: #484f58;
    font-size: 11px;
    margin-bottom: 80px;
}
</style>
</head>
<body>
<div class="header">

</div>

    <span><span class="live-dot"></span>实时更新</span>
    <span id="updateTime">--:--</span>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('live')">实时/今日</div>
    <div class="tab" onclick="switchTab('finished')">已完赛</div>

    <div class="tab" onclick="switchTab('champion')">冠军赔率</div>
</div>

<div class="panel active" id="live-panel">
    <div id="liveList"></div>
</div>
<div class="panel" id="finished-panel">
    <div id="finishedList"></div>
</div>
<div class="panel" id="upcoming-panel">
    <div id="upcomingList"></div>
</div>
<div class="panel" id="champion-panel">
    <div id="championList"></div>
</div>

<div class="bet-slip" id="betSlip">
    <div class="bet-title">📋 投注单 (<span id="slipCount">0</span>)</div>
    <div id="slipItems"></div>
    <div class="bet-total">
        <span>串关回报</span>
        <span id="totalOdds" style="color:#f0b429">0倍</span>
    </div>
    <button class="bet-btn" onclick="clearSlip()">清空投注单</button>
</div>

<footer>数据每5分钟自动刷新 · 世界杯2026美加墨</footer>

// Data

    },
    {
        id: 4, g: 'D', date: '6/14 09:00', loc: '洛杉矶',
        t1: '澳大利亚', f1: '🇦🇺', r1: 38,
        t2: '土耳其', f2: '🇹🇷', r2: 28,
        pred: '1-2', pw: 25, pd: 30, pl: 45,
        rec: '负', star: 2, desc: '土耳其技术细腻，澳洲身体对抗难占优',
        h: '土耳其-0.5', hw: 2.80, hd: 3.20, hl: 2.40,
        w: 3.20, d: 3.10, l: 2.20, big: 1.88, small: 1.98
    }
];

var finished = [
    { g: 'A', date: '6/12', t1: '墨西哥', f1: '🇲🇽', t2: '南非', f2: '🇿🇦', s: '2-0' },
    { g: 'A', date: '6/12', t1: '韩国', f1: '🇰🇷', t2: '捷克', f2: '🇨🇿', s: '2-1' },
    { g: 'B', date: '6/13', t1: '加拿大', f1: '🇨🇦', t2: '波黑', f2: '🇧🇦', s: '1-1' },
    { g: 'D', date: '6/13', t1: '美国', f1: '🇺🇸', t2: '巴拉圭', f2: '🇵🇾', s: '4-1' }
];

var upcoming = [
    { g: 'A', date: '6/19', t1: '捷克', f1: '🇨🇿', t2: '南非', f2: '🇿🇦' },
    { g: 'A', date: '6/19', t1: '墨西哥', f1: '🇲🇽', t2: '韩国', f2: '🇰🇷' },
    { g: 'B', date: '6/19', t1: '瑞士', f1: '🇨🇭', t2: '波黑', f2: '🇧🇦' },
    { g: 'B', date: '6/19', t1: '加拿大', f1: '🇨🇦', t2: '卡塔尔', f2: '🇶🇦' },
    { g: 'C', date: '6/20', t1: '苏格兰', f1: '🏴󠁧󠁢󠁳󠁣󠁴󠁿', t2: '摩洛哥', f2: '🇲🇦' },
    { g: 'C', date: '6/20', t1: '巴西', f1: '🇧🇷', t2: '海地', f2: '🇭🇹' },
    { g: 'D', date: '6/19', t1: '美国', f1: '🇺🇸', t2: '土耳其', f2: '🇹🇷' },
    { g: 'D', date: '6/19', t1: '巴拉圭', f1: '🇵🇾', t2: '澳大利亚', f2: '🇦🇺' }
];

var champs = [
    { n: '法国', f: '🇫🇷', o: 4.50 }, { n: '巴西', f: '🇧🇷', o: 5.00 },
    { n: '阿根廷', f: '🇦🇷', o: 6.50 }, { n: '英格兰', f: '🏴󠁧󠁢󠁥󠁮󠁧󠁿', o: 8.00 },
    { n: '西班牙', f: '🇪🇸', o: 10.00 }, { n: '德国', f: '🇩🇪', o: 12.00 },
    { n: '葡萄牙', f: '🇵🇹', o: 14.00 }, { n: '荷兰', f: '🇳🇱', o: 18.00 }
];

var slip = [];

function switchTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(id + '-panel').classList.add('active');
}

function addBet(id, pick, odds) {
    var existing = slip.find(s => s.id === id);
    if (existing) { existing.pick = pick; existing.odds = odds; }
    else { slip.push({ id: id, pick: pick, odds: odds }); }
    updateSlip();
}

function removeBet(i) {
    slip.splice(i, 1);
    updateSlip();
}

function clearSlip() {
    slip = [];
    updateSlip();
}

function updateSlip() {
    var el = document.getElementById('betSlip');
    if (slip.length === 0) {
        el.classList.remove('show');
        return;
    }
    el.classList.add('show');
    document.getElementById('slipCount').textContent = slip.length;
    
    var total = 1, html = '';
    slip.forEach((s, i) => {
        total *= s.odds;
        html += '<div class="bet-item"><span>' + s.pick + '</span><span style="color:#f0b429">' + s.odds + '</span><span class="remove" onclick="removeBet(' + i + ')">✕</span></div>';
    });
    document.getElementById('slipItems').innerHTML = html;
    document.getElementById('totalOdds').textContent = total.toFixed(2) + '倍';
}

function renderLive() {
    var html = '';
    matches.forEach(m => {
        var predOdds = (6 - parseInt(m.pred[0]) - parseInt(m.pred[2])).toFixed(1);
        
        html += '<div class="match-card">';
        html += '<div class="match-header"><span>' + m.date + ' · ' + m.loc + '</span><span class="group">' + m.g + '组</span></div>';
        html += '<div class="match-body">';
        
        // Teams and score
        html += '<div class="score-section">';
        html += '<div class="teams-row">';
        html += '<div class="team-box"><span class="flag">' + m.f1 + '</span><span class="name">' + m.t1 + '</span><span class="rank">#' + m.r1 + '</span></div>';
        html += '<div class="vs-box"><div class="vs">VS</div><div class="score">—</div></div>';
        html += '<div class="team-box"><span class="flag">' + m.f2 + '</span><span class="name">' + m.t2 + '</span><span class="rank">#' + m.r2 + '</span></div>';
        html += '</div></div>';
        
        // Prediction
        html += '<div class="pred-box"><div class="label">🤖 AI比分预测</div><div class="score">' + m.pred + '</div></div>';
        
        // Probability
        html += '<div class="prob-section">';
        html += '<div class="prob-labels"><span>主胜 ' + m.pw + '%</span><span>平 ' + m.pd + '%</span><span>客胜 ' + m.pl + '%</span></div>';
        html += '<div class="prob-bar"><div class="prob-w" style="width:' + m.pw + '%"></div><div class="prob-d" style="width:' + m.pd + '%"></div><div class="prob-l" style="width:' + m.pl + '%"></div></div>';
        html += '</div>';
        
        // Handicap
        html += '<div class="handicap">让球：' + m.h + '</div>';
        
        // Handicap odds
        html += '<div class="odds-section">';
        html += '<div class="odds-title">让球赔率</div>';
        html += '<div class="odds-grid">';
        html += '<div class="odds-btn ' + (m.rec === '胜' ? 'selected' : '') + '" onclick="addBet(' + m.id + ', \'' + m.t1 + '让胜\', ' + m.hw + ')"><span class="label">让胜</span><span class="value">' + m.hw + '</span></div>';
        html += '<div class="odds-btn" onclick="addBet(' + m.id + ', \'让平\', ' + m.hd + ')"><span class="label">让平</span><span class="value">' + m.hd + '</span></div>';
        html += '<div class="odds-btn ' + (m.rec === '负' ? 'selected' : '') + '" onclick="addBet(' + m.id + ', \'' + m.t2 + '让负\', ' + m.hl + ')"><span class="label">让负</span><span class="value">' + m.hl + '</span></div>';
        html += '</div></div>';
        
        // Win/Draw/Lose
        html += '<div class="odds-section">';
        html += '<div class="odds-title">胜平负</div>';
        html += '<div class="odds-grid">';
        html += '<div class="odds-btn ' + (m.rec === '胜' ? 'selected' : '') + '" onclick="addBet(' + m.id + ', \'' + m.t1 + '胜\', ' + m.w + ')"><span class="label">主胜</span><span class="value">' + m.w + '</span></div>';
        html += '<div class="odds-btn" onclick="addBet(' + m.id + ', \'平局\', ' + m.d + ')"><span class="label">平局</span><span class="value">' + m.d + '</span></div>';
        html += '<div class="odds-btn ' + (m.rec === '负' ? 'selected' : '') + '" onclick="addBet(' + m.id + ', \'' + m.t2 + '胜\', ' + m.l + ')"><span class="label">客胜</span><span class="value">' + m.l + '</span></div>';
        html += '</div></div>';
        
        // Score odds
        html += '<div class="odds-section">';
        html += '<div class="odds-title">比分赔率</div>';
        html += '<div class="odds-grid">';
        html += '<div class="odds-btn selected" onclick="addBet(' + m.id + ', \'' + m.pred + '\', ' + predOdds + ')"><span class="label">AI预测</span><span class="value">' + m.pred + '</span></div>';
        html += '<div class="odds-btn" onclick="addBet(' + m.id + ', \'主胜其他\', ' + (parseFloat(predOdds) + 1).toFixed(1) + ')"><span class="label">主胜其他</span><span class="value">' + (parseFloat(predOdds) + 1).toFixed(1) + '</span></div>';
        html += '<div class="odds-btn" onclick="addBet(' + m.id + ', \'客胜其他\', ' + (parseFloat(predOdds) + 2).toFixed(1) + ')"><span class="label">客胜其他</span><span class="value">' + (parseFloat(predOdds) + 2).toFixed(1) + '</span></div>';
        html += '</div></div>';
        
        // Big/Small
        html += '<div class="odds-section">';
        html += '<div class="odds-title">大小球 (2.5)</div>';
        html += '<div class="odds-grid">';
        html += '<div class="odds-btn" onclick="addBet(' + m.id + ', \'大2.5\', ' + m.big + ')"><span class="label">大2.5</span><span class="value">' + m.big + '</span></div>';
        html += '<div class="odds-btn" onclick="addBet(' + m.id + ', \'小2.5\', ' + m.small + ')"><span class="label">小2.5</span><span class="value">' + m.small + '</span></div>';
        html += '<div class="odds-btn"></div>';
        html += '</div></div>';
        
        // Recommendation
        var recClass = m.rec === '胜' ? 'win' : m.rec === '负' ? 'lose' : 'draw';
        html += '<div class="rec-box">';
        html += '<div class="rec-header"><span class="rec-tag ' + recClass + '">推荐' + m.rec + '</span><span class="stars">' + '★'.repeat(m.star) + '</span></div>';
        html += '<div class="rec-desc">' + m.desc + '</div>';
        html += '</div>';
        
        html += '</div></div>';
    });
    document.getElementById('liveList').innerHTML = html;
}

function renderFinished() {
    var html = '';
    finished.forEach(f => {
        html += '<div class="finished-card">';
        html += '<div class="finished-teams">';
        html += '<div class="finished-team"><div class="flag">' + f.f1 + '</div><div class="name">' + f.t1 + '</div></div>';
        html += '<div class="finished-score">' + f.s + '</div>';
        html += '<div class="finished-team"><div class="flag">' + f.f2 + '</div><div class="name">' + f.t2 + '</div></div>';
        html += '</div>';
        html += '<div class="finished-info">' + f.date + ' · ' + f.g + '组</div>';
        html += '</div>';
    });
    document.getElementById('finishedList').innerHTML = html;
}

function renderUpcoming() {
    var html = '';
    upcoming.forEach(u => {
        html += '<div class="upcoming-item">';
        html += '<div class="upcoming-time">' + u.date + '</div>';
        html += '<div class="upcoming-teams">' + u.f1 + ' ' + u.t1 + ' vs ' + u.t2 + ' ' + u.f2 + '</div>';
        html += '<div class="upcoming-group">' + u.g + '组</div>';
        html += '</div>';
    });
    document.getElementById('upcomingList').innerHTML = html;
}

function renderChampion() {
    var html = '';
    champs.forEach((c, i) => {
        html += '<div class="champ-item" onclick="addBet(99, \'' + c.n + '夺冠\', ' + c.o + ')">';
        html += '<div class="champ-rank">' + (i + 1) + '</div>';
        html += '<div class="champ-flag">' + c.f + '</div>';
        html += '<div class="champ-name">' + c.n + '</div>';
        html += '<div class="champ-odds">' + c.o + '</div>';
        html += '</div>';
    });
    document.getElementById('championList').innerHTML = html;
}

function refreshData() {
    var now = new Date();
    var t = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
    document.getElementById('updateTime').textContent = t;
    
    // Simulate odds change
    matches.forEach(m => {
        m.w = Math.round((m.w + (Math.random() - 0.5) * 0.1) * 100) / 100;
        m.l = Math.round((m.l + (Math.random() - 0.5) * 0.1) * 100) / 100;
    });
    renderLive();
}

// Init
renderLive();
renderFinished();
renderUpcoming();
renderChampion();
refreshData();

// Auto refresh every 5 min
setInterval(refreshData, 300000);
</script>
</body>
</html>
