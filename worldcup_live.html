// ========== DeepSeek AI预测 ==========
async function predictWithDeepSeek(home, away, homeRank, awayRank) {
    const prompt = `你是一个专业足球分析师。分析以下2026世界杯比赛：

主队：${home}（FIFA排名第${homeRank}）
客队：${away}（FIFA排名第${awayRank}）

请分析并返回严格JSON格式（不要任何其他文字）：
{
  "homeGoals": 预测主队进球数（0-5整数）,
  "awayGoals": 预测客队进球数（0-5整数）,
  "homeWinPercent": 主胜概率（0-100整数）,
  "drawPercent": 平局概率（0-100整数）,
  "awayWinPercent": 客胜概率（0-100整数）,
  "confidence": 你对这个预测的自信程度（60-99）,
  "analysis": "一句话中文分析原因（不超过30字）"
}`;

    try {
        const res = await fetch(DEEPSEEK_URL, {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + DEEPSEEK_KEY,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: 'deepseek-chat',
                messages: [{ role: 'user', content: prompt }],
                temperature: 0.3,
                max_tokens: 300
            })
        });
        if (!res.ok) throw new Error('DeepSeek ' + res.status);
        const data = await res.json();
        const text = data.choices[0].message.content;
        
        // 提取JSON
        const json = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
        
        return {
            score: json.homeGoals + '-' + json.awayGoals,
            homeWin: json.homeWinPercent,
            draw: json.drawPercent,
            awayWin: json.awayWinPercent,
            confidence: json.confidence,
            analysis: json.analysis
        };
    } catch (e) {
        console.log('DeepSeek error:', e);
        return null;
    }
}

// ========== 本地算法降级 ==========
function predictLocal(home, away, homeRank, awayRank) {
    const homeStr = 100 - (homeRank || 50);
    const awayStr = 100 - (awayRank || 50);
    const total = homeStr + awayStr;
    
    let homeWin = Math.round((homeStr / total) * 65 + 15);
    let awayWin = Math.round((awayStr / total) * 65 + 10);
    let draw = 100 - homeWin - awayWin;
    
    let homeGoals = Math.round(homeStr / 20);
    let awayGoals = Math.round(awayStr / 22);
    
    if (Math.abs(homeStr - awayStr) < 15 && draw > 20) {
        homeGoals = awayGoals;
    }
    homeGoals = Math.max(0, Math.min(5, homeGoals));
    awayGoals = Math.max(0, Math.min(5, awayGoals));
    
    const confidence = 60 + Math.round(Math.random() * 25);
    
    let reason;
    if (homeWin > awayWin + 15) reason = home + '排名领先' + Math.abs(homeRank - awayRank) + '位，主场优势明显';
    else if (awayWin > homeWin + 10) reason = away + '国际排名更高，客场稳定发挥';
    else reason = '两队实力均衡，胜负难料';
    
    return {
        score: homeGoals + '-' + awayGoals,
        homeWin, draw, awayWin,
        confidence,
        analysis: reason
    };
}

        rec = '平局'; recType = 'draw'; stars = 3;
        reason = (p.analysis || '') + '，保守看好平局';
    }
    return { rec, recType, stars, reason };
}

                    <div class="bar"><div class="bar-fill" style="width:${p.homeWin}%"></div></div>
                </div>
                <div class="prob-box draw">
                    <div class="l">平局</div>
                    <div class="v">${p.draw}%</div>
                    <div class="bar"><div class="bar-fill" style="width:${p.draw}%"></div></div>
                </div>
                <div class="prob-box lose">
                    <div class="l">客胜</div>
                    <div class="v">${p.awayWin}%</div>
                    <div class="bar"><div class="bar-fill" style="width:${p.awayWin}%"></div></div>
                </div>
            </div>
            
            <div class="recommend">
                <span class="rec-tag">推荐${rec.recType === 'win' ? '主胜' : rec.recType === 'lose' ? '客胜' : '平'}</span>
                <span class="stars">${'⭐'.repeat(rec.stars)}</span>
                <span class="rec-desc">${rec.reason}</span>
            </div>
            
            <div class="odds-section">
                <div class="odds-title">竞彩赔率</div>
                <div class="odds-grid">
                    <div class="odds-btn ${rec.recType === 'win' ? 'selected' : ''}" onclick="addToSlip('${m.home}胜', ${homeOdds})">
                        <span class="lb">主胜</span>
                        <span class="val">${homeOdds}</span>
                    </div>
                    <div class="odds-btn ${rec.recType === 'draw' ? 'selected' : ''}" onclick="addToSlip('平局', ${drawOdds})">
                        <span class="lb">平局</span>
                        <span class="val">${drawOdds}</span>
                    </div>
                    <div class="odds-btn ${rec.recType === 'lose' ? 'selected' : ''}" onclick="addToSlip('${m.away}胜', ${awayOdds})">
                        <span class="lb">客胜</span>
                        <span class="val">${awayOdds}</span>
                    </div>
                </div>
            </div>
            
            <div class="data-source">
                <span class="${isDeepSeek ? 'ai' : ''}">📊 ${isDeepSeek ? 'DeepSeek AI 深度分析' : 'FIFA排名算法'}</span>
            </div>
        </div>
    </div>
    `;
}

// ========== 主加载 ==========
async function loadPredictions() {
    const livePanel = document.getElementById('live-panel');
    livePanel.innerHTML = '<div class="loading"><div class="spinner"></div>DeepSeek AI 分析中...</div>';
    
    const local = LOCAL_DATA;
    let liveHtml = '';
    let finishedHtml = '';
    let scheduleHtml = '';
    let aiCount = 0;
    
    // 逐个用DeepSeek预测
    for (const m of local.upcoming) {
        const p = await predictWithDeepSeek(m.homeEn || m.home, m.awayEn || m.away, m.homeRank, m.awayRank);
        
        let finalP, isDeepSeek;
        if (p) {
            finalP = p;
            isDeepSeek = true;
            aiCount++;
        } else {
            finalP = predictLocal(m.home, m.away, m.homeRank, m.awayRank);
            isDeepSeek = false;
        }
        
        const rec = makeRecommendation(m.home, m.away, finalP);
        liveHtml += renderCardHtml(m, finalP, rec, isDeepSeek);
    }
    
    // 更新状态
    if (aiCount > 0) {
        document.getElementById('apiStatus').className = 'api-status deepseek';
        document.getElementById('apiStatus').textContent = '🟢 DeepSeek AI 已连接 | ' + aiCount + '/' + local.upcoming.length + '场AI预测';
        deepseekOk = true;
    } else {
        document.getElementById('apiStatus').className = 'api-status fallback';
        document.getElementById('apiStatus').textContent = '🟡 DeepSeek降级，本地算法预测';
    }
    
    livePanel.innerHTML = liveHtml || '<div style="text-align:center;color:#666;padding:40px;">暂无今日预测</div>';
    
    // 渲染已完成和赛程
    local.finished.forEach(f => {
        finishedHtml += `
        <div class="finished-card">
            <div class="flag">${f.homeFlag}</div>
            <div class="team-name">${f.home}</div>
            <div class="finished-score">${f.score}</div>
            <div class="team-name">${f.away}</div>
            <div class="flag">${f.awayFlag}</div>
        </div>
        `;
    });
    
    local.schedule.forEach(s => {
        scheduleHtml += `
        <div class="finished-card">
            <div class="flag">${s.homeFlag}</div>
            <div class="team-name">${s.home} vs ${s.away}</div>
            <div style="color:#00d4aa;font-size:12px;">${s.time}</div>
        </div>
        `;
    });
    
    document.getElementById('finished-panel').innerHTML = finishedHtml || '<div style="text-align:center;color:#666;padding:40px;">暂无已完赛</div>';
    document.getElementById('schedule-panel').innerHTML = scheduleHtml || '<div style="text-align:center;color:#666;padding:40px;">暂无赛程</div>';
}

// ========== Tab / 投注单 ==========
function switchTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(id + '-panel').classList.add('active');
}

function addToSlip(pick, odds) {
    const existing = slip.find(s => s.pick === pick);
    if (existing) existing.odds = parseFloat(odds);
    else slip.push({ pick, odds: parseFloat(odds) });
    updateSlip();
}

function removeFromSlip(i) { slip.splice(i, 1); updateSlip(); }
function clearSlip() { slip = []; updateSlip(); }

function updateSlip() {
    const el = document.getElementById('betSlip');
    if (slip.length === 0) { el.classList.remove('show'); return; }
    el.classList.add('show');
    document.getElementById('slipCount').textContent = slip.length;
    let total = 1, html = '';
    slip.forEach((s, i) => {
        total *= s.odds;
        html += `<div class="slip-item"><span>${s.pick}</span><span>${s.odds.toFixed(2)} <span class="del" onclick="removeFromSlip(${i})">✕</span></span></div>`;
    });
    document.getElementById('slipItems').innerHTML = html;
    document.getElementById('totalOdds').textContent = total.toFixed(2) + '倍';
}

function updateTime() {
    const now = new Date();
    document.getElementById('updateTime').textContent =
        now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ' 更新';
}

// ========== 初始化 ==========
loadPredictions();
updateTime();
setInterval(() => { loadPredictions(); updateTime(); }, 300000);
</script>
</body>
