<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>2026世界杯·AI预测中心</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--card:rgba(15,23,42,0.9);--border:rgba(51,65,85,0.5);--accent1:#6366f1;--accent2:#8b5cf6;--gold:#f59e0b;--green:#22c55e;--red:#ef4444;--text:#e2e8f0;--muted:#94a3b8}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(99,102,241,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(139,92,246,0.06) 0%,transparent 50%);pointer-events:none;z-index:0}

.header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,rgba(15,23,42,0.98),rgba(30,41,59,0.98));backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-status{display:flex;align-items:center;gap:16px;font-size:11px}
.status-dot{width:7px;height:7px;border-radius:50%}
.status-dot.online{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.status-dot.offline{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.tabs{display:flex;overflow-x:auto;background:rgba(15,23,42,0.8);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:49}
.tab-btn{flex-shrink:0;padding:12px 18px;font-size:13px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab-btn.active{color:var(--accent1);border-bottom-color:var(--accent1);background:rgba(99,102,241,0.08)}
.tab-btn:hover{color:var(--text)}

.content{padding:12px;padding-bottom:100px;position:relative;z-index:1}

.match-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border);position:relative;overflow:hidden}
.match-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px}
.match-card.live::before{background:linear-gradient(90deg,var(--red),#f97316);animation:liveGrad 2s infinite}
.match-card.finished::before{background:linear-gradient(90deg,var(--green),#16a34a)}
.match-card.upcoming::before{background:linear-gradient(90deg,var(--accent1),var(--accent2))}
@keyframes liveGrad{0%,100%{opacity:1}50%{opacity:.4}}

.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-group{font-size:11px;color:var(--muted)}
.card-time{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.card-time.live{background:rgba(239,68,68,.15);color:var(--red)}
.card-time.finished{background:rgba(34,197,94,.15);color:var(--green)}
.card-time.upcoming{background:rgba(99,102,241,.15);color:var(--accent1)}

.teams-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.team-col{text-align:center;flex:1}
.team-flag{font-size:36px;margin-bottom:6px;line-height:1}
.team-name{font-size:13px;font-weight:600;margin-bottom:2px}
.team-meta{font-size:10px;color:var(--muted)}
.vs-col{text-align:center;padding:0 10px}
.vs-score{font-size:32px;font-weight:800;letter-spacing:4px}
.vs-label{font-size:10px;color:var(--muted);margin-top:2px}

.section-label{font-size:11px;color:var(--accent2);font-weight:600;margin:10px 0 6px;display:flex;align-items:center;gap:4px}
.section-label::before{content:"";display:inline-block;width:12px;height:2px;background:var(--accent2);border-radius:1px}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.info-item{background:rgba(255,255,255,.03);border-radius:8px;padding:8px 10px;font-size:11px}
.info-item .info-label{color:var(--muted);font-size:10px;margin-bottom:3px}
.info-item .info-value{font-weight:500;font-size:12px}

.pred-box{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(139,92,246,.08));border-radius:12px;padding:14px;border:1px solid rgba(99,102,241,.2);margin:10px 0}
.pred-title{font-size:12px;color:var(--accent2);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.pred-score{font-size:22px;font-weight:700;text-align:center;margin:8px 0;background:linear-gradient(135deg,var(--accent1),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pred-bars{margin:8px 0}
.pred-bar{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:11px}
.pred-bar-label{width:36px;flex-shrink:0;text-align:right;color:var(--muted)}
.pred-bar-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.pred-bar-fill{height:100%;border-radius:3px;transition:width .6s}
.pred-bar-fill.home{background:linear-gradient(90deg,var(--accent1),var(--accent2))}
.pred-bar-fill.draw{background:linear-gradient(90deg,var(--gold),#fbbf24)}
.pred-bar-fill.away{background:linear-gradient(90deg,var(--red),#f97316)}
.pred-bar-val{width:32px;font-weight:600;text-align:right;font-size:11px}
.pred-reason{font-size:11px;color:var(--muted);line-height:1.5;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)}

.odds-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.odds-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .2s;user-select:none}
.odds-btn:hover{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4)}
.odds-btn.tag{font-size:10px;color:var(--muted)}
.odds-btn.val{font-size:15px;font-weight:700;color:var(--gold)}

.star{color:var(--gold);font-size:12px}

.champion-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.champ-card{background:var(--card);border-radius:12px;padding:14px;border:1px solid var(--border);display:flex;align-items:center;gap:10px}
.champ-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.champ-rank.r1{background:linear-gradient(135deg,#ffd700,#f0c000);color:#000}
.champ-rank.r2{background:linear-gradient(135deg,#c0c0c0,#a0a0a0);color:#000}
.champ-rank.r3{background:linear-gradient(135deg,#cd7f32,#a0522d);color:#fff}
.champ-rank.rn{background:rgba(255,255,255,.1)}
.champ-info{flex:1;min-width:0}
.champ-team{font-size:13px;font-weight:600}
.champ-detail{font-size:10px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.team-detail-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.team-detail-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.team-detail-flag{font-size:42px}
.team-detail-name{font-size:17px;font-weight:700}
.team-detail-rank{font-size:12px;color:var(--gold)}
.team-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.team-detail-item{background:rgba(255,255,255,.02);border-radius:8px;padding:10px}
.team-detail-item .label{font-size:10px;color:var(--muted);margin-bottom:4px}
.team-detail-item .value{font-size:12px;font-weight:500}
.players-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.player-tag{background:rgba(99,102,241,.1);color:var(--accent1);font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap}

.btn-fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent1),var(--accent2));border:none;cursor:pointer;z-index:100;box-shadow:0 4px 20px rgba(99,102,241,.5);transition:all .3s;display:flex;align-items:center;justify-content:center}
.btn-fab:hover{transform:scale(1.08)}
.btn-fab img{width:38px;height:38px;border-radius:50%;object-fit:cover}

.chat-panel{position:fixed;bottom:85px;right:20px;width:calc(100vw - 40px);max-width:340px;height:420px;background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:18px;border:1px solid rgba(99,102,241,.3);box-shadow:0 10px 40px rgba(0,0,0,.6);display:none;flex-direction:column;overflow:hidden;z-index:99}
.chat-panel.open{display:flex}
.chat-top{background:linear-gradient(90deg,var(--accent1),var(--accent2));padding:12px;display:flex;align-items:center;gap:10px}
.chat-top img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3)}
.chat-top .name{font-weight:600;font-size:13px}
.chat-top .status{font-size:10px;opacity:.8}
.chat-top .close-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;margin-left:auto}
.chat-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.chat-msg{padding:10px 14px;border-radius:16px;font-size:12px;line-height:1.5;max-width:85%}
.chat-msg.ai{align-self:flex-start;background:rgba(99,102,241,.15);border-bottom-left-radius:4px}
.chat-msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--accent1),var(--accent2));border-bottom-right-radius:4px}
.chat-input-row{display:flex;gap:8px;padding:10px;border-top:1px solid rgba(255,255,255,.06)}
.chat-input-row input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:10px 16px;color:var(--text);font-size:13px;outline:none}
.chat-input-row input::placeholder{color:var(--muted)}
.chat-input-row button{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent1),var(--accent2));border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0}
.chat-input-row .upload-btn{width:32px;height:32px;font-size:14px;margin-right:6px;background:rgba(255,255,255,.1);flex-shrink:0}
.chat-input-row .upload-btn{width:32px;height:32px;font-size:14px;margin-right:6px;background:rgba(255,255,255,.1);flex-shrink:0}

.footer-msg{text-align:center;padding:20px;font-size:10px;color:var(--muted)}

@media(min-width:768px){.content{max-width:700px;margin:0 auto}.chat-panel{max-width:380px}}

.hidden{display:none!important}
.loading-spin{text-align:center;padding:40px;color:var(--muted)}
.loading-spin::after{content:"";display:inline-block;width:24px;height:24px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--accent1);border-radius:50%;animation:spin .8s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.skeleton{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border);animation:shimmer 1.5s infinite}
.skel-line{height:12px;background:rgba(255,255,255,.05);border-radius:6px;margin:8px 0}
@keyframes shimmer{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}
</style>
</head>

}

// ========== 异步AI预测更新 ==========// ========== 异步AI预测更新 ==========// ========== 异步AI预测更新 ==========// ========== 异步AI预测更新 ==========
async function updateAIPredictions(matches) {
  for (let m of matches) {
    if (m.status !== 'upcoming') continue;
    
    let predBox = document.getElementById('pred-' + m.id);
    if (!predBox) continue;
    
    // 调用双引擎AI预测
    let aiPred = await dualEnginePredict(m.home, m.away);
    
    if (aiPred) {
      // 更新预测框
      let titleDiv = predBox.querySelector('.pred-title');
      if (titleDiv) titleDiv.innerHTML = '🎯 DeepSeek + 智谱AI 双引擎预测 <span style="font-size:10px;color:var(--gold)">置信度 ' + aiPred.confidence + '%</span>';
      
      let scoreDiv = predBox.querySelector('.pred-score');
      if (scoreDiv) scoreDiv.textContent = m.home + ' ' + aiPred.homeGoals + ' : ' + aiPred.awayGoals + ' ' + m.away;
      
      let bars = predBox.querySelectorAll('.pred-bar-fill');
      if (bars[0]) bars[0].style.width = aiPred.homePct + '%';
      if (bars[1]) bars[1].style.width = aiPred.drawPct + '%';
      if (bars[2]) bars[2].style.width = aiPred.awayPct + '%';
      
      let vals = predBox.querySelectorAll('.pred-bar-val');
      if (vals[0]) vals[0].textContent = aiPred.homePct + '%';
      if (vals[1]) vals[1].textContent = aiPred.drawPct + '%';
      if (vals[2]) vals[2].textContent = aiPred.awayPct + '%';
      
      let reasonDiv = predBox.querySelector('.pred-reason');
      if (reasonDiv) reasonDiv.textContent = '📊 ' + (aiPred.reason || generateReason(m, aiPred));
    }
  }
}

try{

});
if(resp.ok){

}catch(e){
document.getElementById('dataStatus').className='status-dot online';
document.getElementById('dataStatus').style.background='var(--gold)';
document.getElementById('dataLabel').textContent='本地模式';
}
}

// ========== 启动 ==========
render();
setInterval(()=>{render();}, 5*60*1000); // 5分钟自动刷新 | 全新v3.0版本
fetchFootballData();
</script>
