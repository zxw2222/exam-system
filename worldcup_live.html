<script>
// ========== 配置 ==========
const DEEPSEEK_KEY = 'sk-81d53acb8f62446098143011ebfcc7df';
const DEEPSEEK_URL = 'https://api.deepseek.com/v1/chat/completions';

const FLAG_MAP = {
    'Qatar': '🇶🇦', 'Switzerland': '🇨🇭', 'Brazil': '🇧🇷', 'Morocco': '🇲🇦',
    'Haiti': '🇭🇹', 'Scotland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿', 'Australia': '🇦🇺', 'Turkey': '🇹🇷',
    'Mexico': '🇲🇽', 'South Africa': '🇿🇦', 'Korea Republic': '🇰🇷',
    'Czech Republic': '🇨🇿', 'Czechia': '🇨🇿', 'Canada': '🇨🇦',
    'Bosnia and Herzegovina': '🇧🇦', 'USA': '🇺🇸', 'Paraguay': '🇵🇾',
    'France': '🇫🇷', 'Argentina': '🇦🇷', 'England': '🏴󠁧󠁢󠁥󠁮󠁧󠁿',
    'Germany': '🇩🇪', 'Spain': '🇪🇸', 'Portugal': '🇵🇹', 'Netherlands': '🇳🇱',
    'Italy': '🇮🇹', 'Belgium': '🇧🇪', 'Japan': '🇯🇵',
    'Saudi Arabia': '🇸🇦', 'Iran': '🇮🇷', 'Colombia': '🇨🇴', 'Uruguay': '🇺🇾'
};

const FIFA_RANK = {
    'Argentina': 1, 'France': 2, 'Belgium': 3, 'England': 4, 'Brazil': 5,
    'Netherlands': 6, 'Portugal': 7, 'Spain': 8, 'Italy': 9, 'Croatia': 10,
    'Germany': 11, 'USA': 13, 'Switzerland': 14, 'Morocco': 15, 'Mexico': 16,
    'Colombia': 17, 'Japan': 18, 'Uruguay': 19, 'Senegal': 20,
    'Australia': 25, 'Canada': 30, 'Turkey': 28, 'Scotland': 35,
    'Qatar': 50, 'Haiti': 60
};

let slip = [];
let chatOpen = false;
let chatHistory = [
    { role: 'assistant', content: '你好！我是蔡徐坤，DeepSeek AI驱动。有什么关于世界杯预测、足球数据的问题，尽管问我吧！⚽' }
];

// ========== AI聊天功能 ==========
// 移除toggleChat，改为Tab切换

async function sendMessage() {
    const input = document.getElementById('aiInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    
    // 显示用户消息
    appendMessage('user', text);
    chatHistory.push({ role: 'user', content: text });
    
    // 显示加载
    const typingId = showTyping();
    
    try {
        const res = await fetch(DEEPSEEK_URL, {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + DEEPSEEK_KEY,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: 'deepseek-chat',
                messages: [
                    { role: 'system', content: '你是蔡徐坤，一个专业足球AI助手。用中文回答，语气友好专业，可以适当加入足球emoji。' },
                    ...chatHistory.slice(-10)  // 保留最近10条
                ],
                temperature: 0.7,
                max_tokens: 500
            })
        });
        
        removeTyping(typingId);
        
        if (!res.ok) throw new Error('API ' + res.status);
        const data = await res.json();
        const reply = data.choices[0].message.content;
        
        appendMessage('bot', reply);
        chatHistory.push({ role: 'assistant', content: reply });
        
    } catch (e) {
        removeTyping(typingId);
        appendMessage('bot', '抱歉，我暂时无法回答，请稍后再试。😅');
        console.log('Chat error:', e);
    }
}

function appendMessage(who, text) {
    const body = document.getElementById('aiChatBody');
    const div = document.createElement('div');
    div.className = 'ai-msg ' + who;
    
    if (who === 'user') {
        div.innerHTML = `
            <div class="ai-avatar user">👤</div>
            <div class="ai-bubble">${escapeHtml(text)}</div>
        `;
    } else {
        div.innerHTML = `
            <div class="ai-avatar bot">🤖</div>
            <div>
                <div class="ai-name">蔡徐坤</div>
                <div class="ai-bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
            </div>
        `;
    }
    
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
}

function showTyping() {
    const body = document.getElementById('aiChatBody');
    const div = document.createElement('div');
    const id = 'typing-' + Date.now();
    div.id = id;
    div.className = 'ai-msg bot';
    div.innerHTML = `
        <div class="ai-avatar bot">🤖</div>
        <div>
            <div class="ai-name">蔡徐坤</div>
            <div class="typing">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
    `;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
    return id;
}

function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ========== DeepSeek预测 ==========
async function predictWithDeepSeek(home, away, homeRank, awayRank) {
    const prompt = `你是一个专业足球分析师。分析以下2026世界杯比赛：

主队：${home}（FIFA排名第${homeRank}）
客队：${away}（FIFA排名第${awayRank}）

请分析并返回严格JSON格式（不要任何其他文字）：
{
  "homeGoals": 预测主队进球数（0-5整数）,
  "awayGoals": 预测客队进球数（0-5整数）,
  "homeWinPercent": 主胜概率（0-100整数）,
  "drawPercent": 平局概率（0-100整数）,
  "awayWinPercent": 客胜概率（0-100整数）,
  "confidence": 你对这个预测的自信程度（60-99）,
  "analysis": "一句话中文分析原因（不超过30字）"
}`;
    
    try {
        const res = await fetch(DEEPSEEK_URL, {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + DEEPSEEK_KEY,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: 'deepseek-chat',
                messages: [{ role: 'user', content: prompt }],
                temperature: 0.3,
                max_tokens: 300
            })
        });
        if (!res.ok) throw new Error('DeepSeek ' + res.status);
        const data = await res.json();
        const text = data.choices[0].message.content;
        const json = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
        return {
            score: json.homeGoals + '-' + json.awayGoals,
            homeWin: json.homeWinPercent,
            draw: json.drawPercent,
            awayWin: json.awayWinPercent,
            confidence: json.confidence,
            analysis: json.analysis
        };
    } catch (e) {
        console.log('DeepSeek error:', e);
        return null;
    }
}

function predictLocal(home, away, homeRank, awayRank) {
    const homeStr = 100 - (homeRank || 50);
    const awayStr = 100 - (awayRank || 50);
    const total = homeStr + awayStr;
    let homeWin = Math.round((homeStr / total) * 65 + 15);
    let awayWin = Math.round((awayStr / total) * 65 + 10);
    let draw = 100 - homeWin - awayWin;
    let homeGoals = Math.round(homeStr / 20);
    let awayGoals = Math.round(awayStr / 22);
    if (Math.abs(homeStr - awayStr) < 15 && draw > 20) homeGoals = awayGoals;
    homeGoals = Math.max(0, Math.min(5, homeGoals));
    awayGoals = Math.max(0, Math.min(5, awayGoals));
    const confidence = 60 + Math.round(Math.random() * 25);
    let reason;
    if (homeWin > awayWin + 15) reason = home + '排名领先' + Math.abs(homeRank - awayRank) + '位，主场优势明显';
    else if (awayWin > homeWin + 10) reason = away + '国际排名更高，客场稳定发挥';
    else reason = '两队实力均衡，胜负难料';
    return { score: homeGoals + '-' + awayGoals, homeWin, draw, awayWin, confidence, analysis: reason };
}

function makeRecommendation(home, away, p) {
    let rec, recType, stars, reason;
    if (p.homeWin > p.awayWin + 15) {
        rec = home + '胜'; recType = 'win';
        stars = Math.min(5, Math.round(p.homeWin / 15));
        reason = (p.analysis || '') + '，推荐主胜';
    } else if (p.awayWin > p.homeWin + 10) {
        rec = away + '胜'; recType = 'lose';
        stars = Math.min(5, Math.round(p.awayWin / 15));
        reason = (p.analysis || '') + '，推荐客胜';
    } else {
        rec = '平局'; recType = 'draw'; stars = 3;
        reason = (p.analysis || '') + '，保守看好平局';
    }
    return { rec, recType, stars, reason };
}

// ========== 渲染 ==========
function getFlag(teamName) { return FLAG_MAP[teamName] || '⚽'; }
function getRank(teamName) { return FIFA_RANK[teamName] || 50; }

function renderCardHtml(m, p, rec, isDeepSeek) {
    const homeOdds = (2.5 + Math.random()).toFixed(2);
    const drawOdds = (3.0 + Math.random()).toFixed(2);
    const awayOdds = (2.5 + Math.random() * 2).toFixed(2);
    return `
    <div class="match-card">
        <div class="match-info">
            <span>${m.group || ''} · ${m.loc || ''}</span>
            <span>${m.time}</span>
        </div>
        <div class="match-main">
            <div class="teams">
                <div class="team">
                    <div class="flag">${m.homeFlag || getFlag(m.homeEn || m.home)}</div>
                    <div class="name">${m.home}</div>
                    <div class="rank">FIFA #${m.homeRank}</div>
                </div>
                <div class="vs-time">
                    <div class="vs">VS</div>
                    <div class="time">${(m.time || '').split(' ')[1] || ''}</div>
                </div>
                <div class="team">
                    <div class="flag">${m.awayFlag || getFlag(m.awayEn || m.away)}</div>
                    <div class="name">${m.away}</div>
                    <div class="rank">FIFA #${m.awayRank}</div>
                </div>
            </div>
            <div class="prediction">
                <div class="pred-label">🤖 DeepSeek AI 预测</div>
                <div class="pred-score">${p.score}</div>
                <div class="confidence">置信度 ${p.confidence}%</div>
                <div class="ai-analysis">💡 ${p.analysis || ''}</div>
            </div>
            <div class="prob-row">
                <div class="prob-box win">
                    <div class="l">主胜</div>
                    <div class="v">${p.homeWin}%</div>
                    <div class="bar"><div class="bar-fill" style="width:${p.homeWin}%"></div></div>
                </div>
                <div class="prob-box draw">
                    <div class="l">平局</div>
                    <div class="v">${p.draw}%</div>
                    <div class="bar"><div class="bar-fill" style="width:${p.draw}%"></div></div>
                </div>
                <div class="prob-box lose">
                    <div class="l">客胜</div>
                    <div class="v">${p.awayWin}%</div>
                    <div class="bar"><div class="bar-fill" style="width:${p.awayWin}%"></div></div>
                </div>
            </div>
            <div class="recommend">
                <span class="rec-tag">推荐${rec.recType === 'win' ? '主胜' : rec.recType === 'lose' ? '客胜' : '平'}</span>
                <span class="stars">${'⭐'.repeat(rec.stars)}</span>
                <span class="rec-desc">${rec.reason}</span>
            </div>
            <div class="odds-section">
                <div class="odds-title">竞彩赔率</div>
                <div class="odds-grid">
                    <div class="odds-btn ${rec.recType === 'win' ? 'selected' : ''}" onclick="addToSlip('${m.home}胜', ${homeOdds})">
                        <span class="lb">主胜</span>
                        <span class="val">${homeOdds}</span>
                    </div>
                    <div class="odds-btn ${rec.recType === 'draw' ? 'selected' : ''}" onclick="addToSlip('平局', ${drawOdds})">
                        <span class="lb">平局</span>
                        <span class="val">${drawOdds}</span>
                    </div>
                    <div class="odds-btn ${rec.recType === 'lose' ? 'selected' : ''}" onclick="addToSlip('${m.away}胜', ${awayOdds})">
                        <span class="lb">客胜</span>
                        <span class="val">${awayOdds}</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    `;
}

// ========== 主加载 ==========
function renderAIPanel() {
    const panel = document.getElementById('ai-panel');
    panel.innerHTML = `
        <div class="ai-chat">
            <div class="ai-chat-header">
                <span class="ai-chat-title">💬 蔡徐坤 AI助手</span>
            </div>
            <div class="ai-chat-body" id="aiChatBody">
                <div class="ai-msg bot">
                    <div class="ai-avatar bot">🤖</div>
                    <div>
                        <div class="ai-name">蔡徐坤</div>
                        <div class="ai-bubble">你好！我是蔡徐坤，DeepSeek AI驱动。有什么关于世界杯预测、足球数据的问题，尽管问我吧！⚽</div>
                    </div>
                </div>
            </div>
            <div class="ai-chat-footer">
                <input class="ai-chat-input" id="aiInput" placeholder="问蔡徐坤一个问题..." onkeydown="if(event.key==='Enter')sendMessage()">
                <button class="ai-chat-send" onclick="sendMessage()">发送</button>
            </div>
        </div>
    `;
}

async function loadPredictions() {
    const livePanel = document.getElementById('live-panel');
    livePanel.innerHTML = '<div class="loading"><div class="spinner"></div>DeepSeek AI 分析中...</div>';
    const local = {
        upcoming: [
            { home: '卡塔尔', away: '瑞士', homeEn: 'Qatar', awayEn: 'Switzerland', homeRank: 50, awayRank: 14, group: 'B', time: '6/14 03:00', loc: '旧金山' },
            { home: '巴西', away: '摩洛哥', homeEn: 'Brazil', awayEn: 'Morocco', homeRank: 5, awayRank: 15, group: 'C', time: '6/14 06:00', loc: '纽约' },
            { home: '海地', away: '苏格兰', homeEn: 'Haiti', awayEn: 'Scotland', homeRank: 60, awayRank: 35, group: 'C', time: '6/14 09:00', loc: '纽约' },
            { home: '澳大利亚', away: '土耳其', homeEn: 'Australia', awayEn: 'Turkey', homeRank: 25, awayRank: 28, group: 'D', time: '6/14 09:00', loc: '洛杉矶' }
        ],
        finished: [
            { home: '墨西哥', away: '南非', homeFlag: '🇲🇽', awayFlag: '🇿🇦', score: '2-0', group: 'A' },
            { home: '韩国', away: '捷克', homeFlag: '🇰🇷', awayFlag: '🇨🇿', score: '2-1', group: 'A' },
            { home: '加拿大', away: '波黑', homeFlag: '🇨🇦', awayFlag: '🇧🇦', score: '1-1', group: 'B' },
            { home: '美国', away: '巴拉圭', homeFlag: '🇺🇸', awayFlag: '🇵🇾', score: '4-1', group: 'D' }
        ],
        schedule: [
            { home: '捷克', away: '南非', homeFlag: '🇨🇿', awayFlag: '🇿🇦', time: '6/19 03:00', group: 'A' },
            { home: '墨西哥', away: '韩国', homeFlag: '🇲🇽', awayFlag: '🇰🇷', time: '6/19 06:00', group: 'A' },
            { home: '瑞士', away: '波黑', homeFlag: '🇨🇭', awayFlag: '🇧🇦', time: '6/19 09:00', group: 'B' },
            { home: '加拿大', away: '卡塔尔', homeFlag: '🇨🇦', awayFlag: '🇶🇦', time: '6/19 12:00', group: 'B' }
        ]
    };
    let liveHtml = '';
    let aiCount = 0;
    for (const m of local.upcoming) {
        const p = await predictWithDeepSeek(m.homeEn || m.home, m.awayEn || m.away, m.homeRank, m.awayRank);
        let finalP, isDeepSeek;
        if (p) { finalP = p; isDeepSeek = true; aiCount++; }
        else { finalP = predictLocal(m.home, m.away, m.homeRank, m.awayRank); isDeepSeek = false; }
        const rec = makeRecommendation(m.home, m.away, finalP);
        liveHtml += renderCardHtml(m, finalP, rec, isDeepSeek);
    }
    if (aiCount > 0) {
        document.getElementById('apiStatus').className = 'api-status deepseek';
        document.getElementById('apiStatus').textContent = '🟢 DeepSeek AI 已连接 | ' + aiCount + '/' + local.upcoming.length + '场AI预测';
    }
    livePanel.innerHTML = liveHtml || '<div style="text-align:center;color:#666;padding:40px;">暂无今日预测</div>';
    let finishedHtml = '', scheduleHtml = '';
    local.finished.forEach(f => {
        finishedHtml += `<div class="finished-card"><div class="flag">${f.homeFlag}</div><div class="team-name">${f.home}</div><div class="finished-score">${f.score}</div><div class="team-name">${f.away}</div><div class="flag">${f.awayFlag}</div></div>`;
    });
    local.schedule.forEach(s => {
        scheduleHtml += `<div class="finished-card"><div class="flag">${s.homeFlag}</div><div class="team-name">${s.home} vs ${s.away}</div><div style="color:#00d4aa;font-size:12px;">${s.time}</div></div>`;
    });
    document.getElementById('finished-panel').innerHTML = finishedHtml || '<div style="text-align:center;color:#666;padding:40px;">暂无已完赛</div>';
    document.getElementById('schedule-panel').innerHTML = scheduleHtml || '<div style="text-align:center;color:#666;padding:40px;">暂无赛程</div>';
}

// ========== Tab / 投注单 ==========
function switchTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    const target = id === 'ai' ? document.getElementById('ai-panel') : document.getElementById(id + '-panel');
    if (target) target.classList.add('active');
    if (id === 'ai') renderAIPanel();
}

function addToSlip(pick, odds) {
    const existing = slip.find(s => s.pick === pick);
    if (existing) existing.odds = parseFloat(odds);
    else slip.push({ pick, odds: parseFloat(odds) });
    updateSlip();
}

function removeFromSlip(i) { slip.splice(i, 1); updateSlip(); }
function clearSlip() { slip = []; updateSlip(); }

function updateSlip() {
    const el = document.getElementById('betSlip');
    if (slip.length === 0) { el.classList.remove('show'); return; }
    el.classList.add('show');
    document.getElementById('slipCount').textContent = slip.length;
    let total = 1, html = '';
    slip.forEach((s, i) => {
        total *= s.odds;
        html += `<div class="slip-item"><span>${s.pick}</span><span>${s.odds.toFixed(2)} <span class="del" onclick="removeFromSlip(${i})">✕</span></span></div>`;
    });
    document.getElementById('slipItems').innerHTML = html;
    document.getElementById('totalOdds').textContent = total.toFixed(2) + '倍';
}

function updateTime() {
    const now = new Date();
    document.getElementById('updateTime').textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ' 更新';
}

// ========== 初始化 ==========
loadPredictions();
updateTime();
setInterval(() => { loadPredictions(); updateTime(); }, 300000);
</script>
