<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="description" content="2026世界杯 AI预测中心 - DeepSeek+智谱AI双引擎预测">
<title>2026世界杯 · AI预测中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;background:#0a0e27;color:#FFFFFF;min-height:100vh;padding-bottom:80px;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#0a0e27;}
::-webkit-scrollbar-thumb{background:#2a3055;border-radius:2px;}

/* ========== HEADER ========== */
.header{background:rgba(13,17,39,0.92);backdrop-filter:blur(12px);padding:14px 16px 10px;position:sticky;top:0;z-index:1000;box-shadow:0 2px 24px rgba(0,0,0,0.6);border-bottom:1px solid rgba(255,255,255,0.06);}
.header-inner{display:flex;align-items:center;justify-content:space-between;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-icon{font-size:26px;line-height:1;}
.header-title{font-size:16px;font-weight:800;color:#FFFFFF;letter-spacing:0.5px;}
.header-sub{font-size:10px;color:#8892A0;margin-top:1px;letter-spacing:0.5px;}
.header-right{display:flex;gap:10px;align-items:center;}
.header-btn{background:rgba(255,255,255,0.06);border:none;color:#8892A0;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:background 0.2s;}
.header-btn:active{background:rgba(255,255,255,0.12);}

/* ========== TABS ========== */
.tabs{background:#0d1127;display:flex;padding:0 8px;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:62px;z-index:999;}
.tab{flex:1;text-align:center;padding:11px 2px 10px;font-size:12px;color:#8892A0;cursor:pointer;position:relative;transition:color 0.25s;border:none;background:transparent;white-space:nowrap;font-weight:500;}
.tab.active{color:#FFFFFF;font-weight:700;}
.tab.active::after{content:'';position:absolute;bottom:0;left:15%;width:70%;height:2.5px;background:#4A90D9;border-radius:2px 2px 0 0;}
.tab:active{opacity:0.7;}

/* ========== CONTENT ========== */
.content{padding:10px 10px 20px;max-width:500px;margin:0 auto;}

/* ========== MATCH CARD ========== */
.match-card{background:#131730;border-radius:14px;padding:0;margin-bottom:14px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 4px 24px rgba(0,0,0,0.35);overflow:hidden;}

/* Card top bar: group + time + status */
.card-top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;background:rgba(255,255,255,0.02);}
.card-group{font-size:11px;color:#4A90D9;background:rgba(74,144,217,0.12);padding:3px 10px;border-radius:12px;font-weight:700;letter-spacing:0.3px;}
.card-time{font-size:11px;color:#8892A0;font-weight:500;}
.card-status{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:700;letter-spacing:0.3px;}
.card-status.finished{background:rgba(74,144,217,0.18);color:#4A90D9;}
.card-status.live{background:rgba(231,76,60,0.18);color:#E74C3C;animation:pulse 1.5s infinite;}
.card-status.upcoming{background:rgba(46,204,113,0.15);color:#2ECC71;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}

/* Flags + teams */
.card-teams{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 8px;}
.team-block{display:flex;flex-direction:column;align-items:center;gap:2px;width:38%;}
.team-flag{font-size:36px;line-height:1.1;}
.team-name-zh{font-size:14px;font-weight:700;color:#FFFFFF;text-align:center;margin-top:2px;}
.team-name-en{font-size:10px;color:#8892A0;text-align:center;margin-top:1px;letter-spacing:0.5px;}
.vs-block{display:flex;flex-direction:column;align-items:center;gap:2px;width:24%;}
.vs-text{font-size:14px;font-weight:900;color:#FFD700;letter-spacing:2px;}
.vs-score{font-size:20px;font-weight:900;color:#FFFFFF;letter-spacing:1px;margin-top:2px;}
.vs-label{font-size:10px;color:#8892A0;}

/* Coach + players info */
.card-info{padding:6px 14px 8px;}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;font-size:10.5px;color:#8892A0;line-height:1.5;}
.info-row .left{width:48%;text-align:left;display:flex;flex-direction:column;gap:1px;}
.info-row .right{width:48%;text-align:right;display:flex;flex-direction:column;gap:1px;}
.info-item{display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.info-icon{font-size:11px;}
.info-label{color:#8892A0;}
.info-value{color:#c0c8d8;font-weight:500;}

/* Separator */
.card-sep{margin:4px 14px;border:none;border-top:1px solid rgba(255,255,255,0.08);}

/* AI Prediction */
.ai-section{padding:8px 14px 10px;}
.ai-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.ai-engine{display:flex;align-items:center;gap:5px;}
.ai-engine-badge{font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;color:#fff;}
.ai-engine-badge.deepseek{background:linear-gradient(135deg,#4fc3f7,#0288d1);}
.ai-engine-badge.zhipu{background:linear-gradient(135deg,#ce93d8,#7b1fa2);}
.ai-engine-text{font-size:10px;color:#8892A0;}
.ai-confidence-badge{font-size:11px;color:#FFD700;font-weight:700;}

/* Predicted score */
.ai-score-row{text-align:center;padding:4px 0 6px;font-size:13px;color:#FFFFFF;font-weight:600;}
.ai-score-val{font-size:18px;font-weight:900;color:#FFFFFF;letter-spacing:1px;}
.ai-score-flags{font-size:14px;}

/* Prob bars */
.prob-bars-outer{display:flex;height:22px;border-radius:11px;overflow:hidden;margin:4px 0 2px;}
.prob-bar-seg{display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;color:#fff;transition:width 0.5s;min-width:0;white-space:nowrap;overflow:hidden;}
.prob-bar-seg.win{background:#2ECC71;}
.prob-bar-seg.draw{background:#F1C40F;color:#333;}
.prob-bar-seg.lose{background:#E74C3C;}
.prob-labels{display:flex;justify-content:space-between;font-size:9.5px;color:#8892A0;padding:0 2px;margin-bottom:4px;}
.prob-labels span{display:flex;align-items:center;gap:2px;}

/* Analysis */
.ai-analysis{font-size:11px;line-height:1.65;color:#c0c8d8;padding:6px 0 2px;border-top:1px solid rgba(255,255,255,0.06);margin-top:4px;}
.ai-analysis::before{content:'📝 ';}

/* Odds section */
.odds-section{padding:6px 14px 12px;}
.odds-title{font-size:10px;color:#8892A0;text-align:center;margin-bottom:6px;letter-spacing:1px;}
.odds-row{display:flex;gap:6px;}
.odds-col{flex:1;text-align:center;padding:6px 2px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);}
.odds-col-label{font-size:9.5px;color:#8892A0;margin-bottom:2px;}
.odds-col-val{font-size:15px;font-weight:800;color:#FFFFFF;}

/* ========== TEAM ARCHIVE ========== */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 2px;}
.team-card{background:#131730;border-radius:12px;padding:12px 8px;text-align:center;border:1px solid rgba(255,255,255,0.06);}
.team-card .flag{font-size:30px;}
.team-card .name{font-size:12px;font-weight:700;color:#FFFFFF;margin-top:4px;}
.team-card .en-name{font-size:9px;color:#8892A0;}
.team-card .rank{font-size:10px;color:#4A90D9;margin-top:3px;}
.team-card .coach{font-size:9px;color:#8892A0;margin-top:2px;}

/* ========== EMPTY STATE ========== */
.empty-state{text-align:center;padding:50px 20px;color:#8892A0;}
.empty-state .icon{font-size:48px;margin-bottom:12px;}
.empty-state .title{font-size:15px;margin-bottom:6px;}
.empty-state .sub{font-size:12px;}

/* ========== AI FAB ========== */
.ai-fab{position:fixed;bottom:24px;right:18px;z-index:9999;}
.ai-fab-btn{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#9B59B6,#E74C8B);border:none;box-shadow:0 4px 20px rgba(155,89,182,0.35);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;transition:transform 0.2s;animation:fabPulse 3s infinite;}
.ai-fab-btn:active{transform:scale(0.9);}
@keyframes fabPulse{0%,100%{box-shadow:0 4px 20px rgba(155,89,182,0.35);}50%{box-shadow:0 4px 28px rgba(155,89,182,0.55);}}

/* ========== CHAT PANEL ========== */
.chat-panel{position:fixed;bottom:84px;right:12px;width:calc(100vw - 24px);max-width:360px;max-height:420px;background:#131730;border-radius:16px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 8px 40px rgba(0,0,0,0.7);display:none;flex-direction:column;overflow:hidden;z-index:9998;}
.chat-panel.show{display:flex;}
.chat-header{padding:12px 16px;background:rgba(155,89,182,0.15);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center;}
.chat-header-title{font-size:13px;font-weight:700;color:#FFFFFF;}
.chat-close-btn{background:none;border:none;color:#8892A0;font-size:18px;cursor:pointer;padding:4px;}
.chat-messages{padding:12px;flex:1;overflow-y:auto;max-height:280px;min-height:100px;}
.chat-msg{margin-bottom:10px;font-size:12.5px;line-height:1.55;}
.chat-msg.bot{color:#c0c8d8;}
.chat-msg.user{color:#4A90D9;text-align:right;}
.chat-msg-label{font-size:9.5px;color:#8892A0;margin-bottom:2px;}
.chat-input-area{display:flex;padding:8px;border-top:1px solid rgba(255,255,255,0.08);gap:6px;}
.chat-input{flex:1;background:#0a0e27;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 12px;color:#FFFFFF;font-size:12.5px;outline:none;}
.chat-input:focus{border-color:#4A90D9;}
.chat-send-btn{background:linear-gradient(135deg,#4A90D9,#2ECC71);border:none;border-radius:8px;padding:8px 14px;color:#fff;font-size:12.5px;cursor:pointer;font-weight:700;}

/* ========== REFRESH ========== */
.refresh-indicator{text-align:center;padding:8px;font-size:10.5px;color:#8892A0;}

/* ========== FOOTER ========== */
.footer{text-align:center;padding:20px 16px 40px;font-size:10px;color:#4a5070;line-height:1.6;}

/* ========== RESPONSIVE ========== */
@media(max-width:400px){
  .header-title{font-size:14px;}
  .tab{font-size:11px;padding:10px 1px 9px;}
  .team-flag{font-size:28px;}
  .team-name-zh{font-size:12.5px;}
  .vs-score{font-size:17px;}
  .prob-bar-seg{font-size:8.5px;}
  .chat-panel{width:calc(100vw - 20px);right:10px;}
}
@media(min-width:500px){
  .content{padding:12px 0 20px;margin:0 auto;}
  .match-card{margin-left:auto;margin-right:auto;max-width:480px;}
}
</style>
</head>

// ===== 模拟"当前日期" =====
var NOW_DATE = '';
function initDate() {
  var d = new Date();
  var y = d.getFullYear();
  var m = d.getMonth() + 1;
  var day = d.getDate();
  if (m < 10) { m = '0' + m; }
  if (day < 10) { day = '0' + day; }
  NOW_DATE = '' + y + '-' + m + '-' + day;
}

// ===== 获取比赛状态（不使用new Date解析）=====
function getStatus(dateStr, hasScore) {
  var parts = dateStr.split(' ')[0].split('/');
  var m = parts[0];
  var d = parts[1];
  if (m.length < 2) { m = '0' + m; }
  if (d.length < 2) { d = '0' + d; }
  var dateFull = '2026-' + m + '-' + d;
  if (hasScore) { return 'finished'; }
  if (dateFull === NOW_DATE) { return 'live'; }
  if (dateFull < NOW_DATE) { return 'finished'; }
  return 'upcoming';
}

// ===== Tab切换 =====
function switchTab(tab) {
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.remove('active');
    if (tabs[i].getAttribute('data-tab') === tab) {
      tabs[i].classList.add('active');
    }
  }
  var panels = document.querySelectorAll('.tab-panel');
  for (var j = 0; j < panels.length; j++) {
    panels[j].style.display = 'none';
  }
  var target = document.getElementById('panel-' + tab);
  if (target) {
    target.style.display = 'block';
  }
  if (tab === 'today') { renderToday(); }
  if (tab === 'finished') { renderFinished(); }
  if (tab === 'upcoming') { renderUpcoming(); }
  if (tab === 'teams') { renderTeams(); }
}

// ===== 格式化时间显示 =====
function formatTimeDisp(t) {
  var parts = t.split(' ');
  return parts[0].replace('/', '月') + '日 ' + parts[1];
}

// ===== 渲染单场比赛卡片HTML（精确还原参考图）=====
function renderCardHTML(m) {
  var statusClass = m.status;
  var statusText = '';
  if (m.status === 'live') {
    statusText = '● 进行中';
  } else if (m.status === 'finished') {
    statusText = '已完赛';
  } else {
    statusText = '未开始';
  }

  // 比分或VS
  var scoreHTML = '';
  if (m.status === 'finished' && m.homeScore !== null && m.awayScore !== null) {
    scoreHTML = '<div class="vs-score">' + m.homeScore + ' : ' + m.awayScore + '</div>';
  } else if (m.status === 'live') {
    if (m.homeScore !== null && m.awayScore !== null) {
      scoreHTML = '<div class="vs-score" style="color:#E74C3C;">' + m.homeScore + ' : ' + m.awayScore + '</div>';
    } else {
      scoreHTML = '<div class="vs-text">VS</div><div class="vs-label">' + formatTimeDisp(m.time) + '</div>';
    }
  } else {
    scoreHTML = '<div class="vs-text">VS</div><div class="vs-label">' + formatTimeDisp(m.time) + '</div>';
  }

  // 球队信息
  var homeZh = NAME_ZH[m.home] || m.home;
  var awayZh = NAME_ZH[m.away] || m.away;
  var homeFlag = FLAGS[m.home] || '🏳';
  var awayFlag = FLAGS[m.away] || '🏳';

  // 获取扩展数据（从比赛对象或回退到TEAMS）
  var getCoach1 = m.coach1 || (TEAMS[m.home] ? TEAMS[m.home].coach : '');
  var getCoach2 = m.coach2 || (TEAMS[m.away] ? TEAMS[m.away].coach : '');
  var getFifa1 = m.fifa1 || (TEAMS[m.home] ? TEAMS[m.home].fifa : '');
  var getFifa2 = m.fifa2 || (TEAMS[m.away] ? TEAMS[m.away].fifa : '');
  var getForm1 = m.formation1 || (TEAMS[m.home] ? TEAMS[m.home].formation : '');
  var getForm2 = m.formation2 || (TEAMS[m.away] ? TEAMS[m.away].formation : '');
  var getPlayers1 = m.players1 || (TEAMS[m.home] ? TEAMS[m.home].players : '');
  var getPlayers2 = m.players2 || (TEAMS[m.away] ? TEAMS[m.away].players : '');
  var getCaptain1 = m.captain1 || (TEAMS[m.home] ? TEAMS[m.home].captain : '');
  var getCaptain2 = m.captain2 || (TEAMS[m.away] ? TEAMS[m.away].captain : '');

  // 构建卡片 HTML（不使用模板字符串）
  var html = '';

  // 卡片开始
  html += '<div class="match-card" id="match-' + m.id + '">';

  // 顶部：组别 + 时间 + 状态
  html += '<div class="card-top">';
  html += '<span class="card-group">' + m.group + '组</span>';
  html += '<span class="card-time">' + m.time + '</span>';
  html += '<span class="card-status ' + statusClass + '">' + statusText + '</span>';
  html += '</div>';

  // 球队区域
  html += '<div class="card-teams">';
  // 主队
  html += '<div class="team-block">';
  html += '<span class="team-flag">' + homeFlag + '</span>';
  html += '<span class="team-name-zh">' + homeZh + '</span>';
  html += '<span class="team-name-en">' + m.home + '</span>';
  html += '</div>';
  // VS/比分
  html += '<div class="vs-block">';
  html += scoreHTML;
  html += '</div>';
  // 客队
  html += '<div class="team-block">';
  html += '<span class="team-flag">' + awayFlag + '</span>';
  html += '<span class="team-name-zh">' + awayZh + '</span>';
  html += '<span class="team-name-en">' + m.away + '</span>';
  html += '</div>';
  html += '</div>';

  // 教练/球员/阵型信息
  html += '<div class="card-info">';
  // 教练行
  html += '<div class="info-row">';
  html += '<div class="left"><span class="info-item"><span class="info-icon">🧑‍💼</span><span class="info-label">' + getCoach1 + '</span></span>';
  if (getCaptain1) { html += '<span class="info-item"><span class="info-icon">⭐</span><span class="info-label">' + getCaptain1 + '</span></span>'; }
  html += '</div>';
  html += '<div class="right"><span class="info-item" style="justify-content:flex-end;"><span class="info-label">' + getCoach2 + '</span><span class="info-icon">⭐</span></span>';
  if (getCaptain2) { html += '<span class="info-item" style="justify-content:flex-end;"><span class="info-label">' + getPlayers2 + '</span><span class="info-icon">⭐</span></span>'; }
  html += '</div>';
  html += '</div>';
  // 阵型/FIFA行
  html += '<div class="info-row">';
  html += '<div class="left"><span class="info-item"><span class="info-icon">🏟️</span><span class="info-label">' + getForm1 + '</span></span>';
  html += '<span class="info-item"><span class="info-icon">📋</span><span class="info-label">' + getFifa1 + '</span></span>';
  html += '</div>';
  html += '<div class="right"><span class="info-item" style="justify-content:flex-end;"><span class="info-label">' + getForm2 + '</span><span class="info-icon">🏟️</span></span>';
  html += '<span class="info-item" style="justify-content:flex-end;"><span class="info-label">' + getFifa2 + '</span><span class="info-icon">📋</span></span>';
  html += '</div>';
  html += '</div>';
  // 球员行
  html += '<div class="info-row">';
  html += '<div class="left"><span class="info-item"><span class="info-icon">⚽</span><span class="info-label">' + getPlayers1 + '</span></span></div>';
  html += '<div class="right"><span class="info-item" style="justify-content:flex-end;"><span class="info-label">' + getPlayers2 + '</span><span class="info-icon">⚽</span></span></div>';
  html += '</div>';
  html += '</div>';

  // 分隔线
  html += '<hr class="card-sep">';

  // AI 预测区域
  if (m.pred) {
    var p = m.pred;
    var probH = p.probH || 33;
    var probD = p.probD || 34;
    var probA = p.probA || 33;

    html += '<div class="ai-section">';

    // AI引擎 + 置信度
    html += '<div class="ai-header-row">';
    html += '<div class="ai-engine">';
    html += '<span class="ai-engine-badge deepseek">D</span>';
    html += '<span class="ai-engine-badge zhipu">Z</span>';
    html += '<span class="ai-engine-text">DeepSeek + 智谱AI双引擎预测</span>';
    html += '</div>';
    html += '<span class="ai-confidence-badge">置信度' + p.conf + '%</span>';
    html += '</div>';

    // 预测比分
    html += '<div class="ai-score-row">';
    html += '<span class="ai-score-flags">' + homeFlag + ' </span>';
    html += '<span class="ai-score-val">' + p.score + '</span>';
    html += '<span class="ai-score-flags"> ' + awayFlag + '</span>';
    html += '</div>';

    // 概率条
    html += '<div class="prob-bars-outer">';
    html += '<div class="prob-bar-seg win" style="width:' + probH + '%;">' + (probH >= 20 ? '胜' + probH + '%' : '') + '</div>';
    html += '<div class="prob-bar-seg draw" style="width:' + probD + '%;">' + (probD >= 20 ? '平' + probD + '%' : '') + '</div>';
    html += '<div class="prob-bar-seg lose" style="width:' + probA + '%;">' + (probA >= 20 ? '负' + probA + '%' : '') + '</div>';
    html += '</div>';
    html += '<div class="prob-labels">';
    html += '<span style="color:#2ECC71;">胜 ' + probH + '%</span>';
    html += '<span style="color:#F1C40F;">平 ' + probD + '%</span>';
    html += '<span style="color:#E74C3C;">负 ' + probA + '%</span>';
    html += '</div>';

    // 分析
    if (p.analysis) {
      html += '<div class="ai-analysis">' + p.analysis + '</div>';
    }

    html += '</div>'; // ai-section
  }

  // 赔率区域
  if (m.odds) {
    html += '<div class="odds-section">';
    html += '<div class="odds-title">━━ 赔率 ━━</div>';
    html += '<div class="odds-row">';
    html += '<div class="odds-col"><div class="odds-col-label">主胜</div><div class="odds-col-val">' + m.odds.h.toFixed(2) + '</div></div>';
    html += '<div class="odds-col"><div class="odds-col-label">平局</div><div class="odds-col-val">' + m.odds.d.toFixed(2) + '</div></div>';
    html += '<div class="odds-col"><div class="odds-col-label">客胜</div><div class="odds-col-val">' + m.odds.a.toFixed(2) + '</div></div>';
    html += '</div>';
    html += '</div>';
  }

  // 卡片结束
  html += '</div>';

  return html;
}

// ===== 渲染今日赛程 =====
function renderToday() {
  var html = '';
  var todayStr = NOW_DATE;
  var todayMMDD = todayStr.substring(5);
  var count = 0;
  for (var i = 0; i < MATCHES.length; i++) {
    var m = MATCHES[i];
    var matchDateParts = m.time.split(' ')[0].split('/');
    var mm = matchDateParts[0];
    var dd = matchDateParts[1];
    if (mm.length < 2) { mm = '0' + mm; }
    if (dd.length < 2) { dd = '0' + dd; }
    var matchKey = mm + '-' + dd;
    if (matchKey === todayMMDD) {
      html += renderCardHTML(m);
      count++;
    }
  }
  if (count === 0) {
    html = '<div class="empty-state"><div class="icon">📅</div><div class="title">今天没有比赛</div><div class="sub">请查看其他赛程标签</div></div>';
  }
  var el = document.getElementById('todayMatches');
  if (el) { el.innerHTML = html; }
}

// ===== 渲染已完赛 =====
function renderFinished() {
  var html = '';
  var count = 0;
  for (var i = 0; i < MATCHES.length; i++) {
    var m = MATCHES[i];
    if (m.status === 'finished') {
      html += renderCardHTML(m);
      count++;
    }
  }
  if (count === 0) {
    html = '<div class="empty-state"><div class="icon">📋</div><div class="title">暂无已完赛比赛</div></div>';
  }
  var el = document.getElementById('finishedMatches');
  if (el) { el.innerHTML = html; }
}

// ===== 渲染未来赛程 =====
function renderUpcoming() {
  var html = '';
  var count = 0;
  for (var i = 0; i < MATCHES.length; i++) {
    var m = MATCHES[i];
    if (m.status === 'upcoming') {
      html += renderCardHTML(m);
      count++;
    }
  }
  if (count === 0) {
    html = '<div class="empty-state"><div class="icon">🔮</div><div class="title">暂无未来赛程</div></div>';
  }
  var el = document.getElementById('upcomingMatches');
  if (el) { el.innerHTML = html; }
}

// ===== 渲染球队档案 =====
function renderTeams() {
  var groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  var html = '';
  for (var g = 0; g < groups.length; g++) {
    var grp = groups[g];
    html += '<div style="grid-column:1/-1;font-size:13px;font-weight:700;color:#4A90D9;padding:10px 4px 4px;border-bottom:1px solid rgba(74,144,217,0.2);margin-bottom:4px;">' + grp + '组</div>';
    for (var t = 0; t < ALL_TEAMS_DATA.length; t++) {
      var team = ALL_TEAMS_DATA[t];
      if (team.group === grp) {
        html += '<div class="team-card">';
        html += '<div class="flag">' + team.flag + '</div>';
        html += '<div class="name">' + team.zh + '</div>';
        html += '<div class="en-name" style="font-size:9px;color:#8892A0;">' + team.name + '</div>';
        html += '<div class="rank">FIFA排名: #' + team.rank + '</div>';
        html += '<div class="coach" style="font-size:9.5px;color:#c0c8d8;margin-top:2px;">' + team.coach + '</div>';
        html += '</div>';
      }
    }
  }
  var el = document.getElementById('teamGrid');
  if (el) { el.innerHTML = html; }
}

// ===== 刷新 =====
function doRefresh() {
  var btn = document.getElementById('refreshBtn');
  var el = document.getElementById('todayRefresh');
  if (el) { el.innerHTML = '🔄 刷新中...'; }
  setTimeout(function() {
    initDate();
    initMatches();
    var activeTab = 'today';
    var tabs = document.querySelectorAll('.tab');
    for (var i = 0; i < tabs.length; i++) {
      if (tabs[i].classList.contains('active')) {
        activeTab = tabs[i].getAttribute('data-tab');
        break;
      }
    }
    if (activeTab === 'today') { renderToday(); }
    if (activeTab === 'finished') { renderFinished(); }
    if (activeTab === 'upcoming') { renderUpcoming(); }
    if (el) { el.innerHTML = '🔄 数据每5分钟自动刷新'; }
  }, 600);
}

// ===== AI 聊天 =====
function toggleChat() {
  var panel = document.getElementById('chatPanel');
  if (panel.classList.contains('show')) {
    panel.classList.remove('show');
  } else {
    panel.classList.add('show');
  }
}

function sendChat() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) { return; }
  input.value = '';
  var msgs = document.getElementById('chatMessages');

  // 用户消息
  var userDiv = document.createElement('div');
  userDiv.className = 'chat-msg user';
  userDiv.innerHTML = '<span class="chat-msg-label">🧑 你</span><br>' + msg;
  msgs.appendChild(userDiv);

  // Bot回复
  setTimeout(function() {
    var botDiv = document.createElement('div');
    botDiv.className = 'chat-msg bot';
    var reply = getBotReply(msg);
    botDiv.innerHTML = '<span class="chat-msg-label">🏀 坤坤</span><br>' + reply;
    msgs.appendChild(botDiv);
    msgs.scrollTop = msgs.scrollHeight;
  }, 500);

  msgs.scrollTop = msgs.scrollHeight;
}

function getBotReply(msg) {
  var m = msg.toLowerCase();
  // 查找球队
  var foundTeam = '';
  var foundTeamEn = '';
  var allTeamNames = Object.keys(NAME_ZH);
  for (var i = 0; i < allTeamNames.length; i++) {
    var en = allTeamNames[i].toLowerCase();
    var zh = NAME_ZH[allTeamNames[i]].toLowerCase();
    if (m.indexOf(en) >= 0 || m.indexOf(zh) >= 0) {
      foundTeam = NAME_ZH[allTeamNames[i]];
      foundTeamEn = allTeamNames[i];
      break;
    }
  }
  if (foundTeam) {
    var info = null;
    for (var j = 0; j < ALL_TEAMS_DATA.length; j++) {
      if (ALL_TEAMS_DATA[j].name === foundTeamEn) { info = ALL_TEAMS_DATA[j]; break; }
    }
    if (info) {
      return '🏀 ' + foundTeam + ' ' + info.flag + '\nFIFA排名: #' + info.rank + '\n主教练: ' + info.coach + '\n阵型: ' + info.formation + '\n队长: ' + info.captain + '\n主力球员: ' + info.players + '\n\n坤坤推荐去"未来赛程"看这支队的预测！🎤';
    }
    return '坤坤收到！' + foundTeam + '是吧，去"未来赛程"或"今日赛程"找找看！🏀';
  }
  if (m.indexOf('预测') >= 0 || m.indexOf('分析') >= 0 || m.indexOf('比赛') >= 0) {
    return '想分析哪场？报上球队名，坤坤用双引擎AI给你算！⚡ 比如"巴西"或"葡萄牙vs苏格兰"🎤';
  }
  if (m.indexOf('你好') >= 0 || m.indexOf('hi') >= 0 || m.indexOf('hello') >= 0) {
    return '你好呀！我是坤坤~ 2026世界杯预测找我准没错！想知道哪场比赛的结果？😎🏀';
  }
  return '我是坤坤，2026世界杯我看过了！🎤 想了解哪场比赛？报上球队名，我用 DeepSeek+智谱AI 给你分析！😎';
}

// ===== 初始化 =====
function init() {
  initDate();
  initMatches();
  // 默认渲染今日
  renderToday();
  // 自动刷新定时器
  setInterval(function() {
    initDate();
    initMatches();
    var activeTab = 'today';
    var tabs = document.querySelectorAll('.tab');
    for (var i = 0; i < tabs.length; i++) {
      if (tabs[i].classList.contains('active')) {
        activeTab = tabs[i].getAttribute('data-tab');
        break;
      }
    }
    if (activeTab === 'today') { renderToday(); }
    if (activeTab === 'finished') { renderFinished(); }
    if (activeTab === 'upcoming') { renderUpcoming(); }
  }, 300000);
}

// 页面加载后初始化
if (window.addEventListener) {
  window.addEventListener('load', init);
} else {
  window.onload = init;
}
