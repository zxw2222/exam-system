<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026世界杯竞彩·实时比分预测</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#161b22;--card2:#1c2333;--border:#30363d;--accent:#f0b429;--green:#2ea043;--red:#da3633;--blue:#388bfd;--text:#e6edf3;--dim:#8b949e;--live:#ff6b6b}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:0 12px}

header{background:linear-gradient(135deg,#1a0a00,#2d1800,#1a0a00);border-bottom:2px solid var(--accent);padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:18px;font-weight:900;color:var(--accent);letter-spacing:1px}
.refresh-btn{padding:6px 12px;border-radius:8px;font-size:12px;background:rgba(240,180,41,0.15);color:var(--accent);border:1px solid rgba(240,180,41,0.3);cursor:pointer}
.refresh-btn:hover{background:rgba(240,180,41,0.3)}
.status-bar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 16px;font-size:12px;color:var(--dim);display:flex;justify-content:space-between}
.status-bar .live-dot{width:8px;height:8px;background:var(--live);border-radius:50%;display:inline-block;animation:pulse 1.5s infinite;margin-right:6px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3)}

.tabs{display:flex;gap:4px;padding:8px 16px;background:var(--card);border-bottom:1px solid var(--border)}
.tab{padding:5px 12px;border-radius:14px;font-size:12px;cursor:pointer;border:1px solid var(--border);color:var(--dim);transition:all .2s}
.tab.active,.tab:hover{background:rgba(240,180,41,0.12);color:var(--accent);border-color:var(--accent)}

.panel{display:none;padding:8px 0}.panel.active{display:block}

/* 比赛卡 */
.match{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.match-head{display:flex;justify-content:space-between;padding:7px 12px;background:rgba(240,180,41,0.06);border-bottom:1px solid var(--border);font-size:11px;color:var(--dim)}
.match-head .live-tag{color:var(--live);font-weight:700;font-size:12px}
.match-head .group{color:var(--accent);font-weight:600}
.match-body{padding:12px}

/* 比分区 */
.score-area{text-align:center;margin-bottom:10px}
.score-area .teams-score{display:flex;justify-content:center;align-items:center;gap:8px}
.score-area .team-block{text-align:center;flex:1}
.score-area .flag{font-size:28px}
.score-area .tname{font-size:14px;font-weight:700}
.score-area .rank{font-size:10px;color:var(--dim)}
.score-area .score-box{font-size:26px;font-weight:900;color:var(--accent);min-width:60px;text-align:center}
.score-area .dash{font-size:14px;color:var(--dim)}

/* 预测比分 */
.pred-score{background:rgba(46,160,67,0.08);border:1px solid rgba(46,160,67,0.2);border-radius:6px;padding:6px 10px;text-align:center;margin-bottom:8px;font-size:13px}
.pred-score .label{color:var(--green);font-weight:600;font-size:11px}
.pred-score .val{color:var(--green);font-weight:900;font-size:18px}

/* 赔率 */
.odds-title{font-size:11px;color:var(--dim);text-align:center;margin-bottom:4px}
.odds-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px}
.odds-btn{padding:6px 2px;border-radius:5px;text-align:center;font-size:11px;border:1px solid var(--border);cursor:pointer;transition:all .2s;background:transparent;color:var(--dim)}
.odds-btn:hover{border-color:var(--accent);color:var(--accent)}
.odds-btn .lbl{font-size:9px;display:block}
.odds-btn .num{font-size:13px;font-weight:700;color:var(--text)}
.odds-btn.hot{border-color:var(--red);background:rgba(218,54,51,0.08)}
.odds-btn.hot .num{color:var(--red)}
.odds-btn.sel{border-color:var(--accent);background:rgba(240,180,41,0.12)}
.odds-btn.sel .num{color:var(--accent)}

/* 推荐条 */
.rec-bar{background:rgba(240,180,41,0.08);border:1px solid rgba(240,180,41,0.15);border-radius:6px;padding:8px 10px;font-size:12px}
.rec-bar .rtag{display:inline-block;padding:2px 8px;border-radius:4px;font-weight:700;font-size:11px;margin-right:6px}
.rec-bar .rtag.win{background:rgba(218,54,51,0.15);color:var(--red)}
.rec-bar .rtag.draw{background:rgba(240,180,41,0.15);color:var(--accent)}
.rec-bar .rtag.lose{background:rgba(46,160,67,0.15);color:var(--green)}
.rec-bar .stars{color:var(--accent)}
.rec-bar .desc{color:var(--dim);margin-top:4px;line-height:1.5}

/* 概率条 */
.prob{display:flex;gap:3px;margin-bottom:8px}
.prob-seg{height:6px;border-radius:3px}
.prob-w{background:var(--red)}.prob-d{background:var(--accent)}.prob-l{background:var(--green)}
.prob-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-bottom:4px}

/* 已完赛 */
.finished{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px}
.finished .f-score{font-size:20px;font-weight:900;color:var(--green)}
.finished .f-teams{font-size:13px;display:flex;justify-content:space-between;align-items:center}

/* 投注单 */
.slip{position:fixed;bottom:0;left:0;right:0;background:var(--card2);border-top:2px solid var(--accent);padding:10px 16px;z-index:100;display:none;max-height:50vh;overflow-y:auto}
.slip.show{display:block}
.slip .stitle{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:6px}
.s-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px}
.s-total{display:flex;justify-content:space-between;margin-top:6px;font-size:13px;font-weight:700}
.s-btn{width:100%;padding:8px;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(90deg,#f0b429,#e09100);color:#1a1a2e;margin-top:6px}

.disclaimer{text-align:center;padding:6px;background:rgba(218,54,51,0.08);color:var(--red);font-size:10px;border-bottom:1px solid var(--border)}

footer{text-align:center;padding:16px;color:rgba(80,100,150,0.4);font-size:10px}
@media(max-width:600px){.score-area .flag{font-size:22px}.score-area .tname{font-size:12px}.score-area .score-box{font-size:20px}}
</style>
</head>
<body>
<div class="wrap">
<header>

  <button class="refresh-btn" onclick="refreshData()">🔄 刷新数据</button>

  {n:'英格兰',f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',o:8.00},{n:'西班牙',f:'🇪🇸',o:10.00},{n:'德国',f:'🇩🇪',o:12.00},
  {n:'葡萄牙',f:'🇵🇹',o:14.00},{n:'荷兰',f:'🇳🇱',o:18.00},{n:'美国',f:'🇺🇸',o:25.00},
  {n:'比利时',f:'🇧🇪',o:30.00},{n:'乌拉圭',f:'🇺🇾',o:35.00},{n:'克罗地亚',f:'🇭🇷',o:40.00},
  {n:'墨西哥',f:'🇲🇽',o:50.00},{n:'摩洛哥',f:'🇲🇦',o:55.00},{n:'韩国',f:'🇰🇷',o:80.00},
  {n:'日本',f:'🇯🇵',o:90.00}
];

var slipData=[];

function sw(id){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  event.target.classList.add('active');
  document.getElementById(id+'-panel').classList.add('active');
}

function addS(id,pick,odds){
  var e=slipData.find(function(s){return s.id===id});
  if(e){e.pick=pick;e.odds=odds}else{slipData.push({id:id,pick:pick,odds:odds})}
  updS();
}
function rmS(i){slipData.splice(i,1);updS()}
function clearS(){slipData=[];updS()}
function updS(){
  var el=document.getElementById('slip');
  if(slipData.length===0){el.classList.remove('show');document.getElementById('sc').textContent='0';document.getElementById('si').innerHTML='';document.getElementById('st').textContent='0';return}
  el.classList.add('show');
  document.getElementById('sc').textContent=slipData.length;
  var tot=1,h='';
  slipData.forEach(function(s,i){tot*=s.odds;h+='<div class="s-item"><span>'+s.pick+'</span><span style="color:var(--accent)">'+s.odds+'</span><span style="color:var(--red);cursor:pointer" onclick="rmS('+i+')">✕</span></div>'});
  document.getElementById('si').innerHTML=h;
  document.getElementById('st').textContent=tot.toFixed(2)+'倍';
}

function renderLive(){
  var h='';
  today.forEach(function(m){
    h+='<div class="match"><div class="match-head"><span>'+m.date+' · '+m.loc+'</span><span class="group">'+m.g+'组 第1轮</span><span>6/14 开赛</span></div>';
    h+='<div class="match-body">';
    // 比分+预测比分
    h+='<div class="score-area"><div class="teams-score"><div class="team-block"><span class="flag">'+m.f1+'</span><span class="tname">'+m.t1+'</span><span class="rank">FIFA #'+m.r1+'</span></div>';
    h+='<div class="score-box"><span class="dash">—</span></div>';
    h+='<div class="team-block"><span class="flag">'+m.f2+'</span><span class="tname">'+m.t2+'</span><span class="rank">FIFA #'+m.r2+'</span></div></div></div>';
    
    // AI预测比分
    h+='<div class="pred-score"><div class="label">🤖 AI比分预测</div><div class="val">'+m.ps+'</div></div>';
    
    // 概率条
    h+='<div class="prob-labels"><span>胜 '+m.pw+'%</span><span>平 '+m.pd+'%</span><span>负 '+m.pl+'%</span></div>';
    h+='<div class="prob"><div class="prob-seg prob-w" style="width:'+m.pw+'%;flex:'+m.pw+'"></div><div class="prob-seg prob-d" style="flex:'+m.pd+'"></div><div class="prob-seg prob-l" style="flex:'+m.pl+'"></div></div>';
    
    // 让球
    h+='<div style="text-align:center;font-size:12px;color:var(--dim);margin-bottom:6px">让球：'+m.h+'</div>';
    
    // 让球赔率
    h+='<div class="odds-title">让球赔率</div>';
    h+='<div class="odds-grid"><div class="odds-btn '+((m.rec==='胜'||m.rec==='负'&&m.h.indexOf(m.t2)>-1)?'sel':'')+'" onclick="addS('+m.id+',\''+m.t1+'让球胜\','+m.hw+')"><span class="lbl">让胜</span><span class="num">'+m.hw+'</span></div>';
    h+='<div class="odds-btn" onclick="addS('+m.id+',\''+m.g+'组让平\','+m.hd+')"><span class="lbl">让平</span><span class="num">'+m.hd+'</span></div>';
    h+='<div class="odds-btn '+((m.rec==='负')?'sel':'')+'" onclick="addS('+m.id+',\''+m.t2+'让球负\','+m.hl+')"><span class="lbl">让负</span><span class="num">'+m.hl+'</span></div></div>';
    
    // 胜平负
    h+='<div class="odds-title">胜平负</div>';
    h+='<div class="odds-grid"><div class="odds-btn '+((m.rec==='胜')?'sel':'')+'" onclick="addS('+m.id+',\''+m.t1+'胜\','+m.w+')"><span class="lbl">主胜</span><span class="num">'+m.w+'</span></div>';
    h+='<div class="odds-btn" onclick="addS('+m.id+',\''+m.g+'组平\','+m.d+')"><span class="lbl">平局</span><span class="num">'+m.d+'</span></div>';
    h+='<div class="odds-btn '+((m.rec==='负')?'sel':'')+'" onclick="addS('+m.id+',\''+m.t2+'胜\','+m.l+')"><span class="lbl">客胜</span><span class="num">'+m.l+'</span></div></div>';
    
    // 比分赔率
    h+='<div class="odds-title">比分赔率</div>';
    var scores=m.ps.split('-');
    var s1=parseInt(scores[0]),s2=parseInt(scores[1]);
    var predOdds=Math.max(4.5, 6-(s1+s2));
    h+='<div class="odds-grid"><div class="odds-btn sel" onclick="addS('+m.id+',\''+m.ps+'\','+predOdds.toFixed(1)+')"><span class="lbl">AI预测</span><span class="num">'+m.ps+' @'+predOdds.toFixed(1)+'</span></div>';
    h+='<div class="odds-btn" onclick="addS('+m.id+',\''+m.t1+'胜其他\','+(predOdds+1).toFixed(1)+')"><span class="lbl">主胜其他</span><span class="num">'+(predOdds+1).toFixed(1)+'</span></div>';
    h+='<div class="odds-btn" onclick="addS('+m.id+',\''+m.t2+'胜其他\','+(predOdds+2).toFixed(1)+')"><span class="lbl">客胜其他</span><span class="num">'+(predOdds+2).toFixed(1)+'</span></div></div>';
    
    // 大小球
    h+='<div class="odds-title">大小球 (2.5)</div>';
    h+='<div class="odds-grid"><div class="odds-btn" onclick="addS('+m.id+',\''+m.g+'组大2.5\','+m.big+')"><span class="lbl">大2.5</span><span class="num">'+m.big+'</span></div>';
    h+='<div class="odds-btn" onclick="addS('+m.id+',\''+m.g+'组小2.5\','+m.small+')"><span class="lbl">小2.5</span><span class="num">'+m.small+'</span></div>';
    h+='<div class="odds-btn"></div></div>';
    
    // 推荐
    h+='<div class="rec-bar"><span class="rtag '+((m.rec==='胜')?'win':(m.rec==='平')?'draw':'lose')+'">推荐'+m.rec+'</span><span class="stars">'+Array(m.star+1).join('★')+'</span><div class="desc">'+m.desc+'</div></div>';
    
    h+='</div></div>';
  });
  document.getElementById('liveList').innerHTML=h;
}

function renderFin(){
  var h='';
  played.forEach(function(p){
    h+='<div class="finished"><div class="f-teams"><div style="flex:1;text-align:center"><span style="font-size:22px">'+p.f1+'</span> <strong>'+p.t1+'</strong></div>';
    h+='<div class="f-score">'+p.s+'</div>';
    h+='<div style="flex:1;text-align:center"><strong>'+p.t2+'</strong> <span style="font-size:22px">'+p.f2+'</span></div></div>';
    h+='<div style="text-align:center;font-size:11px;color:var(--dim);margin-top:4px">'+p.date+' · '+p.g+'组</div></div>';
  });
  document.getElementById('finList').innerHTML=h;
}

function renderUp(){
  var h='';
  upcoming.forEach(function(u){
    h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:13px">';
    h+='<span style="color:var(--accent);min-width:70px">'+u.date+'</span>';
    h+='<span style="flex:1;text-align:center">'+u.f1+' '+u.t1+' vs '+u.t2+' '+u.f2+'</span>';
    h+='<span style="color:var(--dim);min-width:30px">'+u.g+'组</span></div>';
  });
  document.getElementById('upList').innerHTML=h;
}

function renderCh(){
  var h='';
  champs.forEach(function(c,i){
    h+='<div style="display:flex;align-items:center;gap:8px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="addS(99,\''+c.n+'夺冠\','+c.o+')">';
    h+='<span style="font-size:16px;min-width:20px">'+(i<3?'🥇🥈🥉'[i]:(i+1))+'</span>';
    h+='<span style="font-size:20px">'+c.f+'</span>';
    h+='<span style="flex:1;font-weight:700">'+c.n+'</span>';
    h+='<span style="color:var(--accent);font-weight:900;font-size:16px">'+c.o+'</span></div>';
  });
  document.getElementById('chList').innerHTML=h;
}

// 自动刷新模拟
var updateCount=0;
function refreshData(){
  updateCount++;
  var now=new Date();
  var t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  document.getElementById('updateTime').textContent='更新于 '+t;
  // 模拟赔率微调
  today.forEach(function(m){
    var delta=(Math.random()-0.5)*0.1;
    m.w=Math.round((m.w+delta)*100)/100;
    m.d=Math.round((m.d-delta)*0.5*100)/100;
    m.l=Math.round((m.l+delta)*0.3*100)/100;
  });
  renderLive();
}

renderLive();renderFin();renderUp();renderCh();
refreshData();

// 每5分钟自动刷新
setInterval(refreshData,300000);
</script>
</body>
</html>
