<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>2026世界杯·AI预测中心</title>
<style>
*,*:before,*:after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--card:rgba(15,23,42,0.9);--border:rgba(51,65,85,0.5);--accent1:#6366f1;--accent2:#8b5cf6;--gold:#f59e0b;--green:#22c55e;--red:#ef4444;--text:#e2e8f0;--muted:#94a3b8}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,rgba(15,23,42,0.98),rgba(30,41,59,0.98));backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px}
.header h1{font-size:18px;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.content{padding:12px;position:relative;z-index:1}
.match-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.teams-row{display:flex;align-items:center;justify-content:space-between}
.team-col{text-align:center;flex:1}
.team-flag{font-size:36px}
.team-name{font-size:13px;font-weight:600}
.vs-col{text-align:center;padding:0 10px}
.vs-score{font-size:32px;font-weight:800}
.pred-box{background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(139,92,246,0.08));border-radius:12px;padding:14px;border:1px solid rgba(99,102,241,0.2);margin:10px 0}
.pred-title{font-size:12px;color:var(--accent2);font-weight:600;margin-bottom:8px}
.pred-score{font-size:22px;font-weight:700;text-align:center;margin:8px 0}
</style>
</head>
<body>

<div class="header">
<h1>⚽ 2026世界杯·AI预测</h1>
</div>

<div class="content" id="mainContent">
<div class="match-card">
<div class="teams-row">
<div class="team-col"><div class="team-flag">🇲🇽</div><div class="team-name">墨西哥</div></div>
<div class="vs-col"><div class="vs-score">2-0</div></div>
<div class="team-col"><div class="team-flag">🇿🇦</div><div class="team-name">南非</div></div>
</div>
<div class="pred-box">
<div class="pred-title">🎯 DeepSeek + 智谱AI 双引擎预测</div>
<div class="pred-score">墨西哥 2 : 0 南非</div>
<div style="font-size:11px;color:var(--muted);margin-top:8px">置信度 72% | 主胜 65% 平局 20% 客胜 15%</div>
</div>
</div>

<div class="match-card">
<div class="teams-row">
<div class="team-col"><div class="team-flag">🇰🇷</div><div class="team-name">韩国</div></div>
<div class="vs-col"><div class="vs-score">2-1</div></div>
<div class="team-col"><div class="team-flag">🇨🇿</div><div class="team-name">捷克</div></div>
</div>
<div class="pred-box">
<div class="pred-title">🎯 DeepSeek + 智谱AI 双引擎预测</div>
<div class="pred-score">韩国 2 : 1 捷克</div>
<div style="font-size:11px;color:var(--muted);margin-top:8px">置信度 68% | 主胜 58% 平局 22% 客胜 20%</div>
</div>
</div>

<div style="text-align:center;padding:20px;color:var(--muted);font-size:12px">✅ 页面加载正常！双引擎AI预测功能即将上线...</div>
</div>

</body>
</html>
