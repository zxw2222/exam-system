<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {

    background: #0f1923;
    color: #fff;
    min-height: 100vh;
    padding-bottom: 80px;
}

.header {

}
.header h1 { font-size: 20px; font-weight: 700; }
.header h1 span { color: #00d4aa; }
.update-time { font-size: 12px; color: #666; margin-top: 4px; }

.container { padding: 16px; max-width: 480px; margin: 0 auto; }

.match-card {
    background: #1a2a3a;

    margin-bottom: 16px;

}

.match-info {

}

.match-main { padding: 16px; }

.teams {

    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
}
.team { text-align: center; flex: 1; }
.team .flag { font-size: 36px; }
.team .name { font-size: 14px; font-weight: 600; margin-top: 4px; }
.team .rank { font-size: 11px; color: #666; }
.vs-time {
    text-align: center;

}
.vs-time .vs { font-size: 14px; color: #00d4aa; font-weight: 700; }
.vs-time .time { font-size: 11px; color: #666; margin-top: 2px; }

.prediction {

    padding: 14px;
    text-align: center;
    margin-bottom: 14px;
}
.pred-label { font-size: 12px; color: #00d4aa; }
.pred-score { font-size: 32px; font-weight: 900; color: #00d4aa; margin: 4px 0; }
.confidence { font-size: 11px; color: #888; }

.prob-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
}
.prob-box {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    background: #0f1923;
    border-radius: 8px;
}
.prob-box .l { font-size: 10px; color: #888; margin-bottom: 4px; }
.prob-box .v { font-size: 16px; font-weight: 700; }
.prob-box.win .v { color: #ff6b6b; }
.prob-box.draw .v { color: #ffd93d; }
.prob-box.lose .v { color: #6bcb77; }
.prob-box .bar {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
}
.prob-box .bar-fill { height: 100%; border-radius: 2px; }
.prob-box.win .bar-fill { background: #ff6b6b; }
.prob-box.draw .bar-fill { background: #ffd93d; }
.prob-box.lose .bar-fill { background: #6bcb77; }

.recommend {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px;
    background: rgba(255,215,0,0.1);
    border-radius: 8px;
    margin-bottom: 14px;
}
.rec-tag {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;

.stars { color: #ffd700; font-size: 13px; }

.odds-section { margin-bottom: 12px; }
.odds-title { font-size: 11px; color: #666; margin-bottom: 6px; }

    border-radius: 8px;

.odds-btn .lb { font-size: 10px; color: #888; display: block; }
.odds-btn .val { font-size: 14px; font-weight: 600; }

.odds-btn.selected {

    background: rgba(0,212,170,0.1);

footer {

    font-size: 11px;

// AIйў„жөӢз®—жі•
function predictMatch(match) {
    // е®һеҠӣи®Ўз®—пјҲеҹәдәҺFIFAжҺ’еҗҚпјү
    const homeStr = 100 - match.homeRank;
    const awayStr = 100 - match.awayRank;
    const total = homeStr + awayStr;
    
    // иғңе№іиҙҹжҰӮзҺҮ
    let homeWin = Math.round((homeStr / total) * 65 + 15);
    let awayWin = Math.round((awayStr / total) * 65 + 10);
    let draw = 100 - homeWin - awayWin;
    
    // йў„жөӢжҜ”еҲҶ
    let homeGoals = Math.round(homeStr / 20);
    let awayGoals = Math.round(awayStr / 22);
    
    // и°ғж•ҙпјҡеҰӮжһңе®һеҠӣжҺҘиҝ‘пјҢжҜ”еҲҶжҺҘиҝ‘
    if (Math.abs(homeStr - awayStr) < 15 && draw > 20) {
        homeGoals = awayGoals;
    }
    
    // зЎ®дҝқйқһиҙҹ
    homeGoals = Math.max(0, Math.min(5, homeGoals));
    awayGoals = Math.max(0, Math.min(5, awayGoals));
    
    // зҪ®дҝЎеәҰ
    const confidence = 60 + Math.round(Math.random() * 25);
    
    // жҺЁиҚҗ
    let rec, recType, stars, reason;
    if (homeWin > awayWin + 15) {
        rec = match.home + 'иғң';
        recType = 'win';
        stars = Math.min(5, Math.round(homeWin / 15));
        reason = match.home + 'е®һеҠӣжҳҺжҳҫеҚ дјҳпјҲFIFAз¬¬' + match.homeRank + ' vs ' + match.awayRank + 'пјүпјҢзңӢеҘҪдё»еңәеҸ–иғң';
    } else if (awayWin > homeWin + 10) {
        rec = match.away + 'иғң';
        recType = 'lose';
        stars = Math.min(5, Math.round(awayWin / 15));
        reason = match.away + 'жҺ’еҗҚжӣҙйқ еүҚпјҲFIFAз¬¬' + match.awayRank + 'пјүпјҢе®ўеңәдҪңжҲҳд»ҚжңүдјҳеҠҝ';
    } else {
        rec = 'е№іеұҖ';
        recType = 'draw';
        stars = 3;
        reason = 'дёӨйҳҹе®һеҠӣжҺҘиҝ‘пјҲFIFAжҺ’еҗҚе·®' + Math.abs(match.homeRank - match.awayRank) + 'дҪҚпјүпјҢи°Ёж…ҺзңӢеҘҪе№іеұҖ';
    }
    
    // иө”зҺҮи®Ўз®—пјҲжЁЎжӢҹпјү
    const homeOdds = (2.5 + Math.random()).toFixed(2);
    const drawOdds = (3.0 + Math.random()).toFixed(2);
    const awayOdds = (2.5 + Math.random() * 2).toFixed(2);
    
    return {
        score: homeGoals + '-' + awayGoals,
        homeWin, draw, awayWin,
        confidence,
        rec, recType, stars, reason,
        homeOdds, drawOdds, awayOdds,
        predHomeOdds: (6 - awayGoals).toFixed(1),
        predAwayOdds: (6 - homeGoals).toFixed(1)
    };
}

                            <span class="lb">е®ўиғң</span>

                        </div>
                    </div>
                </div>
                
                <div class="odds-section">

                    <div class="odds-grid">

function renderFinished() {
    let html = '';
    FINISHED.forEach(f => {
        html += `
        <div class="finished-card done">
            <div class="flag">${f.homeFlag}</div>
            <div class="team-name">${f.home}</div>
            <div class="finished-score">${f.score}</div>
            <div class="team-name">${f.away}</div>
            <div class="flag">${f.awayFlag}</div>
        </div>
        `;
    });
    document.getElementById('finished-panel').innerHTML = html;
}

// жёІжҹ“иөӣзЁӢ
function renderSchedule() {
    let html = '';
    SCHEDULE.forEach(s => {
        html += `
        <div class="finished-card">
            <div class="flag">${s.homeFlag}</div>
            <div class="team-name">${s.home} vs ${s.away}</div>
            <div style="color:#00d4aa;font-size:12px;">${s.time}</div>
        </div>
        `;
    });
    document.getElementById('schedule-panel').innerHTML = html;
}

// TabеҲҮжҚў
function switchTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(id + '-panel').classList.add('active');
}

// жҠ•жіЁеҚ•
function addToSlip(id, pick, odds) {
    const existing = slip.find(s => s.id === id);
    if (existing) {
        existing.pick = pick;
        existing.odds = parseFloat(odds);
    } else {
        slip.push({ id, pick, odds: parseFloat(odds) });
    }
    updateSlip();
}

function removeFromSlip(i) {
    slip.splice(i, 1);
    updateSlip();
}

function clearSlip() {
    slip = [];
    updateSlip();
}

function updateSlip() {
    const el = document.getElementById('betSlip');
    if (slip.length === 0) {
        el.classList.remove('show');
        return;
    }
    el.classList.add('show');
    document.getElementById('slipCount').textContent = slip.length;
    
    let total = 1;
    let html = '';
    slip.forEach((s, i) => {
        total *= s.odds;
        html += `
        <div class="slip-item">
            <span>${s.pick}</span>
            <span>${s.odds.toFixed(2)} <span class="del" onclick="removeFromSlip(${i})">вң•</span></span>
        </div>
        `;
    });
    document.getElementById('slipItems').innerHTML = html;
    document.getElementById('totalOdds').textContent = total.toFixed(2) + 'еҖҚ';
}

// еҲ·ж–°ж—¶й—ҙ
function updateTime() {
    const now = new Date();
    const t = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    document.getElementById('updateTime').textContent = t + ' жӣҙж–°';
}

// еҲқе§ӢеҢ–
renderLive();
renderFinished();
renderSchedule();
updateTime();

// жҜҸ5еҲҶй’ҹеҲ·ж–°
setInterval(() => {
    renderLive();
    updateTime();
}, 300000);
</script>
