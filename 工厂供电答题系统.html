<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工厂供电技术答题系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        success: '#22c55e',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        dark: '#0f172a',
                        darker: '#0b1120',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .gradient-header {
                background: linear-gradient(90deg, #4f46e5 0%, #8b5cf6 100%);
            }
            .card-shadow {
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            }
            .option-hover:hover {
                background-color: rgba(99, 102, 241, 0.1);
                border-color: #6366f1;
            }
            .taunt-animation {
                animation: shake 0.5s ease-in-out;
            }
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
            .taunt-modal {
                animation: fadeIn 0.3s ease-in-out;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: scale(0.9); }
                to { opacity: 1; transform: scale(1); }
            }
        }
    </style>
</head>
<body class="bg-darker text-gray-100 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- 头部标题 -->
        <div class="gradient-header rounded-xl p-6 mb-8 text-center card-shadow">
            <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold mb-2 flex items-center justify-center gap-3">
                <i class="fa fa-bolt"></i>
                工厂供电技术答题系统
            </h1>
            <p class="text-white/80 text-[clamp(0.9rem,1.5vw,1.1rem)]">
                单选·填空·简答·计算 | 点击即判分 | 答错自动抽象嘲讽
            </p>
        </div>

        <!-- 功能按钮区 -->
        <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-6">
            <button id="answer-mode" class="bg-success hover:bg-success/90 text-white font-medium py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition-all">
                <i class="fa fa-file-text-o"></i>
                <span>答题模式</span>
            </button>
            <button id="review-mode" class="bg-gray-700 hover:bg-gray-600 text-white font-medium py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition-all">
                <i class="fa fa-book"></i>
                <span>背题模式</span>
            </button>
            <button id="random-mode" class="bg-gray-700 hover:bg-gray-600 text-white font-medium py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition-all">
                <i class="fa fa-random"></i>
                <span>随机出题</span>
            </button>
            <button id="wrong-book" class="bg-gray-700 hover:bg-gray-600 text-white font-medium py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition-all">
                <i class="fa fa-times"></i>
                <span>错题本</span>
            </button>
            <button id="reset-data" class="bg-gray-700 hover:bg-gray-600 text-white font-medium py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition-all">
                <i class="fa fa-refresh"></i>
                <span>重置数据</span>
            </button>
        </div>

        <!-- 统计数据区 -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
            <div class="bg-dark rounded-lg p-4 text-center card-shadow">
                <div id="correct-count" class="text-2xl font-bold text-success mb-1">0</div>
                <div class="text-gray-400 text-sm flex items-center justify-center gap-1">
                    <i class="fa fa-check"></i> 正确
                </div>
            </div>
            <div class="bg-dark rounded-lg p-4 text-center card-shadow">
                <div id="wrong-count" class="text-2xl font-bold text-danger mb-1">0</div>
                <div class="text-gray-400 text-sm flex items-center justify-center gap-1">
                    <i class="fa fa-times"></i> 错误
                </div>
            </div>
            <div class="bg-dark rounded-lg p-4 text-center card-shadow">
                <div id="total-count" class="text-2xl font-bold text-white mb-1">0</div>
                <div class="text-gray-400 text-sm flex items-center justify-center gap-1">
                    <i class="fa fa-file-o"></i> 总计
                </div>
            </div>
            <div class="bg-dark rounded-lg p-4 text-center card-shadow">
                <div id="accuracy" class="text-2xl font-bold text-primary mb-1">0%</div>
                <div class="text-gray-400 text-sm flex items-center justify-center gap-1">
                    <i class="fa fa-dashboard"></i> 正确率
                </div>
            </div>
        </div>

        <!-- 进度条 -->
        <div class="w-full bg-gray-700 rounded-full h-2.5 mb-8">
            <div id="progress-bar" class="bg-primary h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>

        <!-- 题目区域 -->
        <div class="bg-dark rounded-xl p-6 mb-8 card-shadow">
            <div class="flex justify-between items-center mb-6">
                <span id="question-type" class="bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-sm font-medium">单选题</span>
                <span id="question-number" class="text-gray-400">第 1 / 55 题</span>
            </div>
            
            <h2 id="question-text" class="text-xl font-medium mb-8 leading-relaxed">
                题目加载中...
            </h2>
            
            <div id="options-container" class="space-y-4 mb-8">
                <!-- 选项将通过JS动态生成 -->
            </div>
            
            <div id="explanation-container" class="hidden bg-blue-900/20 border border-blue-500/30 rounded-lg p-4 mb-8">
                <h3 class="text-blue-400 font-medium mb-2 flex items-center gap-2">
                    <i class="fa fa-info-circle"></i> 答案解析
                </h3>
                <p id="explanation-text" class="text-gray-300"></p>
            </div>
            
            <!-- 填空题输入框 -->
            <div id="fill-blank-container" class="hidden mb-8">
                <input type="text" id="fill-blank-input" placeholder="请输入答案，按回车确认" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-primary transition-all">
            </div>
            
            <!-- 简答题输入框 -->
            <div id="essay-container" class="hidden mb-8">
                <textarea id="essay-input" rows="4" placeholder="请输入答案，按Ctrl+回车确认" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-primary transition-all resize-none"></textarea>
            </div>
        </div>

        <!-- 导航按钮 -->
        <div class="flex justify-between">
            <button id="prev-btn" class="bg-gray-700 hover:bg-gray-600 text-white font-medium py-3 px-6 rounded-lg flex items-center gap-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa fa-chevron-left"></i>
                上一题
            </button>
            <button id="next-btn" class="bg-primary hover:bg-primary/90 text-white font-medium py-3 px-8 rounded-lg flex items-center gap-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                下一题
                <i class="fa fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- 嘲讽弹窗 -->
    <div id="taunt-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden">

                    我知道了

        const optionsContainer = document.getElementById('options-container');
        const explanationContainer = document.getElementById('explanation-container');
        const explanationTextEl = document.getElementById('explanation-text');
        const fillBlankContainer = document.getElementById('fill-blank-container');
        const fillBlankInput = document.getElementById('fill-blank-input');
        const essayContainer = document.getElementById('essay-container');
        const essayInput = document.getElementById('essay-input');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const tauntModal = document.getElementById('taunt-modal');
        const tauntTextEl = document.getElementById('taunt-text');
        const closeTauntBtn = document.getElementById('close-taunt');

        // 初始化
        function init() {
            updateStats();
            loadQuestion(currentQuestionIndex);
            
            answerModeBtn.addEventListener('click', () => switchMode('answer'));
            reviewModeBtn.addEventListener('click', () => switchMode('review'));
            randomModeBtn.addEventListener('click', () => switchMode('random'));
            wrongBookBtn.addEventListener('click', () => switchMode('wrong'));
            resetDataBtn.addEventListener('click', resetData);
            prevBtn.addEventListener('click', prevQuestion);
            nextBtn.addEventListener('click', nextQuestion);
            closeTauntBtn.addEventListener('click', closeTaunt);
            
            fillBlankInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    checkFillAnswer();
                }
            });
            
            essayInput.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') {
                    checkEssayAnswer();
                }
            });
        }

        // 获取嘲讽文案
        function getTaunt(questionIndex) {
            const taunts = questionTaunts[questionIndex];
            if (taunts && taunts.length > 0) {
                return taunts[Math.floor(Math.random() * taunts.length)];
            }
            // 兜底通用嘲讽
            const fallbacks = [
                "这都能错？你是真的菜！",
                "不会吧不会吧，这题都有人做错？",
                "你这脑子还学什么工厂供电啊，进厂打螺丝吧。"
            ];
            return fallbacks[Math.floor(Math.random() * fallbacks.length)];
        }

        // 切换模式
        function switchMode(mode) {
            currentMode = mode;
            
            [answerModeBtn, reviewModeBtn, randomModeBtn, wrongBookBtn].forEach(btn => {
                btn.classList.remove('bg-success', 'hover:bg-success/90');
                btn.classList.add('bg-gray-700', 'hover:bg-gray-600');
            });
            
            switch(mode) {
                case 'answer':
                    answerModeBtn.classList.remove('bg-gray-700', 'hover:bg-gray-600');
                    answerModeBtn.classList.add('bg-success', 'hover:bg-success/90');
                    questionOrder = [...Array(questions.length).keys()];
                    break;
                case 'review':
                    reviewModeBtn.classList.remove('bg-gray-700', 'hover:bg-gray-600');
                    reviewModeBtn.classList.add('bg-success', 'hover:bg-success/90');
                    questionOrder = [...Array(questions.length).keys()];
                    break;
                case 'random':
                    randomModeBtn.classList.remove('bg-gray-700', 'hover:bg-gray-600');
                    randomModeBtn.classList.add('bg-success', 'hover:bg-success/90');
                    questionOrder = [...Array(questions.length).keys()].sort(() => Math.random() - 0.5);
                    break;
                case 'wrong':
                    wrongBookBtn.classList.remove('bg-gray-700', 'hover:bg-gray-600');
                    wrongBookBtn.classList.add('bg-success', 'hover:bg-success/90');
                    questionOrder = [...wrongQuestions];
                    if (questionOrder.length === 0) {
                        alert('暂无错题！');
                        switchMode('answer');
                        return;
                    }
                    break;
            }
            
            currentQuestionIndex = 0;
            loadQuestion(currentQuestionIndex);
        }

        // 加载题目
        function loadQuestion(index) {
            if (index < 0 || index >= questionOrder.length) return;
            
            const questionIndex = questionOrder[index];
            const question = questions[questionIndex];
            
            // 答题和背题模式显示序号，随机模式不显示序号
            if (currentMode === 'random') {
                questionNumberEl.textContent = '';
            } else {
                questionNumberEl.textContent = `第 ${index + 1} / ${questionOrder.length} 题`;
            }
            
            // 随机模式不显示题号前缀
            if (currentMode === 'random') {
                questionTextEl.textContent = question.question;
            } else {
                questionTextEl.textContent = `${questionIndex + 1}. ${question.question}`;
            }
            
            optionsContainer.classList.add('hidden');
            fillBlankContainer.classList.add('hidden');
            essayContainer.classList.add('hidden');
            explanationContainer.classList.add('hidden');
            
            switch(question.type) {
                case 'single':
                    questionTypeEl.textContent = '单选题';
                    questionTypeEl.className = 'bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-sm font-medium';
                    optionsContainer.classList.remove('hidden');
                    renderSingleOptions(question, questionIndex);
                    break;
                case 'fill':
                    questionTypeEl.textContent = '填空题';
                    questionTypeEl.className = 'bg-yellow-500/20 text-yellow-400 px-3 py-1 rounded-full text-sm font-medium';
                    fillBlankContainer.classList.remove('hidden');
                    fillBlankInput.value = '';
                    fillBlankInput.disabled = false;
                    break;
                case 'essay':
                    questionTypeEl.textContent = '简答/计算题';
                    questionTypeEl.className = 'bg-purple-500/20 text-purple-400 px-3 py-1 rounded-full text-sm font-medium';
                    essayContainer.classList.remove('hidden');
                    essayInput.value = '';
                    essayInput.disabled = false;
                    const oldAnswerDiv = essayContainer.querySelector('.reference-answer');
                    if (oldAnswerDiv) {
                        oldAnswerDiv.remove();
                    }
                    break;
            }
            
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === questionOrder.length - 1;
            
            if (currentMode === 'review') {
                showAnswer(questionIndex);
            }
            
            if (answeredQuestions.has(questionIndex)) {
                showAnswer(questionIndex);
            }
        }

        // 渲染单选题选项
        function renderSingleOptions(question, questionIndex) {
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, i) => {
                const optionEl = document.createElement('div');
                optionEl.className = 'flex items-start p-4 border border-gray-600 rounded-lg cursor-pointer option-hover transition-all';
                optionEl.innerHTML = `
                    <div class="w-6 h-6 rounded-full border-2 border-gray-400 flex items-center justify-center mr-4 flex-shrink-0 mt-0.5">
                        <span class="text-sm font-medium">${String.fromCharCode(65 + i)}</span>
                    </div>
                    <span class="leading-relaxed">${option}</span>
                `;
                
                if (answeredQuestions.has(questionIndex)) {
                    optionEl.style.pointerEvents = 'none';
                } else {
                    optionEl.addEventListener('click', () => {
                        checkSingleAnswer(questionIndex, i);
                    });
                }
                
                optionsContainer.appendChild(optionEl);
            });
        }

        // 检查单选题答案
        function checkSingleAnswer(questionIndex, selectedIndex) {
            if (answeredQuestions.has(questionIndex)) return;
            
            const question = questions[questionIndex];
            const isCorrect = selectedIndex === question.answer;
            
            // 标记用户选择
            const options = document.querySelectorAll('#options-container > div');
            options[selectedIndex].dataset.selected = 'true';
            
            answeredQuestions.add(questionIndex);
            if (isCorrect) {
                correctCount++;
            } else {
                wrongCount++;
                wrongQuestions.add(questionIndex);
                showTaunt(questionIndex);
            }
            
            updateStats();
            showAnswer(questionIndex);
        }

        // 检查填空题答案
        function checkFillAnswer() {
            const questionIndex = questionOrder[currentQuestionIndex];
            if (answeredQuestions.has(questionIndex)) return;
            
            const question = questions[questionIndex];
            const fillAnswer = fillBlankInput.value.trim();
            
            if (!fillAnswer) {
                alert('请输入答案！');
                return;
            }
            
            // 模糊匹配
            const isCorrect = question.answer.some(ans => {
                const normalizedAns = ans.replace(/[（）()]/g, '').trim();
                return fillAnswer.includes(normalizedAns);
            });
            
            answeredQuestions.add(questionIndex);
            if (isCorrect) {
                correctCount++;
            } else {
                wrongCount++;
                wrongQuestions.add(questionIndex);
                showTaunt(questionIndex);
            }
            
            updateStats();
            showAnswer(questionIndex);
        }

        // 检查简答题答案
        function checkEssayAnswer() {
            const questionIndex = questionOrder[currentQuestionIndex];
            if (answeredQuestions.has(questionIndex)) return;
            
            const essayAnswer = essayInput.value.trim();
            
            if (!essayAnswer) {
                alert('请输入答案！');
                return;
            }
            
            answeredQuestions.add(questionIndex);
            correctCount++;
            
            updateStats();
            showAnswer(questionIndex);
            alert('简答题已提交，请自行对照参考答案进行评分。');
        }

        // 显示答案
        function showAnswer(questionIndex) {
            const question = questions[questionIndex];
            
            explanationContainer.classList.remove('hidden');
            explanationTextEl.textContent = question.explanation;
            
            switch(question.type) {
                case 'single':
                    const options = document.querySelectorAll('#options-container > div');
                    options.forEach((option, i) => {
                        option.style.pointerEvents = 'none';
                        if (i === question.answer) {
                            option.classList.add('border-success', 'bg-success/10');
                            option.querySelector('div').classList.add('border-success', 'bg-success', 'text-white');
                        } else if (option.dataset.selected === 'true') {
                            option.classList.add('border-danger', 'bg-danger/10');
                            option.querySelector('div').classList.add('border-danger', 'bg-danger', 'text-white');
                        }
                    });
                    break;
                    
                case 'fill':
                    fillBlankInput.disabled = true;
                    fillBlankInput.placeholder = `正确答案：${question.answer.join('；')}`;
                    break;
                    
                case 'essay':
                    essayInput.disabled = true;
                    const answerDiv = document.createElement('div');
                    answerDiv.className = 'mt-4 p-4 bg-gray-800 rounded-lg reference-answer';
                    answerDiv.innerHTML = `<h4 class="text-success font-medium mb-2">参考答案：</h4><p class="text-gray-300 whitespace-pre-line">${question.answer}</p>`;
                    essayContainer.appendChild(answerDiv);
                    break;
            }
        }

        // 显示嘲讽
        function showTaunt(questionIndex) {
            const tauntText = getTaunt(questionIndex);
            tauntTextEl.textContent = tauntText;
            tauntModal.classList.remove('hidden');
            tauntModal.querySelector('.taunt-modal').classList.add('taunt-animation');
            setTimeout(() => {
                tauntModal.querySelector('.taunt-modal').classList.remove('taunt-animation');
            }, 500);
        }

        // 关闭嘲讽
        function closeTaunt() {
            tauntModal.classList.add('hidden');
        }

        // 上一题
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion(currentQuestionIndex);
            }
        }

        // 下一题
        function nextQuestion() {
            if (currentQuestionIndex < questionOrder.length - 1) {
                currentQuestionIndex++;
                loadQuestion(currentQuestionIndex);
            }
        }

        // 更新统计数据
        function updateStats() {
            correctCountEl.textContent = correctCount;
            wrongCountEl.textContent = wrongCount;
            totalCountEl.textContent = answeredQuestions.size;
            
            const accuracy = answeredQuestions.size > 0 ? Math.round((correctCount / answeredQuestions.size) * 100) : 0;
            accuracyEl.textContent = `${accuracy}%`;
            
            const progress = questions.length > 0 ? Math.round((answeredQuestions.size / questions.length) * 100) : 0;
            progressBar.style.width = `${progress}%`;
        }

        // 重置数据
        function resetData() {
            if (confirm('确定要重置所有答题数据吗？此操作不可恢复！')) {
                correctCount = 0;
                wrongCount = 0;
                answeredQuestions.clear();
                wrongQuestions.clear();
                currentQuestionIndex = 0;
                updateStats();
                switchMode('answer');
            }
        }

        // 启动应用
        init();
    </script>
</body>
</html>
