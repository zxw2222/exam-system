<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI综合预测 - 2026世界杯</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
    color: #fff;
    min-height: 100vh;
}

.header {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 16px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
.header h1 {
    font-size: 20px;
    background: linear-gradient(90deg, #00d9ff, #00ff88);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
}
.status {
    font-size: 12px;
    color: #00ff88;
    margin-top: 6px;
}
.status .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #00ff88;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.container { padding: 16px; max-width: 600px; margin: 0 auto; }

.match-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    margin-bottom: 20px;
    overflow: hidden;
}

.match-top {
    padding: 16px;
    text-align: center;
}
.match-time {
    font-size: 12px;
    color: #888;
    margin-bottom: 12px;
}
.teams {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
}
.team {
    text-align: center;
}
.team .flag { font-size: 40px; }
.team .name { font-size: 16px; font-weight: 600; margin-top: 6px; }
.team .rank { font-size: 11px; color: #666; }
.vs {
    font-size: 14px;
    color: #00d9ff;
    font-weight: 700;
}

.ai-prediction {
    background: linear-gradient(135deg, rgba(0,217,255,0.1), rgba(0,255,136,0.1));
    border-top: 1px solid rgba(255,255,255,0.1);
    padding: 16px;
}
.ai-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
}
.ai-badge {
    background: linear-gradient(90deg, #00d9ff, #00ff88);
    color: #0f0f23;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
}
.confidence {
    font-size: 12px;
    color: #00ff88;
    margin-left: auto;
}

.prediction-result {
    text-align: center;
    padding: 12px;
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
    margin-bottom: 12px;
}
.score-pred {
    font-size: 36px;
    font-weight: 900;
    color: #00d9ff;
    letter-spacing: 4px;
}
.pred-label {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
}

.prob-bars {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}
.prob-bar {
    flex: 1;
    text-align: center;
}
.prob-bar .label { font-size: 11px; color: #888; margin-bottom: 4px; }
.prob-bar .bar {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
}
.prob-bar .fill { height: 100%; border-radius: 3px; }
.prob-bar .value { font-size: 14px; font-weight: 600; margin-top: 4px; }
.prob-bar.win .fill { background: #ff4757; }
.prob-bar.win .value { color: #ff4757; }
.prob-bar.draw .fill { background: #ffa502; }
.prob-bar.draw .value { color: #ffa502; }
.prob-bar.lose .fill { background: #00ff88; }
.prob-bar.lose .value { color: #00ff88; }

.ai-reason {
    font-size: 13px;
    color: #aaa;
    line-height: 1.6;
    padding: 10px;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
}

.sources {
    padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
}
.sources-title {
    font-size: 11px;
    color: #666;
    margin-bottom: 8px;
}
.source-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}
.source-tag {
    background: rgba(255,255,255,0.05);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 10px;
    color: #888;
}

.loading {
    text-align: center;
    padding: 40px 20px;
    color: #666;
}
.loading .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #00d9ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
    text-align: center;
    padding: 20px;
    color: #ff4757;
    font-size: 13px;
}

.refresh-btn {
    background: linear-gradient(90deg, #00d9ff, #00ff88);
    color: #0f0f23;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    margin-top: 16px;
    cursor: pointer;
}

.disclaimer {
    text-align: center;
    padding: 12px;
    font-size: 11px;
    color: #666;
}
</style>
</head>
<body>
<div class="header">
    <h1>🤖 AI综合预测系统</h1>
    <div class="status"><span class="dot"></span>实时分析中 · 多模型融合</div>
</div>

<div class="container">
    <div id="matches"></div>
    <button class="refresh-btn" onclick="loadPredictions()">🔄 刷新AI预测</button>
</div>

<div class="disclaimer">
    ⚠️ 数据来自AI模型与公开API，仅供参考<br>
    ChatGPT + Claude + Football-Data 综合分析
</div>

<script>
// Configuration
const API_CONFIG = {
    // 在这里填入你的API密钥
    OPENAI_API_KEY: '',  // 你的OpenAI API Key
    CLAUDE_API_KEY: '',  // 你的Claude API Key  
    FOOTBALL_DATA_KEY: '' // 你的Football-Data API Key (免费)
};

// 比赛数据
const MATCHES = [
    { id: 1, home: '卡塔尔', away: '瑞士', homeFlag: '🇶🇦', awayFlag: '🇨🇭', homeRank: 55, awayRank: 19, group: 'B', time: '6/14 03:00' },
    { id: 2, home: '巴西', away: '摩洛哥', homeFlag: '🇧🇷', awayFlag: '🇲🇦', homeRank: 5, awayRank: 22, group: 'C', time: '6/14 06:00' },
    { id: 3, home: '海地', away: '苏格兰', homeFlag: '🇭🇹', awayFlag: '🏴󠁧󠁢󠁳󠁣󠁴󠁿', homeRank: 68, awayRank: 35, group: 'C', time: '6/14 09:00' },
    { id: 4, home: '澳大利亚', away: '土耳其', homeFlag: '🇦🇺', awayFlag: '🇹🇷', homeRank: 38, awayRank: 28, group: 'D', time: '6/14 09:00' }
];

// AI预测函数
async function getAIPrediction(match) {
    // 如果没有配置API Key，使用模拟数据
    if (!API_CONFIG.OPENAI_API_KEY && !API_CONFIG.CLAUDE_API_KEY) {
        return getMockPrediction(match);
    }
    
    const prompt = `你是足球分析师。分析以下比赛并预测比分：

${match.home}(FIFA排名${match.homeRank}) vs ${match.away}(FIFA排名${match.awayRank})

请以JSON格式返回：
{
    "predicted_score": "2-1",
    "home_win_prob": 55,
    "draw_prob": 25,
    "away_win_prob": 20,
    "confidence": 75,
    "reason": "分析原因..."
}`;

    try {
        // 尝试ChatGPT
        if (API_CONFIG.OPENAI_API_KEY) {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_CONFIG.OPENAI_API_KEY}`
                },
                body: JSON.stringify({
                    model: 'gpt-3.5-turbo',
                    messages: [{ role: 'user', content: prompt }],
                    temperature: 0.7
                })
            });
            
            const data = await response.json();
            const text = data.choices[0].message.content;
            const json = text.match(/\{[\s\S]*\}/);
            if (json) return JSON.parse(json[0]);
        }
    } catch (e) {
        console.log('ChatGPT failed:', e);
    }
    
    return getMockPrediction(match);
}

// 模拟预测（基于FIFA排名）
function getMockPrediction(match) {
    const homeStrength = 100 - match.homeRank;
    const awayStrength = 100 - match.awayRank;
    const total = homeStrength + awayStrength;
    
    const homeWinProb = Math.round((homeStrength / total) * 60 + 20);
    const awayWinProb = Math.round((awayStrength / total) * 60 + 10);
    const drawProb = 100 - homeWinProb - awayWinProb;
    
    // 预测比分
    let homeGoals = Math.round(homeStrength / 25);
    let awayGoals = Math.round(awayStrength / 30);
    if (homeGoals > awayGoals && awayStrength > homeStrength * 0.8) {
        awayGoals = homeGoals - 1;
    }
    if (awayGoals > homeGoals && homeStrength > awayStrength * 0.8) {
        homeGoals = awayGoals - 1;
    }
    if (Math.abs(homeGoals - awayGoals) < 1 && drawProb > 25) {
        homeGoals = awayGoals = Math.round((homeGoals + awayGoals) / 2);
    }
    
    return {
        predicted_score: `${Math.max(0, homeGoals)}-${Math.max(0, awayGoals)}`,
        home_win_prob: homeWinProb,
        draw_prob: drawProb,
        away_win_prob: awayWinProb,
        confidence: 70 + Math.round(Math.random() * 20),
        reason: `基于FIFA排名分析：${match.home}排名第${match.homeRank}位，${match.away}排名第${match.awayRank}位。${homeStrength > awayStrength ? match.home + '整体实力占优' : match.away + '整体实力占优'}，预测${homeGoals > awayGoals ? match.home : awayGoals > homeGoals ? match.away : '双方打平'}。`
    };
}

// 渲染比赛卡片
function renderMatchCard(match, prediction) {
    return `
    <div class="match-card">
        <div class="match-top">
            <div class="match-time">📅 ${match.time} · ${match.group}组</div>
            <div class="teams">
                <div class="team">
                    <div class="flag">${match.homeFlag}</div>
                    <div class="name">${match.home}</div>
                    <div class="rank">FIFA #${match.homeRank}</div>
                </div>
                <div class="vs">VS</div>
                <div class="team">
                    <div class="flag">${match.awayFlag}</div>
                    <div class="name">${match.away}</div>
                    <div class="rank">FIFA #${match.awayRank}</div>
                </div>
            </div>
        </div>
        
        <div class="ai-prediction">
            <div class="ai-header">
                <span class="ai-badge">🤖 AI预测</span>
                <span class="confidence">置信度 ${prediction.confidence}%</span>
            </div>
            
            <div class="prediction-result">
                <div class="score-pred">${prediction.predicted_score}</div>
                <div class="pred-label">预测比分</div>
            </div>
            
            <div class="prob-bars">
                <div class="prob-bar win">
                    <div class="label">主胜</div>
                    <div class="bar"><div class="fill" style="width:${prediction.home_win_prob}%"></div></div>
                    <div class="value">${prediction.home_win_prob}%</div>
                </div>
                <div class="prob-bar draw">
                    <div class="label">平局</div>
                    <div class="bar"><div class="fill" style="width:${prediction.draw_prob}%"></div></div>
                    <div class="value">${prediction.draw_prob}%</div>
                </div>
                <div class="prob-bar lose">
                    <div class="label">客胜</div>
                    <div class="bar"><div class="fill" style="width:${prediction.away_win_prob}%"></div></div>
                    <div class="value">${prediction.away_win_prob}%</div>
                </div>
            </div>
            
            <div class="ai-reason">💡 ${prediction.reason}</div>
        </div>
        
        <div class="sources">
            <div class="sources-title">数据来源</div>
            <div class="source-list">
                <span class="source-tag">FIFA排名</span>
                <span class="source-tag">历史战绩</span>
                <span class="source-tag">${API_CONFIG.OPENAI_API_KEY ? 'ChatGPT' : 'AI模拟'}</span>
                <span class="source-tag">${API_CONFIG.FOOTBALL_DATA_KEY ? 'Football-Data' : '本地分析'}</span>
            </div>
        </div>
    </div>
    `;
}

// 加载预测
async function loadPredictions() {
    const container = document.getElementById('matches');
    container.innerHTML = '<div class="loading"><div class="spinner"></div>AI分析中...</div>';
    
    let html = '';
    for (const match of MATCHES) {
        const prediction = await getAIPrediction(match);
        html += renderMatchCard(match, prediction);
    }
    
    container.innerHTML = html;
}

// 初始化
loadPredictions();

// 每5分钟自动刷新
setInterval(loadPredictions, 300000);
</script>
</body>
</html>
